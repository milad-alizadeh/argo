<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Argo · Workflow fan-out</title>
<style>
  :root{
    color-scheme:dark;
    /* shadcn/ui system tokens (argo-tokens.css · warm graphite neutrals + indigo accent) */
    --background:#0b0a08; --foreground:#efece6;
    --card:#16130f; --card-foreground:#efece6;
    --popover:#1c1813; --popover-foreground:#efece6;
    --primary:#5468ea; --primary-foreground:#ffffff;
    --secondary:#211d17; --secondary-foreground:#e7e2da;
    --muted:#211d17; --muted-foreground:#9a938a;
    --accent:#5468ea; --accent-foreground:#ffffff;
    --destructive:#e84a45; --destructive-foreground:#ffeceb;
    --border:rgba(246,240,230,.09); --input:rgba(246,240,230,.13); --ring:#5468ea;
    --success:#24ce7c; --success-foreground:#04140c;
    --warning:#f6b23c; --warning-foreground:#1a1204;
    --critical:#f5564f; --critical-foreground:#1b0908;
    --sidebar:#0e0c09; --sidebar-foreground:#d9d4cc; --sidebar-primary:#5468ea;
    --sidebar-accent:rgba(84,104,234,.14); --sidebar-border:rgba(246,240,230,.07);
    --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    --font-mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    /* legacy wireframe tokens remapped onto the system (SEMANTIC MAPPING block) */
    --ground:var(--background); --panel:rgba(22,19,15,0.55);
    --hair:var(--border); --hair-strong:var(--input); --top-hi:rgba(246,240,230,0.08);
    --inset:rgba(246,240,230,0.022); --inset-hair:rgba(246,240,230,0.065); --inset-hi:rgba(246,240,230,0.04);
    --txt:var(--foreground); --dim:var(--muted-foreground); --dimmer:#8b8377;
    --blue:var(--primary); --run:var(--primary); --amber:var(--warning); --red:var(--critical); --mist:var(--muted-foreground);
    /* verdict axis collapses onto the status hues — told apart by SHAPE, not a disjoint hue family */
    --v-approve:var(--success); --v-changes:var(--warning); --v-block:var(--critical); --stale:var(--dimmer);
    --mono:var(--font-mono); --sans:var(--font-sans);
  }

  /* ── TYPE SYSTEM roles (argo-tokens.css) — available as .t-* classes ── */
  .t-hero    {font:700 28px/1.15 var(--font-sans);letter-spacing:-0.01em;color:var(--foreground);}
  .t-title   {font:600 17px/1.2  var(--font-sans);letter-spacing:-0.006em;color:var(--foreground);}
  .t-subtitle{font:600 14px/1.3  var(--font-sans);color:var(--foreground);}
  .t-eyebrow {font:600 11px/1.1  var(--font-sans);letter-spacing:0.14em;text-transform:uppercase;color:var(--muted-foreground);}
  .t-body    {font:400 13px/1.35 var(--font-sans);color:var(--foreground);}
  .t-label   {font:500 12px/1.3  var(--font-sans);color:var(--foreground);}
  .t-meta    {font:500 11px/1.3  var(--font-sans);letter-spacing:0.01em;color:var(--dimmer);font-variant-numeric:tabular-nums;}
  .t-micro   {font:500 10px/1.2  var(--font-sans);letter-spacing:0.03em;color:var(--muted-foreground);}
  .t-mono    {font:400 12px/1.5  var(--font-mono);}
  .t-mono-in {font:450 11px/1.3  var(--font-mono);letter-spacing:0;}
  *{box-sizing:border-box;}
  /* Phosphor Light inline-icon helper — 1em so it scales with the row's font-size;
     fill:currentColor so colour tokens tint the icon like they tinted the glyph. */
  .ic{width:1em;height:1em;display:inline-block;vertical-align:-0.14em;flex:none;fill:currentColor;}
  .ic.sm{width:.86em;height:.86em;}
  html,body{margin:0;height:100%;}
  body{font-family:var(--sans);color:var(--txt);font-size:13px;background:var(--ground);overflow:hidden;}
  #sky{position:fixed;inset:0;z-index:0;overflow:hidden;}
  #sky .glow{position:absolute;left:50%;bottom:-38%;transform:translateX(-50%);width:150vw;height:110vh;border-radius:50%;
    background:radial-gradient(closest-side,rgba(84,104,234,0.20),rgba(84,104,234,0.05) 55%,transparent 72%);filter:blur(20px);}
  #sky .glow.warm{width:70vw;height:50vh;bottom:-14%;opacity:.5;background:radial-gradient(closest-side,rgba(242,140,77,0.16),transparent 70%);}
  #sky canvas{position:absolute;inset:0;width:100%;height:100%;}
  .app{position:relative;z-index:1;height:100vh;display:grid;grid-template-columns:var(--c-rail,236px) 6px 1fr;padding:12px;}
  .panel{position:relative;min-width:0;min-height:0;background:var(--panel);
    -webkit-backdrop-filter:blur(22px) saturate(1.2);backdrop-filter:blur(22px) saturate(1.2);
    border:1px solid var(--hair);border-radius:14px;box-shadow:0 1px 0 var(--top-hi) inset,0 18px 40px rgba(0,0,0,0.34);
    display:flex;flex-direction:column;overflow:hidden;}
  .vsplit,.hsplit{position:relative;z-index:3;} .vsplit{cursor:col-resize;} .hsplit{cursor:row-resize;height:6px;}
  .vsplit::after{content:"";position:absolute;inset:0;margin:auto;width:2px;height:34px;border-radius:2px;background:var(--hair);transition:background .15s;}
  .hsplit::after{content:"";position:absolute;inset:0;margin:auto;height:2px;width:34px;border-radius:2px;background:var(--hair);transition:background .15s;}
  .vsplit:hover::after,.hsplit:hover::after,.dragging::after{background:var(--blue);}

  /* DERIVED — a computed / best-effort value (parsed stdout, snapshot diff,
     timestamp delta, token-sum estimate). Dotted underline, NEVER a state
     colour; the title names its source. `.gone` = value not captured. */
  .derived{text-decoration:underline dotted;text-decoration-color:var(--dimmer);text-underline-offset:2px;text-decoration-thickness:from-font;cursor:help;}
  .derived.gone{text-decoration:none;color:var(--dimmer);}

  .rail-h{display:flex;align-items:center;gap:8px;padding:13px 14px 9px;color:var(--dim);font-size:11px;letter-spacing:.14em;text-transform:uppercase;}
  .rail-h .plus{margin-left:auto;width:18px;height:18px;border-radius:6px;display:grid;place-items:center;color:var(--dim);border:1px solid var(--hair);cursor:pointer;}
  .proj{display:flex;align-items:center;gap:7px;padding:5px 14px;color:var(--txt);font-weight:600;font-size:12.5px;} .proj .n{color:var(--dimmer);font-weight:500;}
  .rail-scroll{flex:1;overflow:auto;padding:2px 10px 8px;}
  .srow{display:block;background:var(--inset);border:1px solid var(--inset-hair);border-radius:10px;padding:9px 11px;margin:6px 0;cursor:pointer;transition:border-color .15s,background .15s;}
  .srow:hover{background:rgba(246,240,230,0.04);}
  .srow.sel{border-color:color-mix(in srgb,var(--primary) 60%,transparent);background:linear-gradient(135deg, color-mix(in srgb, var(--primary) 22%, transparent), color-mix(in srgb, var(--primary) 4%, transparent));box-shadow:0 0 0 1px color-mix(in srgb,var(--primary) 30%,transparent);}
  .srow .t{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;} .srow .t .grow{flex:1;}
  .srow .sic{flex:none;display:inline-flex;font-size:14px;}
  .srow .sic.run{color:var(--primary);} .srow .sic.amber{color:var(--warning);} .srow .sic.mist{color:var(--muted-foreground);} .srow .sic.red{color:var(--critical);} .srow .sic.gray,.srow .sic.stale{color:var(--dimmer);}
  @media (prefers-reduced-motion:no-preference){ .srow .sic.run{animation:sicpulse 1.9s ease-in-out infinite;} }
  @keyframes sicpulse{0%,100%{opacity:1;}50%{opacity:.5;}}
  .srow .ttl{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .srow .t .stw{display:inline-flex;align-items:center;gap:5px;color:var(--dim);font-weight:500;font-size:10px;letter-spacing:.03em;flex:none;}
  .srow .t .stw.amber{color:var(--warning);} .srow .t .stw.red{color:var(--critical);}
  .srow .slot{color:var(--dim);font-size:11px;margin:2px 0 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .srow .meta{color:var(--dimmer);font-size:10.5px;font-variant-numeric:tabular-nums;margin:4px 0 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .srow .slot::first-letter,.srow .meta::first-letter{text-transform:uppercase;}
  .srow .ctxrow{display:flex;align-items:center;gap:7px;margin:9px 0 0;}
  .srow .ctxrow .ctxbar{flex:1;width:auto;}
  .srow .ctxrow .ctxpct{color:var(--dimmer);font-size:10px;font-variant-numeric:tabular-nums;flex:none;}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex:none;}
  .dot.run{background:var(--run);box-shadow:0 0 8px rgba(84,104,234,.7);}
  .dot.amber{background:var(--amber);box-shadow:0 0 8px rgba(246,178,60,.6);}
  .dot.mist{background:var(--mist);box-shadow:0 0 7px color-mix(in srgb,var(--mist) 55%,transparent);}
  .dot.gray{background:var(--dimmer);box-shadow:0 0 6px color-mix(in srgb,var(--dimmer) 55%,transparent);}
  .dot.red{background:var(--red);box-shadow:0 0 8px color-mix(in srgb,var(--red) 65%,transparent);}
  .dot.stale{background:var(--stale);box-shadow:0 0 6px rgba(139,131,119,.4);}
  .dock{margin-top:auto;display:flex;align-items:center;gap:9px;padding:11px 14px;border-top:1px solid var(--hair);cursor:pointer;}
  .dock canvas{width:26px;height:26px;border-radius:50%;} .dock .lbl{font-size:12px;} .dock .state{margin-left:auto;color:var(--dimmer);font-size:10px;letter-spacing:.08em;text-transform:uppercase;}
  .session{display:grid;grid-template-rows:auto var(--r-work,1fr) 6px var(--r-term,170px);min-height:0;}
  .shead{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--hair);flex-wrap:wrap;}
  .crumb{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--dim);} .crumb b{color:var(--txt);font-weight:600;} .crumb .sep{color:var(--dimmer);}
  .toggles{margin-left:auto;display:flex;gap:5px;}
  .tg{font-size:11px;color:var(--dim);border:1px solid var(--hair);border-radius:7px;padding:3px 9px;cursor:pointer;display:inline-flex;gap:5px;align-items:center;user-select:none;} .tg.on{color:var(--txt);border-color:rgba(84,104,234,0.55);background:rgba(84,104,234,0.12);}
  .work{display:grid;grid-template-columns:1fr 6px var(--c-det,392px);min-height:0;overflow:hidden;} .work.solo{grid-template-columns:1fr 0 0;}
  .region{display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden;} .region.detail{border-left:1px solid var(--hair);}
  .rhead{display:flex;align-items:center;gap:8px;padding:9px 13px 8px;border-bottom:1px solid var(--hair);min-height:38px;}
  .rhead .icon{color:var(--dim);} .rhead .name{font-size:12px;font-weight:600;} .rhead .grow{flex:1;} .rhead .sub{color:var(--dimmer);font-size:11px;} .rhead .smeta{color:var(--dim);font-size:11px;font-variant-numeric:tabular-nums;} .mref{font-family:var(--mono);color:var(--dim);}
  .ctxbar{display:inline-block;width:48px;height:5px;border-radius:3px;background:rgba(246,240,230,0.09);overflow:hidden;vertical-align:middle;} .ctxbar>span{display:block;height:100%;background:linear-gradient(90deg,var(--primary),color-mix(in srgb,var(--primary) 62%,#ffffff));}
  .rscroll{flex:1;overflow:auto;padding:12px 13px 16px;min-height:0;}
  .inset{background:var(--inset);border:1px solid var(--inset-hair);border-radius:12px;box-shadow:0 1px 0 var(--inset-hi) inset;padding:12px 13px;margin:0 0 12px;} .inset.pad0{padding:0;overflow:hidden;}
  .sect-h{display:flex;align-items:center;gap:8px;color:var(--dim);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;margin:2px 2px 8px;} .sect-h .grow{flex:1;} .sect-h .n{color:var(--dimmer);letter-spacing:0;text-transform:none;}
  .now{display:flex;align-items:center;gap:13px;}
  .now .verb{width:38px;height:38px;border-radius:11px;flex:none;display:grid;place-items:center;font-size:17px;position:relative;background:radial-gradient(circle at 50% 35%,rgba(84,104,234,0.22),rgba(84,104,234,0.05) 70%);border:1px solid rgba(84,104,234,0.35);color:#c4ccf5;}
  .now .verb .pulse{position:absolute;inset:-1px;border-radius:11px;border:1px solid rgba(84,104,234,0.5);animation:pulse 1.8s ease-out infinite;}
  @keyframes pulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.35);opacity:0}} @media (prefers-reduced-motion:reduce){.now .verb .pulse{animation:none;}}
  .now .body{min-width:0;flex:1;} .now .line{font-size:14.5px;font-weight:600;} .now .sub{color:var(--dim);font-size:11px;margin-top:3px;font-variant-numeric:tabular-nums;display:flex;gap:11px;flex-wrap:wrap;} .now .sub .k{color:var(--dimmer);} .now .live{color:var(--run);} .now .orphan{color:var(--stale);font-weight:600;font-variant-emoji:text;}
  .inset.orphaned{border-color:rgba(139,131,119,0.45);}
  .wsrow{display:flex;align-items:center;gap:9px;padding:5px 8px;border-radius:8px;cursor:pointer;font-size:12.5px;} .wsrow:hover{background:rgba(246,240,230,0.035);}
  .wsrow.sel{background:rgba(84,104,234,0.13);box-shadow:inset 0 0 0 1px rgba(84,104,234,0.35);} .wsrow .g{flex:1;} .wsrow .meta{color:var(--dimmer);font-size:11px;} .wsrow .akind{font-size:10px;color:#b3bcef;border:1px solid rgba(84,104,234,0.35);background:rgba(84,104,234,0.10);border-radius:5px;padding:1px 6px;} .wsrow .path{font-family:var(--mono);font-size:11.5px;color:#cbc5bb;} .wsrow .path .d{color:var(--dimmer);}
  .wsrow .fx{font-family:var(--mono);font-size:11px;color:#b3bcef;border:1px solid rgba(84,104,234,0.4);border-radius:5px;padding:0 6px;cursor:pointer;margin-left:6px;} .wsrow .fx:hover{background:rgba(84,104,234,0.14);}
  .wsrow .lbl{font-weight:600;} .vword{color:var(--amber);font-weight:600;}

  /* Checks — branch-level health, keyed to the latest commit + uncommitted work. */
  .checks{display:flex;flex-direction:column;gap:1px;}
  .chkrow{display:flex;align-items:center;gap:9px;padding:5px 8px;border-radius:8px;font-size:12.5px;cursor:pointer;}
  .chkrow:hover{background:rgba(246,240,230,0.035);}
  .chkrow.sel{background:rgba(84,104,234,0.13);box-shadow:inset 0 0 0 1px rgba(84,104,234,0.35);}
  .chkrow .ck{width:15px;text-align:center;flex:none;font-variant-emoji:text;}
  .chkrow .cklbl{color:var(--dim);width:82px;flex:none;}
  .chkrow .ckval{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .chkrow .grow{flex:1;} .chkrow .rerun{color:var(--blue);font-size:11px;flex:none;opacity:0;} .chkrow:hover .rerun,.chkrow:focus-visible .rerun{opacity:1;}
  .ck.pass{color:var(--success);} .ck.fail{color:var(--red);} .ck.warn{color:var(--amber);} .ck.none{color:var(--dimmer);}
  .ck.run{color:var(--primary);} .ck.changes{color:var(--v-changes);} .ck.block{color:var(--v-block);} .ck.approve{color:var(--v-approve);} .ck.partial{color:var(--mist);}
  .ckval.fail{color:#f0928c;} .ckval.warn{color:#f0d093;}
  .branchmeta{color:var(--dimmer);font-size:10.5px;font-variant-numeric:tabular-nums;}

  /* ── Outcomes — the "what got done" spine ── */
  .orow{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:8px;cursor:pointer;font-size:12.5px;}
  .orow:hover{background:rgba(246,240,230,0.035);}
  .orow.sel{background:rgba(84,104,234,0.13);box-shadow:inset 0 0 0 1px rgba(84,104,234,0.35);}
  .orow .otype{width:15px;text-align:center;color:var(--mist);flex:none;font-size:13px;font-variant-emoji:text;} /* type = shape only, neutral slate — never a state colour */
  .orow .otype.prefix{opacity:.45;} /* commit-prefix typing renders at lower authority than skill-declared */
  .orow .otw{color:var(--dim);font-size:11px;width:88px;flex:none;}
  .orow .otitle{color:var(--txt);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .orow .grow{flex:1;}
  .orow .oprov{color:var(--dimmer);font-size:11px;font-family:var(--mono);flex:none;}
  .orow .oroll{color:var(--dim);font-size:11px;font-variant-numeric:tabular-nums;flex:none;} .orow .oroll .pm{color:var(--dimmer);} /* diff-stat is NEUTRAL — colour axis belongs to state */
  .orow .ostate{display:inline-flex;align-items:center;gap:6px;justify-content:flex-end;min-width:82px;flex:none;} /* status pinned right, column-aligned */
  .orow .ostate .sword{color:var(--dim);font-size:10.5px;}
  .omuted{color:var(--dim);font-size:11.5px;padding:7px 9px;font-style:italic;}
  .sumpeer{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer;color:var(--dim);font-size:12px;}
  .sumpeer:hover{background:rgba(246,240,230,0.03);} .sumpeer .cv{color:var(--dimmer);width:10px;flex:none;} .sumpeer .grow{flex:1;} .sumpeer .meta{color:var(--dimmer);font-size:11px;font-variant-numeric:tabular-nums;}
  .peerdiv{border-top:1px solid var(--inset-hair);margin:4px 2px;}
  .sumpeer .go{color:var(--dimmer);margin-left:4px;}
  /* Detail: file diffs grouped by commit message */
  .cgroup{margin:0 0 14px;} .cghead{display:flex;align-items:center;gap:8px;padding:6px 4px 8px;font-size:11.5px;}
  .cghead .sha{font-family:var(--mono);color:var(--mist);} .cghead .cmsg{color:var(--txt);font-weight:600;} .cghead .grow{flex:1;} .cghead .cgn{color:var(--dimmer);font-size:10.5px;}
  .cghead.wip .cmsg{color:var(--amber);}

  /* ── Run / phase / agent (the fan-out) ── */
  .run{margin:0 0 6px;}
  .run-h{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:9px;cursor:pointer;} .run-h:hover{background:rgba(246,240,230,0.035);}
  .run-h.sel{background:rgba(84,104,234,0.13);box-shadow:inset 0 0 0 1px rgba(84,104,234,0.35);}
  .run-h .cv{color:var(--dimmer);font-size:10px;width:10px;flex:none;} .run-h .kind{font-size:14px;flex:none;font-variant-emoji:text;}
  /* chevrons are real buttons (own control for expand/collapse), reset native chrome */
  button.cv{background:none;border:none;margin:0;padding:0;font:inherit;color:inherit;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;} button.cv:hover{color:var(--txt);}
  .run-h .rn{font-weight:600;font-size:13px;} .run-h .kw{font-size:10px;letter-spacing:.03em;color:var(--dim);border:1px solid var(--hair);border-radius:5px;padding:1px 6px;}
  .run-h .grow{flex:1;} .run-h .rm{color:var(--dimmer);font-size:11px;font-variant-numeric:tabular-nums;}
  .phases{margin:1px 0 4px 8px;border-left:1px solid var(--inset-hair);padding-left:4px;}
  .ph{}
  .ph-h{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;cursor:pointer;} .ph-h:hover{background:rgba(246,240,230,0.03);}
  .ph-h.sel{background:rgba(84,104,234,0.11);}
  .ph-h .rail{width:4px;align-self:stretch;border-radius:2px;flex:none;background:var(--dimmer);}
  .rail.done{background:var(--mist);} .rail.run{background:var(--run);} .rail.fail{background:var(--red);} .rail.amber{background:var(--amber);} .rail.stale{background:var(--stale);} .rail.queued{background:var(--dimmer);}
  .ph-h .cv{color:var(--dimmer);font-size:10px;width:10px;flex:none;}
  .ph-h .pn{font-weight:600;font-size:12.5px;} .ph-h .grow{flex:1;}
  .ph-h .trip{color:var(--dim);font-size:11px;font-variant-numeric:tabular-nums;} .ph-h .st{font-size:11px;} .st.done{color:var(--mist);} .st.run{color:var(--run);} .st.fail{color:var(--red);} .st.amber{color:var(--amber);} .st.stale{color:var(--stale);} .st.queued{color:var(--dimmer);}
  .agents{margin:2px 0 4px 20px;}
  .filterbar{display:flex;align-items:center;gap:6px;padding:3px 8px 6px;color:var(--dimmer);font-size:10.5px;}
  .fchip{border:1px solid var(--hair);border-radius:6px;padding:1px 8px;cursor:pointer;color:var(--dim);} .fchip.on{color:var(--txt);border-color:rgba(84,104,234,0.5);background:rgba(84,104,234,0.12);}
  .arow{display:flex;align-items:center;gap:9px;padding:4px 8px;border-radius:7px;cursor:pointer;} .arow:hover{background:rgba(246,240,230,0.035);}
  .arow.sel{background:rgba(84,104,234,0.13);box-shadow:inset 0 0 0 1px rgba(84,104,234,0.35);}
  .arow .aid{font-family:var(--mono);font-size:11px;color:var(--dimmer);flex:none;width:34px;}
  .arow .al{font-size:12px;color:var(--txt);} .arow .grow{flex:1;}
  /* shadcn Badge — soft semantic variant: subtle fill + hairline border, medium
     label. Verdict told apart by SHAPE-icon + colour+word, never colour alone. */
  .badge,.vtag{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:500;line-height:1.5;padding:1.5px 7px;border-radius:6px;border:1px solid transparent;white-space:nowrap;flex:none;font-variant-numeric:tabular-nums;}
  .badge .ic,.vtag .ic{opacity:.85;}
  .badge.success,.vtag.approve{color:#84dcad;background:color-mix(in srgb,var(--success) 13%,transparent);border-color:color-mix(in srgb,var(--success) 24%,transparent);}
  .badge.warning,.vtag.changes{color:#f0c684;background:color-mix(in srgb,var(--warning) 13%,transparent);border-color:color-mix(in srgb,var(--warning) 24%,transparent);}
  .badge.critical,.vtag.block{color:#f2938a;background:color-mix(in srgb,var(--critical) 13%,transparent);border-color:color-mix(in srgb,var(--critical) 24%,transparent);}
  .badge.secondary,.vtag.neutral{color:var(--dim);background:rgba(246,240,230,0.055);border-color:var(--hair);}
  .vtag.source{color:#b3bcef;background:color-mix(in srgb,var(--primary) 12%,transparent);border-color:color-mix(in srgb,var(--primary) 26%,transparent);}
  .arow .am{color:var(--dim);font-size:10.5px;font-variant-numeric:tabular-nums;}
  .stw{color:var(--dim);font-size:10.5px;} /* text fallback so lifecycle isn't colour-only */
  .arow .nestflag{font-size:10px;color:#b3bcef;border:1px solid rgba(84,104,234,0.3);border-radius:5px;padding:0 5px;}
  .morerow{padding:5px 8px;color:var(--blue);font-size:11px;cursor:pointer;}

  /* Timeline */
  .msg{border-left:2px solid var(--inset-hair);padding:2px 0 2px 11px;margin:0 2px 3px;} .msg.run{border-left-color:var(--run);} .msg.done{border-left-color:rgba(154,147,138,0.4);}
  .msg-head{display:flex;align-items:flex-start;gap:8px;padding:5px 4px;} .msg-head .say{font-size:12.5px;line-height:1.45;color:var(--txt);flex:1;} .msg-head .sd{flex:none;margin-top:5px;}
  .tierline{font-size:11px;color:var(--dim);margin:8px 2px 0;line-height:1.6;} .tierline b{color:var(--txt);} .tierline .tk{font-weight:600;}
  .tierline .tk.direct{color:#e3ded5;} .tierline .tk.derived{color:#c4beb3;text-decoration:underline dotted;text-decoration-color:var(--dimmer);text-underline-offset:2px;} .tierline .tk.conv{color:#b3bcef;}

  /* Detail */
  .dtabs{display:flex;gap:2px;padding:7px 12px;border-bottom:1px solid var(--hair);align-items:center;flex-wrap:wrap;}
  .dtab{font-size:11.5px;color:var(--dim);padding:4px 10px;border-radius:7px;cursor:pointer;} .dtab.on{color:var(--txt);background:rgba(246,240,230,0.06);}
  .scopejump{margin-left:auto;font-size:11px;color:var(--blue);cursor:pointer;}
  .feed{font-family:var(--mono);font-size:11.5px;line-height:1.6;color:#c2bcb1;white-space:pre-wrap;} .feed .p{color:var(--dim);} .feed .a{color:#6fdda6;} .feed .r{color:#f0928c;} .feed .w{color:#f0d093;}
  .doc{font-size:12.5px;line-height:1.7;color:#cfc9be;} .doc b{color:#fff;} .doc code{font-family:var(--mono);font-size:11px;color:#cbc5bb;background:rgba(246,240,230,0.05);padding:1px 4px;border-radius:4px;}
  .doc .fnpath{font-family:var(--mono);font-size:11px;color:var(--dimmer);display:block;margin-bottom:8px;}
  .fdiff{margin:0 0 10px;} .fdhead{display:flex;align-items:center;gap:8px;padding:8px 11px;border-bottom:1px solid var(--inset-hair);font-size:11.5px;cursor:pointer;}
  .fkind{display:inline-flex;align-items:center;color:var(--dim);font-size:14px;flex:none;} .fpath{font-family:var(--mono);color:#cbc5bb;font-size:11px;} .fdhead .grow{flex:1;} .fdhead .add{color:var(--dimmer);} .fdhead .del{color:var(--dimmer);}
  .viewed{display:inline-flex;align-items:center;gap:4px;color:var(--dimmer);font-size:10.5px;cursor:pointer;margin-left:6px;} .viewed input{accent-color:var(--blue);margin:0;}
  .fdiff.viewed-on{opacity:.62;} .fdiff.viewed-on .fpath{text-decoration:line-through;}
  .hunk{font-family:var(--mono);font-size:11px;line-height:1.55;padding:9px 11px;white-space:pre-wrap;} .hunk .a{color:#6fdda6;} .hunk .r{color:#f0928c;} .hunk .m{color:var(--dimmer);}
  .promptbox{font-family:var(--mono);font-size:11.5px;line-height:1.6;color:#c2bcb1;white-space:pre-wrap;background:rgba(0,0,0,0.22);border:1px solid var(--inset-hair);border-radius:10px;padding:11px 12px;}
  .verdict{font-size:12.5px;line-height:1.6;color:#cfc9be;} .verdict .vhead{font-weight:700;font-size:13px;margin-bottom:6px;} .verdict .vhead.changes{color:var(--v-changes);} .verdict .vhead.approve{color:var(--v-approve);} .verdict .vhead.block{color:var(--v-block);} .verdict .vhead.neutral{color:var(--dim);}
  .verdict li{margin:3px 0;}
  .empty{color:var(--dimmer);font-size:12px;padding:8px 2px;}

  /* Commit / Merge — a two-stage "ship this work" card. Stage 1 commits the
     uncommitted files (accent primary). Stage 2 merges the worktree branch to
     main behind an explicit review+tests gate. Each state fact shown exactly ONCE. */
  .commitcta{background:rgba(84,104,234,0.06);border:1px solid rgba(84,104,234,0.26);border-radius:12px;margin:0 0 13px;overflow:hidden;}
  .cstage{padding:11px 12px;}
  .commitcta .top{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;} .commitcta .top .g{color:var(--mist);}
  .commitcta .branchmeta{color:var(--dimmer);font-size:11px;font-weight:500;font-variant-numeric:tabular-nums;}
  .commitcta .msg{font-family:var(--mono);font-size:11.5px;color:#cbc5bb;background:rgba(0,0,0,0.22);border:1px solid var(--inset-hair);border-radius:7px;padding:6px 9px;margin:9px 0 10px;display:flex;align-items:center;gap:9px;}
  .commitcta .msg .draft{color:var(--dimmer);font-size:9px;text-transform:uppercase;letter-spacing:.1em;flex:none;border:1px solid var(--hair);border-radius:4px;padding:1px 5px;}
  .commitcta .msg .g{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#dcd6cc;}
  .commitcta .msg .redraft{color:var(--primary);cursor:pointer;flex:none;display:inline-flex;}
  .commitcta .btn{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg, color-mix(in srgb,var(--primary) 96%,#ffffff 10%), var(--primary));color:var(--primary-foreground);border:1px solid color-mix(in srgb,var(--primary) 55%,transparent);border-radius:8px;padding:7px 13px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;}
  .commitcta .btn[disabled]{opacity:.45;cursor:not-allowed;}

  /* Stage 2 — merge behind its own labelled gate. Gate rows spell out each
     prerequisite's real state, so "why disabled" is self-evident (no hint text). */
  .mstage{border-top:1px solid var(--inset-hair);background:rgba(0,0,0,0.16);padding:11px 12px;}
  .mstage-h{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px;}
  .mstage-h .ic{font-size:13px;}
  .mstage-h .mono{font-family:var(--mono);text-transform:none;letter-spacing:0;color:var(--mist);font-weight:500;}
  .mgrow{display:flex;align-items:center;gap:10px;font-size:11.5px;padding:2.5px 0;}
  .mgrow .mgk{color:var(--dim);width:50px;flex:none;}
  .mgrow .mgv{display:inline-flex;align-items:center;gap:5px;}
  .mgrow .mgv.ok{color:var(--success);} .mgrow .mgv.warn{color:var(--warning);} .mgrow .mgv.wait{color:var(--primary);}
  .mstage-act{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:11px;}
  .mbtn{display:inline-flex;align-items:center;gap:6px;border-radius:8px;padding:7px 13px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;
    background:linear-gradient(135deg, color-mix(in srgb,var(--primary) 96%,#ffffff 10%), var(--primary));color:var(--primary-foreground);border:1px solid color-mix(in srgb,var(--primary) 55%,transparent);}
  .mbtn[disabled]{opacity:.4;cursor:not-allowed;background:transparent;color:var(--dim);border-color:var(--hair);}

  /* Artifacts — stacked collapsible cards, same visual family as file diffs
     (a title bar you expand/collapse), so any number of them stack cleanly. */
  .acard{background:var(--inset);border:1px solid var(--inset-hair);border-radius:12px;box-shadow:0 1px 0 var(--inset-hi) inset;margin:0 0 10px;overflow:hidden;}
  .achead{display:flex;align-items:center;gap:8px;padding:9px 11px;cursor:pointer;font-size:11.5px;}
  .achead .cv{color:var(--dimmer);font-size:10px;width:9px;flex:none;}
  .achead .ai{color:var(--mist);flex:none;font-variant-emoji:text;}
  .achead .apath{font-family:var(--mono);color:#cbc5bb;font-size:11.5px;}
  .achead .grow{flex:1;} .achead .amiss{color:var(--amber);font-size:10.5px;font-variant-emoji:text;}
  .acbody{padding:11px 13px;border-top:1px solid var(--inset-hair);}
  .acard.gone .apath{color:var(--dimmer);text-decoration:line-through;}

  .detbtns{display:flex;gap:8px;margin:12px 0 4px;}
  .detbtn{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--dim);border:1px solid var(--hair);border-radius:8px;padding:5px 11px;cursor:pointer;background:transparent;font-family:inherit;}
  .detbtn.primary{color:#e3ded5;border-color:rgba(84,104,234,0.5);background:rgba(84,104,234,0.10);}
  .kv{display:flex;gap:8px;font-size:11.5px;color:var(--dim);margin:2px 0;} .kv .k{color:var(--dimmer);width:64px;flex:none;}

  .term{display:grid;grid-template-rows:auto 1fr;min-height:0;border-top:1px solid var(--hair-strong);}
  .term-h{display:flex;align-items:center;gap:8px;padding:7px 13px;background:rgba(10,13,19,0.5);color:var(--dim);font-size:11px;} .term-h .grow{flex:1;} .term-h .x{cursor:pointer;color:var(--dimmer);}
  .term-body{background:#0c0a08;color:#c2bcb1;font-family:var(--mono);font-size:12px;line-height:1.55;padding:10px 13px;overflow:auto;white-space:pre-wrap;outline:none;} .term-body .p{color:var(--run);} .term-body .dim{color:var(--dimmer);}
  .caret{display:inline-block;width:7px;height:14px;background:#c2bcb1;vertical-align:-2px;animation:blink 1.1s steps(1) infinite;} @keyframes blink{50%{opacity:0}}
  .hint{position:fixed;left:16px;bottom:12px;z-index:5;color:var(--dim);font-size:10.5px;}
  /* keyboard reachability — every [onclick] control joins the tab order (see wireA11y) */
  [tabindex]:focus-visible{outline:2px solid var(--blue);outline-offset:1px;border-radius:6px;}
  .term-body:focus-visible{outline:none;box-shadow:inset 0 0 0 1px var(--blue);}
</style>
</head>

<script>
/* Phosphor-Light icon → inline <use> of the sprite symbol. State is carried by
   the TINT (currentColor) of the enclosing span, never by weight/fill. */
const ic=(n,x)=>`<svg class="ic${x?' '+x:''}"><use href="#i-${n}"/></svg>`;
/* lifecycle → the leading session icon when no explicit action icon is set */
const STATE_ICON={run:'circle-notch',amber:'warning',mist:'check',red:'x',gray:'circle',stale:'circle'};

/* Rail sessions. "Deep research" is NOT here — it lives as a sub-run of Auth
   hardening (see RESEARCH), so it must not also appear as a peer session with
   the same totals (that double-counts its tokens). One home per node. */
const SESSIONS=[
  {title:'Auth hardening',slot:'orchestrator · 2 runs · synthesizing',meta:'opus · SESSION_TOTAL tokens · 22m',ctx:44,dot:'run',act:'sparkle',sel:true},
  {title:'Why is CI flaky',slot:'reproducing at parallelism=4',meta:'opus · 64K tokens · 8m',ctx:18,dot:'run',act:'magnifying-glass'},
  {title:'Legacy token cleanup',slot:'awaiting you: keep or drop the legacy path?',meta:'sonnet · 96K tokens · 26m',ctx:37,dot:'amber'},
];

/* build 20 council reviewers — real-shaped: virgin-context reviewers, each
   judging one aspect of the auth-rotation diff; most approve, a couple
   return changes, one still running. */
const ASPECTS=['token rotation core','refresh store write','legacy verify() path','audience-claim handling','error taxonomy','concurrency / races','test coverage','public API surface','logging & redaction','migration safety','rate-limit interaction','clock-skew tolerance','revocation path','session fixation','CSRF surface','dependency delta','config defaults','backwards compat','docs & comments','perf hot path'];
function mkReviewer(i){
  const id='r-'+String(i+1).padStart(2,'0');
  let verdict='approve', life='done';
  if(i===6) verdict='block'; else if(i===12) verdict='changes'; else if(i===19){ verdict='run'; life='run'; }
  const prompt=`You are a reviewer with a VIRGIN context. Review ONLY the "${ASPECTS[i]}" aspect of the auth-rotation diff.\nReturn: approve, or changes with a numbered finding list (severity: blocking | advisory).\nDo not edit code. Do not ask the user.`;
  let result;
  if(verdict==='approve') result={head:'approve',cls:'approve',body:'<li>No issues on this aspect. Change reads correctly and stays within scope.</li>'};
  else if(verdict==='block') result={head:'changes · 2 blocking',cls:'block',body:'<li><b>blocking</b> — verify() no longer checks the audience claim; a token minted for service A verifies for B.</li><li><b>blocking</b> — rotation issues the pair before store.put() commits; a crash leaves an orphaned token.</li>'};
  else if(verdict==='changes') result={head:'changes · 1 advisory',cls:'changes',body:'<li><b>advisory</b> — loader does an N+1 read per token; batch it.</li>'};
  else result=null;
  return {id,label:ASPECTS[i],role:'review',life,verdict,prompt,result,
    tk:(6+i%5),ctx:(12+(i%5)*6),time:(2+i%4)+'m',
    art:`${id}.md`,
    feed:`▸ Read diff (blind)\n▸ Grep call sites of the touched fns\n▸ ${verdict==='approve'?'no findings':'findings emitted'}`};
}
/* token totals are NOT stored — runHtml/phaseHtml compute them bottom-up from
   agent.tk so every level reconciles (Σ = own + Σ children). Only agent-count,

function phaseHtml(run,p){

  const trip=`${p.agents.length} agents · ${phaseTk(p)}K tokens${p.time&&p.time!=='—'?' · '+p.time:''}`;
  let inner='';
  if(open){
    /* attention-first: changes/blocking, then running, then done, then queued */
    const rank=a=>(a.verdict==='block'||a.verdict==='changes')?0:a.life==='run'?1:a.life==='queued'?3:2;

/* roll-up copy branches on run KIND and STATUS — a Pipeline never says 'all
   clear'; an in-flight phase never claims done. Upheld-blocking verifiers (now
   verdict:'block') enter the changes set and are never counted as clear. */
function unionBody(m){
  const run=m.run||m.parentRun; const kind=m.kindLabel||(run&&run.kind)||'Batch';
  const agents=m.phase?m.phase.agents:run.phases.flatMap(p=>p.agents);
  const done=agents.filter(a=>a.life==='done'), running=agents.filter(a=>a.life==='run'), queued=agents.filter(a=>a.life==='queued');
  const inflight=running.length+queued.length;
  const changes=agents.filter(a=>a.verdict==='changes'||a.verdict==='block');
  let headCls,head;
  if(kind==='Pipeline'){
    const sources=agents.reduce((n,a)=>n+(a.role==='search'&&a.life==='done'?(parseInt(a.vlabel)||0):0),0);
    headCls=inflight?'neutral':'approve';
    head=inflight?`${done.length}/${agents.length} stages done · ${running.length} running`:`${sources} sources gathered`;
  } else if(changes.length){ headCls='changes'; head=`${changes.length} returned changes`; }
  else if(inflight){ headCls='neutral'; head=`no findings yet · ${running.length} running · ${queued.length} queued`; }
  else { headCls='approve'; head='all clear'; }
  return `<div class="verdict">
    <div class="vhead ${headCls}">Rolled up · ${head}</div>
    <div style="color:var(--dim);margin-bottom:8px">${agents.length} agents · ${done.length} done · ${running.length} running · ${queued.length} queued</div>
    ${changes.length?'<b>Findings to read:</b><ul>'+changes.map(a=>`<li>${a.id} · ${a.label} — ${a.verdict==='block'?'blocking':'advisory'}</li>`).join('')+'</ul>':''}
    <div style="color:var(--dimmer);margin-top:8px">Each agent keeps its full prompt + result.</div></div>`;
}
function agentTabs(a){

const commitOf=f=>COMMITS.find(c=>c.files.includes(f.p));

function wireSplitters(){
  document.querySelectorAll('[data-split]').forEach(el=>{
    el.addEventListener('pointerdown',e=>{e.preventDefault();el.setPointerCapture(e.pointerId);el.classList.add('dragging');
      const kind=el.dataset.split,sx=e.clientX,sy=e.clientY,root=document.documentElement.style,cs=getComputedStyle(document.documentElement);
      const sRail=parseInt(cs.getPropertyValue('--c-rail'))||236,sDet=parseInt(cs.getPropertyValue('--c-det'))||392,sTerm=parseInt(cs.getPropertyValue('--r-term'))||170;
      const move=ev=>{if(kind==='rail')root.setProperty('--c-rail',Math.max(190,Math.min(360,sRail+(ev.clientX-sx)))+'px');
        if(kind==='detail')root.setProperty('--c-det',Math.max(300,Math.min(680,sDet-(ev.clientX-sx)))+'px');
        if(kind==='term')root.setProperty('--r-term',Math.max(92,Math.min(innerHeight*0.6,sTerm-(ev.clientY-sy)))+'px');};
      const up=()=>{el.classList.remove('dragging');removeEventListener('pointermove',move);removeEventListener('pointerup',up);};
      addEventListener('pointermove',move);addEventListener('pointerup',up);});
  });
}

  c.clearRect(0,0,52,52);const g=c.createRadialGradient(cx,cy,R*0.7,cx,cy,R*2);g.addColorStop(0,glow+'0.5)');g.addColorStop(1,glow+'0)');
  c.fillStyle=g;c.beginPath();c.arc(cx,cy,R*2,0,7);c.fill();c.beginPath();c.arc(cx,cy,R,0,7);c.fillStyle='#05070c';c.fill();c.lineWidth=1.4;c.strokeStyle=rim;c.beginPath();c.arc(cx,cy,R,0,7);c.stroke();}
