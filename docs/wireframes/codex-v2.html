<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Argo · Codex · v2 · unified Timeline</title>
<style>
  /* Codex degrade surface, re-skinned to the LOCKED system (argo-tokens.css).
     A session actor + a single flat chronological Timeline of typed steps
     (message · reasoning · command · file change). NO Turns, NO user-prompt
     rows. NO run/phase/batch/pipeline chrome, NO verdict rollups (Claude-only).
     A command awaiting approval derives up to the SESSION showing needs-you. */
  :root{
    color-scheme:dark;
    /* shadcn/ui system tokens (argo-tokens.css · warm graphite neutrals + indigo accent) */
    --background:#0b0a08; --foreground:#efece6;
    --card:#16130f; --card-foreground:#efece6;
    --popover:#1c1813; --popover-foreground:#efece6;
    --primary:#5468ea; --primary-foreground:#ffffff;
    --secondary:#211d17; --secondary-foreground:#e7e2da;
    --muted:#211d17; --muted-foreground:#9a938a;
    --accent:#5468ea; --accent-foreground:#ffffff;
    --destructive:#e84a45; --destructive-foreground:#ffeceb;
    --border:rgba(246,240,230,.09); --input:rgba(246,240,230,.13); --ring:#5468ea;
    --success:#24ce7c; --success-foreground:#04140c;
    --warning:#f6b23c; --warning-foreground:#1a1204;
    --critical:#f5564f; --critical-foreground:#1b0908;
    --sidebar:#0e0c09; --sidebar-foreground:#d9d4cc; --sidebar-primary:#5468ea;
    --sidebar-accent:rgba(84,104,234,.14); --sidebar-border:rgba(246,240,230,.07);
    --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    --font-mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    /* legacy wireframe tokens remapped onto the system (SEMANTIC MAPPING) */
    --ground:var(--background); --panel:rgba(22,19,15,0.55);
    --hair:var(--border); --hair-strong:var(--input); --top-hi:rgba(246,240,230,0.08);
    --inset:rgba(246,240,230,0.022); --inset-hair:rgba(246,240,230,0.065); --inset-hi:rgba(246,240,230,0.04);
    --txt:var(--foreground); --dim:var(--muted-foreground); --dimmer:#8b8377;
    --blue:var(--primary); --run:var(--primary); --amber:var(--warning); --red:var(--critical); --mist:var(--muted-foreground);
    --v-approve:var(--success); --v-changes:var(--warning); --v-block:var(--critical); --stale:var(--dimmer);
    --mono:var(--font-mono); --sans:var(--font-sans);
  }
  /* ── TYPE SYSTEM roles (argo-tokens.css) — available as .t-* classes ── */
  .t-hero    {font:700 28px/1.15 var(--font-sans);letter-spacing:-0.01em;color:var(--foreground);}
  .t-title   {font:600 17px/1.2  var(--font-sans);letter-spacing:-0.006em;color:var(--foreground);}
  .t-subtitle{font:600 14px/1.3  var(--font-sans);color:var(--foreground);}
  .t-eyebrow {font:600 11px/1.1  var(--font-sans);letter-spacing:0.14em;text-transform:uppercase;color:var(--muted-foreground);}
  .t-body    {font:400 13px/1.35 var(--font-sans);color:var(--foreground);}
  .t-label   {font:500 12px/1.3  var(--font-sans);color:var(--foreground);}
  .t-meta    {font:500 11px/1.3  var(--font-sans);letter-spacing:0.01em;color:var(--dimmer);font-variant-numeric:tabular-nums;}
  .t-micro   {font:500 10px/1.2  var(--font-sans);letter-spacing:0.03em;color:var(--muted-foreground);}
  .t-mono    {font:400 12px/1.5  var(--font-mono);}
  .t-mono-in {font:450 11px/1.3  var(--font-mono);letter-spacing:0;}
  *{box-sizing:border-box;}
  /* Phosphor Light inline-icon helper — 1em, currentColor so the state token tints it. */
  .ic{width:1em;height:1em;display:inline-block;vertical-align:-0.14em;flex:none;fill:currentColor;}
  .ic.sm{width:.86em;height:.86em;}
  html,body{margin:0;height:100%;}
  body{font-family:var(--sans);color:var(--txt);font-size:13px;background:var(--ground);overflow:hidden;}
  #sky{position:fixed;inset:0;z-index:0;overflow:hidden;}
  #sky .glow{position:absolute;left:50%;bottom:-38%;transform:translateX(-50%);width:150vw;height:110vh;border-radius:50%;
    background:radial-gradient(closest-side,rgba(84,104,234,0.20),rgba(84,104,234,0.05) 55%,transparent 72%);filter:blur(20px);}
  #sky .glow.warm{width:70vw;height:50vh;bottom:-14%;opacity:.5;background:radial-gradient(closest-side,rgba(242,140,77,0.16),transparent 70%);}
  #sky canvas{position:absolute;inset:0;width:100%;height:100%;}
  .app{position:relative;z-index:1;height:100vh;display:grid;grid-template-columns:var(--c-rail,236px) 6px 1fr;padding:12px;}
  .panel{position:relative;min-width:0;min-height:0;background:var(--panel);
    -webkit-backdrop-filter:blur(22px) saturate(1.2);backdrop-filter:blur(22px) saturate(1.2);
    border:1px solid var(--hair);border-radius:14px;box-shadow:0 1px 0 var(--top-hi) inset,0 18px 40px rgba(0,0,0,0.34);
    display:flex;flex-direction:column;overflow:hidden;}
  .vsplit,.hsplit{position:relative;z-index:3;} .vsplit{cursor:col-resize;} .hsplit{cursor:row-resize;height:6px;}
  .vsplit::after{content:"";position:absolute;inset:0;margin:auto;width:2px;height:34px;border-radius:2px;background:var(--hair);transition:background .15s;}
  .hsplit::after{content:"";position:absolute;inset:0;margin:auto;height:2px;width:34px;border-radius:2px;background:var(--hair);transition:background .15s;}
  .vsplit:hover::after,.hsplit:hover::after,.dragging::after{background:var(--blue);}
  /* DERIVED — a computed / best-effort value (parsed stdout, timestamp delta,
     patch line-count). Dotted underline, NEVER a state colour; the title names
     its source. `.gone` = value not captured. */
  .derived{text-decoration:underline dotted;text-decoration-color:var(--dimmer);text-underline-offset:2px;text-decoration-thickness:from-font;cursor:help;}
  .derived.gone{text-decoration:none;color:var(--dimmer);}

  /* Rail */
  .rail-h{display:flex;align-items:center;gap:8px;padding:13px 14px 9px;color:var(--muted-foreground);font:600 11px/1.1 var(--sans);letter-spacing:.14em;text-transform:uppercase;}
  .rail-h .plus{margin-left:auto;width:18px;height:18px;border-radius:6px;display:grid;place-items:center;color:var(--dim);border:1px solid var(--hair);cursor:pointer;}
  .proj{display:flex;align-items:center;gap:7px;padding:5px 14px;color:var(--txt);font-weight:600;font-size:12.5px;} .proj .n{color:var(--dimmer);font-weight:500;}
  .rail-scroll{flex:1;overflow:auto;padding:2px 10px 8px;}
  .srow{display:block;background:var(--inset);border:1px solid var(--inset-hair);border-radius:10px;padding:9px 11px;margin:6px 0;cursor:pointer;transition:border-color .15s,background .15s;}
  .srow:hover{background:rgba(246,240,230,0.04);}
  .srow.sel{border-color:color-mix(in srgb,var(--primary) 60%,transparent);background:linear-gradient(135deg, color-mix(in srgb, var(--primary) 22%, transparent), color-mix(in srgb, var(--primary) 4%, transparent));box-shadow:0 0 0 1px color-mix(in srgb,var(--primary) 30%,transparent);}
  .srow .t{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;} .srow .t .grow{flex:1;}
  .srow .sic{flex:none;display:inline-flex;font-size:14px;}
  .srow .sic.run{color:var(--primary);} .srow .sic.amber{color:var(--warning);} .srow .sic.mist{color:var(--muted-foreground);} .srow .sic.red{color:var(--critical);} .srow .sic.gray,.srow .sic.stale{color:var(--dimmer);}
  @media (prefers-reduced-motion:no-preference){ .srow .sic.run{animation:sicpulse 1.9s ease-in-out infinite;} }
  @keyframes sicpulse{0%,100%{opacity:1;}50%{opacity:.5;}}
  .srow .ttl{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .srow .t .stw{display:inline-flex;align-items:center;gap:5px;color:var(--dim);font-weight:500;font-size:10px;letter-spacing:.03em;flex:none;}
  .srow .t .stw.amber{color:var(--warning);} .srow .t .stw.red{color:var(--critical);}
  .srow .slot{color:var(--dim);font-size:11px;margin:2px 0 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .srow .meta{color:var(--dimmer);font-size:10.5px;font-variant-numeric:tabular-nums;margin:4px 0 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .srow .slot::first-letter,.srow .meta::first-letter{text-transform:uppercase;}
  .srow .ctxrow{display:flex;align-items:center;gap:7px;margin:9px 0 0;}
  .srow .ctxrow .ctxbar{flex:1;width:auto;}
  .srow .ctxrow .ctxpct{color:var(--dimmer);font-size:10px;font-variant-numeric:tabular-nums;flex:none;}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex:none;}
  .dot.run{background:var(--run);box-shadow:0 0 8px rgba(84,104,234,.7);}
  .dot.amber{background:var(--amber);box-shadow:0 0 8px rgba(246,178,60,.6);}
  .dot.mist{background:var(--mist);box-shadow:0 0 7px color-mix(in srgb,var(--mist) 55%,transparent);}
  .dot.gray{background:var(--dimmer);box-shadow:0 0 6px color-mix(in srgb,var(--dimmer) 55%,transparent);}
  .dot.red{background:var(--red);box-shadow:0 0 8px color-mix(in srgb,var(--red) 65%,transparent);}
  .dot.stale{background:var(--stale);box-shadow:0 0 6px rgba(139,131,119,.4);}
  .dock{margin-top:auto;display:flex;align-items:center;gap:9px;padding:11px 14px;border-top:1px solid var(--hair);cursor:pointer;}
  .dock canvas{width:26px;height:26px;border-radius:50%;} .dock .lbl{font-size:12px;}
  .dock .state{margin-left:auto;color:var(--dimmer);font-size:10px;letter-spacing:.08em;text-transform:uppercase;}

  /* Session card */
  .session{display:grid;grid-template-rows:auto var(--r-work,1fr) 6px var(--r-term,170px);min-height:0;}
  .shead{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--hair);flex-wrap:wrap;}
  .crumb{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--dim);} .crumb b{color:var(--txt);font-weight:600;} .crumb .sep{color:var(--dimmer);}
  .smeta{display:flex;align-items:center;gap:7px;color:var(--dim);font-size:11px;font-variant-numeric:tabular-nums;}
  .mref{font-family:var(--mono);color:var(--dim);}
  .ctxbar{display:inline-block;width:48px;height:5px;border-radius:3px;background:rgba(246,240,230,0.09);overflow:hidden;vertical-align:middle;}
  .ctxbar>span{display:block;height:100%;background:linear-gradient(90deg,var(--primary),color-mix(in srgb,var(--primary) 62%,#ffffff));}
  .toggles{margin-left:auto;display:flex;gap:5px;}
  .tg{font-size:11px;color:var(--dim);border:1px solid var(--hair);border-radius:7px;padding:3px 9px;cursor:pointer;display:inline-flex;gap:5px;align-items:center;user-select:none;}
  .tg.on{color:var(--txt);border-color:rgba(84,104,234,0.55);background:rgba(84,104,234,0.12);}

  .work{display:grid;grid-template-columns:1fr 6px var(--c-det,400px);min-height:0;overflow:hidden;}
  .work.solo{grid-template-columns:1fr 0 0;}
  .region{display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden;}
  .region.detail{border-left:1px solid var(--hair);}
  .rhead{display:flex;align-items:center;gap:8px;padding:9px 13px 8px;border-bottom:1px solid var(--hair);min-height:38px;}
  .rhead .icon{color:var(--dim);} .rhead .name{font-size:12px;font-weight:600;} .rhead .grow{flex:1;} .rhead .sub{color:var(--dimmer);font-size:11px;}
  .rscroll{flex:1;overflow:auto;padding:12px 13px 16px;min-height:0;}
  .inset{background:var(--inset);border:1px solid var(--inset-hair);border-radius:12px;box-shadow:0 1px 0 var(--inset-hi) inset;padding:12px 13px;margin:0 0 12px;}
  .inset.pad0{padding:0;overflow:hidden;}
  .sect-h{display:flex;align-items:center;gap:8px;color:var(--muted-foreground);font:600 11px/1.1 var(--sans);letter-spacing:.14em;text-transform:uppercase;margin:2px 2px 8px;}
  .sect-h .grow{flex:1;} .sect-h .n{color:var(--dimmer);letter-spacing:0;text-transform:none;}

  /* Now-line — liveness independent of any approval gate. Running = INDIGO. */
  .now{display:flex;align-items:center;gap:13px;}
  .now .verb{width:38px;height:38px;border-radius:11px;flex:none;display:grid;place-items:center;font-size:17px;position:relative;
    background:radial-gradient(circle at 50% 35%,rgba(84,104,234,0.22),rgba(84,104,234,0.05) 70%);border:1px solid rgba(84,104,234,0.35);color:#c4ccf5;}
  .now .verb .pulse{position:absolute;inset:-1px;border-radius:11px;border:1px solid rgba(84,104,234,0.5);animation:pulse 1.8s ease-out infinite;}
  @keyframes pulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.35);opacity:0}} @media (prefers-reduced-motion:reduce){.now .verb .pulse{animation:none;}}
  .now .body{min-width:0;flex:1;} .now .line{font-size:14.5px;font-weight:600;} .now .line .mono{font-family:var(--mono);color:#eef0fb;}
  .now .sub{color:var(--dim);font-size:11px;margin-top:3px;font-variant-numeric:tabular-nums;display:flex;gap:11px;flex-wrap:wrap;} .now .sub .k{color:var(--dimmer);} .now .live{color:var(--run);}
  .now .orphan{color:var(--stale);font-weight:600;} .inset.orphaned{border-color:rgba(139,131,119,0.45);}

  /* needs-you band (derives up from a command awaiting approval) — warning tokens */
  .inset.warnband{border-color:color-mix(in srgb,var(--warning) 42%,transparent);
    background:linear-gradient(135deg,color-mix(in srgb,var(--warning) 12%,transparent),color-mix(in srgb,var(--warning) 3%,transparent) 62%,transparent);}
  .askrow{display:flex;align-items:center;gap:11px;}
  .askrow .aic{width:34px;height:34px;border-radius:10px;flex:none;display:grid;place-items:center;font-size:15px;
    background:radial-gradient(circle at 50% 35%,color-mix(in srgb,var(--warning) 25%,transparent),transparent 70%);border:1px solid color-mix(in srgb,var(--warning) 42%,transparent);color:var(--warning);}
  .askrow .body{flex:1;min-width:0;} .askrow .line{font-size:13.5px;font-weight:600;}
  .askrow .cmd{font-family:var(--mono);font-size:11.5px;color:#f0d79a;background:rgba(0,0,0,0.25);border:1px solid color-mix(in srgb,var(--warning) 30%,transparent);border-radius:6px;padding:1px 7px;}
  .askrow .btns{display:flex;gap:6px;flex:none;}
  .askbtn{font-size:11px;border-radius:7px;padding:4px 11px;cursor:pointer;border:1px solid var(--hair);color:var(--dim);font-family:inherit;background:transparent;}
  .askbtn.pri{color:var(--warning-foreground);background:var(--warning);border-color:var(--warning);font-weight:600;}
  .askhint{color:var(--dim);font-size:10.5px;margin-top:6px;}
  /* Argo-attributed note — the "destructive" classification is Argo's, never Codex output */
  .asknote{color:var(--dim);font-size:10.5px;margin-top:9px;padding-top:8px;border-top:1px solid color-mix(in srgb,var(--warning) 20%,transparent);line-height:1.5;}
  .asknote .src{color:var(--warning);font-weight:600;border:1px solid color-mix(in srgb,var(--warning) 45%,transparent);border-radius:5px;padding:0 5px;font-size:9.5px;letter-spacing:.04em;}
  .asknote .crit{color:var(--critical);font-weight:600;}

  /* ── Timeline — a single flat, chronological log of the agent's typed steps.
     No Turns, no user-prompt rows. Same visual family as v7's tool rows. ── */
  .tl{display:flex;flex-direction:column;}
  .item{display:flex;align-items:center;gap:9px;padding:5px 8px;border-radius:8px;cursor:pointer;font-size:12.5px;}
  .item:hover{background:rgba(246,240,230,0.035);}
  .item.sel{background:rgba(84,104,234,0.13);box-shadow:inset 0 0 0 1px rgba(84,104,234,0.35);}
  .item .ti{width:16px;text-align:center;flex:none;color:var(--dim);display:inline-flex;justify-content:center;font-size:12px;}
  .item.run .ti{color:var(--run);} .item.ask .ti{color:var(--amber);} .item.fail .ti{color:var(--red);}
  .item .kind{color:var(--dimmer);font-size:10px;width:84px;flex:none;text-transform:uppercase;letter-spacing:.06em;}
  .item .lbl{color:var(--txt);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;} .item .lbl .path,.item .lbl .cmd{font-family:var(--mono);font-size:11px;color:#beb8ad;}
  .item .grow{flex:1;}
  .item .im{color:var(--dimmer);font-size:10.5px;font-variant-numeric:tabular-nums;} .item .im .add,.item .im .del{color:var(--dimmer);} /* diff-stat NEUTRAL, colour axis reserved */
  /* command exit glyph is DIRECT (from the exit code); the parsed summary beside it is DERIVED */
  .item .cmdexit{display:inline-flex;} .item .cmdexit.pass{color:var(--success);} .item .cmdexit.fail{color:var(--red);}
  /* reasoning duration — a timestamp delta, not a reported field; muted italic so it never reads like a DIRECT diff-stat / command output */
  .item .est{color:var(--dimmer);font-size:10px;font-style:italic;font-variant-numeric:tabular-nums;}
  .item .askpill{font-size:10px;color:var(--warning);border:1px solid color-mix(in srgb,var(--warning) 45%,transparent);border-radius:5px;padding:0 6px;}

  /* Outcomes (degraded — Codex has no skills, so commit-prefix or Untyped only) */
  .orow{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:8px;cursor:pointer;font-size:12.5px;} .orow:hover{background:rgba(246,240,230,0.035);}
  .orow.sel{background:rgba(84,104,234,0.13);box-shadow:inset 0 0 0 1px rgba(84,104,234,0.35);}
  .orow .otype{width:15px;text-align:center;color:var(--mist);flex:none;font-size:13px;display:inline-flex;justify-content:center;} .orow .otype.prefix{opacity:.5;}
  .orow .otw{color:var(--dim);font-size:11px;width:88px;flex:none;} .orow .otitle{color:var(--txt);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .orow .grow{flex:1;}
  .orow .oprov{color:var(--dimmer);font-size:11px;font-family:var(--mono);flex:none;} .orow .oroll{color:var(--dim);font-size:11px;font-variant-numeric:tabular-nums;flex:none;} .orow .oroll .pm{color:var(--dimmer);}
  .orow .ostate{display:inline-flex;align-items:center;gap:6px;justify-content:flex-end;min-width:82px;flex:none;} .orow .ostate .sword{color:var(--dim);font-size:10.5px;}
  .sumpeer{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer;color:var(--dim);font-size:12px;} .sumpeer:hover{background:rgba(246,240,230,0.03);}
  .sumpeer .go{color:var(--dimmer);margin-left:4px;display:inline-flex;} .sumpeer .cv{color:var(--dimmer);width:10px;flex:none;} .sumpeer .grow{flex:1;} .sumpeer .meta{color:var(--dimmer);font-size:11px;font-variant-numeric:tabular-nums;} .peerdiv{border-top:1px solid var(--inset-hair);margin:4px 2px;}
  .tierline{font-size:11px;color:var(--dim);margin:8px 2px 0;line-height:1.6;} .tierline b{color:var(--txt);} .tierline .tk{font-weight:600;}
  .tierline .tk.direct{color:var(--foreground);} .tierline .tk.derived{color:#c4beb3;text-decoration:underline dotted;text-decoration-color:var(--dimmer);text-underline-offset:2px;} .tierline .tk.conv{color:#b3bcef;}

  /* shadcn Badge — soft semantic variant */
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:500;line-height:1.5;padding:1.5px 7px;border-radius:6px;border:1px solid transparent;white-space:nowrap;flex:none;font-variant-numeric:tabular-nums;}
  .badge .ic{opacity:.85;}
  .badge.success{color:#84dcad;background:color-mix(in srgb,var(--success) 13%,transparent);border-color:color-mix(in srgb,var(--success) 24%,transparent);}
  .badge.warning{color:#f0c684;background:color-mix(in srgb,var(--warning) 13%,transparent);border-color:color-mix(in srgb,var(--warning) 24%,transparent);}
  .badge.critical{color:#f2938a;background:color-mix(in srgb,var(--critical) 13%,transparent);border-color:color-mix(in srgb,var(--critical) 24%,transparent);}
  .badge.secondary{color:var(--dim);background:rgba(246,240,230,0.055);border-color:var(--hair);}

  /* Checks — branch-level health, keyed to the latest commit + uncommitted work */
  .checks{display:flex;flex-direction:column;gap:1px;}
  .chkrow{display:flex;align-items:center;gap:9px;padding:5px 8px;border-radius:8px;font-size:12.5px;cursor:pointer;}
  .chkrow:hover{background:rgba(246,240,230,0.035);}
  .chkrow.sel{background:rgba(84,104,234,0.13);box-shadow:inset 0 0 0 1px rgba(84,104,234,0.35);}
  .chkrow .ck{width:15px;text-align:center;flex:none;display:inline-flex;justify-content:center;}
  .chkrow .cklbl{color:var(--dim);width:82px;flex:none;}
  .chkrow .ckval{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .chkrow .grow{flex:1;} .chkrow .rerun{color:var(--blue);font-size:11px;flex:none;opacity:0;display:inline-flex;align-items:center;gap:4px;} .chkrow:hover .rerun,.chkrow:focus-visible .rerun{opacity:1;}
  .ck.pass{color:var(--success);} .ck.fail{color:var(--red);} .ck.warn{color:var(--warning);} .ck.none{color:var(--dimmer);}
  .ck.run{color:var(--primary);} .ck.changes{color:var(--v-changes);} .ck.approve{color:var(--v-approve);} .ck.partial{color:var(--mist);}
  .ckval.fail{color:#f0928c;} .ckval.warn{color:#f0d093;}
  .branchmeta{color:var(--dimmer);font-size:10.5px;font-variant-numeric:tabular-nums;}

  /* Commit / Merge — a two-stage "ship this work" card. Stage 1 commits the
     uncommitted files (accent primary). Stage 2 merges the branch to main behind
     an explicit review+tests gate — Review DEGRADES to "not reviewed" for Codex. */
  .commitcta{background:rgba(84,104,234,0.06);border:1px solid rgba(84,104,234,0.26);border-radius:12px;margin:0 0 13px;overflow:hidden;}
  .cstage{padding:11px 12px;}
  .commitcta .top{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;} .commitcta .top .g{color:var(--mist);}
  .commitcta .branchmeta{color:var(--dimmer);font-size:11px;font-weight:500;font-variant-numeric:tabular-nums;}
  .commitcta .msg{font-family:var(--mono);font-size:11.5px;color:#cbc5bb;background:rgba(0,0,0,0.22);border:1px solid var(--inset-hair);border-radius:7px;padding:6px 9px;margin:9px 0 10px;display:flex;align-items:center;gap:9px;}
  .commitcta .msg .draft{color:var(--dimmer);font-size:9px;text-transform:uppercase;letter-spacing:.1em;flex:none;border:1px solid var(--hair);border-radius:4px;padding:1px 5px;}
  .commitcta .msg .g{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#dcd6cc;}
  .commitcta .msg .redraft{color:var(--primary);cursor:pointer;flex:none;}
  .commitcta .btn{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg, color-mix(in srgb,var(--primary) 96%,#ffffff 10%), var(--primary));color:var(--primary-foreground);border:1px solid color-mix(in srgb,var(--primary) 55%,transparent);border-radius:8px;padding:7px 13px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;}
  .commitcta .btn[disabled]{opacity:.45;cursor:not-allowed;}
  .mstage{border-top:1px solid var(--inset-hair);background:rgba(0,0,0,0.16);padding:11px 12px;}
  .mstage-h{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px;}
  .mstage-h .ic{font-size:13px;}
  .mstage-h .mono{font-family:var(--mono);text-transform:none;letter-spacing:0;color:var(--mist);font-weight:500;}
  .mgrow{display:flex;align-items:center;gap:10px;font-size:11.5px;padding:2.5px 0;}
  .mgrow .mgk{color:var(--dim);width:50px;flex:none;}
  .mgrow .mgv{display:inline-flex;align-items:center;gap:5px;color:var(--dim);}
  .mgrow .mgv.ok{color:var(--success);} .mgrow .mgv.warn{color:var(--warning);} .mgrow .mgv.wait{color:var(--primary);} .mgrow .mgv.none{color:var(--dimmer);}
  .mgrow .mgnote{color:var(--dimmer);font-size:10.5px;}
  .mstage-act{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:11px;}
  .mbtn{display:inline-flex;align-items:center;gap:6px;border-radius:8px;padding:7px 13px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;
    background:linear-gradient(135deg, color-mix(in srgb,var(--primary) 96%,#ffffff 10%), var(--primary));color:var(--primary-foreground);border:1px solid color-mix(in srgb,var(--primary) 55%,transparent);}
  .mbtn[disabled]{opacity:.4;cursor:not-allowed;background:transparent;color:var(--dim);border-color:var(--hair);}
  .mbtn.confirm{background:linear-gradient(135deg, color-mix(in srgb,var(--primary) 78%,#ffffff 26%), var(--primary));}
  .mhint{color:var(--dimmer);font-size:11px;} .chain{color:var(--dimmer);font-size:10.5px;}

  /* Artifacts — stacked collapsible cards */
  .acard{background:var(--inset);border:1px solid var(--inset-hair);border-radius:12px;box-shadow:0 1px 0 var(--inset-hi) inset;margin:0 0 10px;overflow:hidden;}
  .achead{display:flex;align-items:center;gap:8px;padding:9px 11px;cursor:pointer;font-size:11.5px;}
  .achead .cv{color:var(--dimmer);font-size:10px;width:9px;flex:none;display:inline-flex;}
  .achead .ai{color:var(--mist);flex:none;display:inline-flex;}
  .achead .apath{font-family:var(--mono);color:#cbc5bb;font-size:11.5px;}
  .achead .grow{flex:1;} .achead .amiss{color:var(--warning);font-size:10.5px;}
  .acbody{padding:11px 13px;border-top:1px solid var(--inset-hair);}
  .acard.gone .apath{color:var(--dimmer);text-decoration:line-through;}
  .detbtns{display:flex;gap:8px;margin:12px 0 4px;flex-wrap:wrap;}
  .detbtn{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--dim);border:1px solid var(--hair);border-radius:8px;padding:5px 11px;cursor:pointer;background:transparent;font-family:inherit;}
  .detbtn.primary{color:#e3ded5;border-color:rgba(84,104,234,0.5);background:rgba(84,104,234,0.10);}
  .kv{display:flex;gap:8px;font-size:11.5px;color:var(--dim);margin:2px 0;} .kv .k{color:var(--dimmer);width:64px;flex:none;}
  .feed .a{color:#6fdda6;} .feed .r{color:#f0928c;} .feed .w{color:#f0d093;} .feed .dim{color:var(--dimmer);}

  /* Detail */
  .dtabs{display:flex;gap:2px;padding:7px 12px;border-bottom:1px solid var(--hair);align-items:center;} .dtab{font-size:11.5px;color:var(--dim);padding:4px 10px;border-radius:7px;cursor:pointer;} .dtab.on{color:var(--txt);background:rgba(246,240,230,0.06);}
  .scopejump{margin-left:auto;font-size:11px;color:var(--blue);cursor:pointer;display:inline-flex;align-items:center;gap:4px;}
  .feed{font-family:var(--mono);font-size:11.5px;line-height:1.6;color:#c2bcb1;white-space:pre-wrap;} .feed .p{color:var(--dim);}
  .doc{font-size:12.5px;line-height:1.7;color:#cfc9be;} .doc b{color:#fff;} .doc code{font-family:var(--mono);font-size:11px;color:#cbc5bb;background:rgba(246,240,230,0.05);padding:1px 4px;border-radius:4px;} .fnpath{font-family:var(--mono);font-size:11px;color:var(--dim);display:block;margin-bottom:8px;}
  .fdiff{margin:0 0 10px;} .fdhead{display:flex;align-items:center;gap:8px;padding:8px 11px;border-bottom:1px solid var(--inset-hair);font-size:11.5px;cursor:pointer;}
  .fkind{display:inline-flex;align-items:center;color:var(--dim);font-size:14px;flex:none;} .fpath{font-family:var(--mono);color:#cbc5bb;font-size:11px;} .fdhead .grow{flex:1;} .fdhead .add{color:var(--dimmer);} .fdhead .del{color:var(--dimmer);}
  .viewed{display:inline-flex;align-items:center;gap:4px;color:var(--dimmer);font-size:10.5px;cursor:pointer;margin-left:6px;} .viewed input{accent-color:var(--blue);margin:0;}
  .fdiff.viewed-on{opacity:.62;} .fdiff.viewed-on .fpath{text-decoration:line-through;}
  .hunk{font-family:var(--mono);font-size:11px;line-height:1.55;padding:9px 11px;white-space:pre-wrap;} .hunk .a{color:#6fdda6;} .hunk .r{color:#f0928c;} .hunk .m{color:var(--dimmer);}
  .empty{color:var(--dim);font-size:12px;padding:8px 2px;}
  .cgroup{margin:0 0 14px;} .cghead{display:flex;align-items:center;gap:8px;padding:6px 4px 8px;font-size:11.5px;} .cghead .sha{font-family:var(--mono);color:var(--mist);} .cghead .cmsg{color:var(--txt);font-weight:600;} .cghead .grow{flex:1;} .cghead .cgn{color:var(--dimmer);font-size:10.5px;} .cghead.wip .cmsg{color:var(--amber);}
  .term{display:grid;grid-template-rows:auto 1fr;min-height:0;border-top:1px solid var(--hair-strong);}
  .term-h{display:flex;align-items:center;gap:8px;padding:7px 13px;background:rgba(10,13,19,0.5);color:var(--dim);font-size:11px;} .term-h .grow{flex:1;} .term-h .x{cursor:pointer;color:var(--dimmer);display:inline-flex;align-items:center;gap:4px;}
  .term-body{background:#0c0a08;color:#c2bcb1;font-family:var(--mono);font-size:12px;line-height:1.55;padding:10px 13px;overflow:auto;white-space:pre-wrap;outline:none;} .term-body .p{color:var(--run);} .term-body .dim{color:var(--dimmer);} .term-body .amber{color:var(--amber);}
  .caret{display:inline-block;width:7px;height:14px;background:#c2bcb1;vertical-align:-2px;animation:blink 1.1s steps(1) infinite;} @keyframes blink{50%{opacity:0}} @media (prefers-reduced-motion:reduce){.caret{animation:none;}}
  [tabindex]:focus-visible{outline:2px solid var(--blue);outline-offset:1px;border-radius:6px;} .term-body:focus-visible{outline:none;box-shadow:inset 0 0 0 1px var(--blue);}
  .hint{position:fixed;left:16px;bottom:12px;z-index:5;color:var(--dim);font-size:10.5px;}
</style>
</head>

/* now-line — always renders liveness (live pulse or orphaned banner), independent of the approval gate. Running = INDIGO. */

/* Timeline row — a single typed step. */
function itemRow(i){
  const t=ITK[i.type]||{g:'file-text',k:i.type};
  let cls='';
  if(i.approval) cls='ask';
  else if(i.type==='command'){ if(i.exit_code==null) cls='run'; else if(i.exit_code!==0) cls='fail'; }
  let im='';
  if(i.file){
    /* diff-stat parsed from the patch text — DERIVED, and rendered NEUTRAL (colour axis reserved) */
    if(i.a!=null) im=`<span class="im derived" title="parsed from the patch text, not a field Codex records"><span class="add">+${i.a}</span> <span class="del">−${i.d}</span></span>`;
  } else if(i.type==='command'){
    if(i.approval) im=`<span class="askpill">possibly awaiting approval</span>`;
    else if(i.exit_code!=null){
      const ok=i.exit_code===0;
      const glyph=`<span class="cmdexit ${ok?'pass':'fail'}" title="from the command exit code">${ok?ic('check'):ic('x')}</span>`;
      const mm=(i.out||'').match(/\d+\s+passed[^\n]*/i);
      const sum=mm?mm[0]:(i.out?i.out.replace(/^[✓✗]\s*/,'').split('\n')[0]:('exit '+i.exit_code));
      im=`<span class="im">${glyph} <span class="derived" title="parsed from captured command output">${esc(sum)}</span></span>`;
    }
  } else if(i.type==='reasoning' && i.time && i.tsAvail){
    im=`<span class="est derived" title="estimated from timestamps — not reported by Codex">~${i.time}</span>`;
  }
  return `<div class="item ${cls} ${sel===i.id?'sel':''}" onclick="pick('${i.id}')"><span class="ti">${ic(t.g)}</span><span class="kind">${t.k}</span><span class="lbl">${i.lbl}</span><span class="grow"></span>${im}</div>`;
}

}

function orollHtml(o){
  const fs=(o.files||[]).map(p=>FILES.find(f=>f.p===p)).filter(Boolean);

const OSTATE={run:'Running',done:'Done',queued:'Queued',fail:'Failed',interrupted:'Interrupted','needs-input':'Needs you'};
function outcomeRow(o){

}

/* Checks — branch-level health via the git hook. Review DEGRADES (binoculars identity kept). */
function chkRow(key,label,c){

/* Commit / Merge — a two-stage card. Stage 1 commits the uncommitted files.
   Stage 2 merges the branch to main behind a review+tests gate — Review DEGRADES
   to "not reviewed" for Codex (Argo holds no review gate here, so it's advisory). */
function commitCtaHtml(){
  const unc=FILES.filter(f=>!commitOf(f));
  if(!unc.length) return '';
  const viewedN=unc.filter(f=>viewed[f.p]).length, ready=viewedN===unc.length;
  const draft='cli: add --dry-run flag';
  const n=ready?viewedN:unc.length;
  return `<div class="commitcta">
    <div class="cstage">
      <div class="top"><span class="g">${ic('git-commit')}</span><span>Commit uncommitted work</span><span class="grow" style="flex:1"></span><span class="branchmeta">${viewedN} of ${unc.length} file${unc.length>1?'s':''} viewed</span></div>
      <div class="msg"><span class="draft">draft</span><span class="g">${draft}</span><span class="redraft" onclick="event.stopPropagation()" tabindex="0" role="button" title="re-draft the message from the diff">${ic('arrow-clockwise')}</span></div>
      <button class="btn" ${ready?'':'disabled'} tabindex="0">${ic('git-commit')} Commit ${n} viewed file${n>1?'s':''}</button>
    </div>
    ${landHtml()}
  </div>`;
}

/* Merge stage — honest. Review DEGRADES to "not reviewed" (no Argo skill), which
   is stated in words but is NOT a gate; Argo holds no merge gate. Tests green
   is the real prerequisite. Two-step confirm; never claims the merge happened. */
function landHtml(){
  const testsPass=BRANCH.tests.state==='pass';
  const ready=testsPass;
  const reviewRow=`<div class="mgrow"><span class="mgk">Review</span><span class="mgv none">${ic('binoculars')} not reviewed</span><span class="mgnote">· Codex has no Argo review skill · advisory</span></div>`;
  const testsRow=`<div class="mgrow"><span class="mgk">Tests</span><span class="mgv ${testsPass?'ok':'wait'}">${testsPass?ic('check'):ic('circle-notch')} ${testsPass?BRANCH.tests.label:'not green yet'}</span></div>`;
  let act;
  if(!ready){
    act=`<button class="mbtn" disabled tabindex="0">${ic('arrows-merge')} Merge to main</button>`;
  } else if(landStep.v===0){
    act=`<button class="mbtn" onclick="event.stopPropagation();armLand()" tabindex="0">${ic('arrows-merge')} Merge to main</button><span class="chain">commit → push → merge → main</span>`;
  } else {
    act=`<button class="mbtn confirm" onclick="event.stopPropagation();armLand()" tabindex="0">${ic('arrows-merge')} Confirm merge</button><span class="mhint">runs the chain · <span class="redraft" onclick="event.stopPropagation();cancelLand()" style="cursor:pointer;color:var(--primary)">cancel</span></span>`;
  }
  return `<div class="mstage">
    <div class="mstage-h">${ic('arrows-merge')} Merge <span class="mono">config-loader</span> → <span class="mono">main</span></div>
    ${reviewRow}
    ${testsRow}
    <div class="mstage-act">${act}</div>
  </div>`;
}

function detailModel(){
  if(sel.startsWith('outcome:')){const o=OUTCOMES.find(x=>x.id===sel.slice(8))||{};
    const arts=(o.artifacts||[]).map(id=>ARTIFACTS.find(a=>a.id===id)).filter(Boolean);
    const fs=(o.files||[]).length?FILES.filter(f=>o.files.includes(f.p)):[];
    if(arts.length||fs.length){
      const bits=[o.prov||'',arts.length?`${arts.length} artifact${arts.length>1?'s':''}`:'',fs.length?`${fs.length} file${fs.length>1?'s':''}`:''].filter(Boolean);
      return {kind:'outcome',title:o.title,scope:bits.join(' · '),artifacts:arts,files:fs.length?fs:null};
    }
    return {kind:'empty',title:o.title,scope:o.life==='queued'?'queued — no diff yet':'in progress'};}
  if(sel==='session'||sel==='files') return {title:'Session changes',scope:`${FILES.length} files · whole session`,kind:'files',files:FILES,cta:true};
  if(sel==='commits') return {title:'Commits',scope:`${COMMITS.length} commit${COMMITS.length>1?'s':''} · grouped diff`,kind:'files',files:FILES.filter(f=>commitOf(f))};
  if(sel.startsWith('checks:')){const k=sel.slice(7),c=BRANCH[k]||{};
    return {kind:'check',ckey:k,title:'Check · '+({lint:'Lint',types:'Typecheck',tests:'Tests',review:'Review'}[k]||k),scope:c.label||'',check:c};}
  const i=findItem(sel);
  if(i&&i.file) return {title:'File change',scope:i.file.p,kind:'files',files:[i.file]};
  if(i&&i.type==='command'&&i.approval) return {title:'Command',scope:'awaiting approval',kind:'feed',feed:i.feed||'$ '+clean(i.lbl),awaiting:true};
  if(i&&(i.feed||i.out)) return {title:i.type==='command'?'Command':'Item',scope:i.type==='command'?(i.exit_code===0?'exit 0':'exit '+i.exit_code):i.type,kind:'feed',feed:i.feed||i.out};
  if(i) return {title:i.type,scope:'reasoning / message item',kind:'doc',doc:'<div class="doc">'+i.lbl+'</div>'};
  return {title:'Nothing selected',scope:'',kind:'empty'};
}
function fileDiff(f){const key=f.p,v=!!viewed[key];

    <div class="fdhead" onclick="toggleView('${key}')"><span class="fkind" title="${({M:'modified',A:'added',D:'deleted',R:'renamed'})[f.k]||f.k}">${ic(({M:'file-text',A:'file-plus',D:'file-minus',R:'file-text'})[f.k]||'file-text')}</span><span class="fpath">${f.p}</span><span class="grow"></span>${f.a!=null?`<span class="derived" title="parsed from the patch text, not a field Codex records"><span class="add">+${f.a}</span> <span class="del">−${f.d}</span></span>`:''}

}
const commitOf=f=>COMMITS.find(c=>c.files.includes(f.p));
function groupedFiles(files){

  return groups.map(g=>`<div class="cgroup"><div class="cghead ${g.commit?'':'wip'}">${g.commit?`<span class="sha">${g.commit.sha}</span><span class="cmsg">${g.commit.msg}</span>`:`<span class="cmsg">Uncommitted changes</span>`}<span class="grow"></span><span class="cgn">${g.files.length} file${g.files.length>1?'s':''}</span></div>${g.files.map(fileDiff).join('')}</div>`).join('');
}
function detailHtml(){

    body=artBlock+fileBlock;

  else if(m.kind==='doc'){tabsHtml=`<span class="dtab on">Item</span>`;body=m.doc;}
  else {tabsHtml=`<span class="dtab on">—</span>`;body='<div class="empty">Select a Timeline step, an outcome, or a file.</div>';}
  const jump=(sel!=='session')?`<span class="scopejump" onclick="pick('session')">${ic('x')} back to session</span>`:'';
  return `<div class="region detail"><div class="rhead"><span class="icon">${ic('git-diff')}</span><span class="name">${m.title}</span><span class="grow"></span><span class="sub">${m.scope}</span></div>

}
function sessionHtml(){

      <div class="term-body" contenteditable="true" spellcheck="false"><span class="p">▸</span> npm run build · exited 2 — stale artifacts in build/
<span class="amber">▸ awaiting approval:</span> rm -rf build/
<span class="p">codex $</span> <span class="caret"></span></div></div></div>`;

function render(){app.innerHTML=railHtml()+`<div class="vsplit" data-split="rail"></div>`+sessionHtml();wireSplitters();wireA11y();drawOrb();}
function wireA11y(){document.querySelectorAll('[onclick]:not([tabindex]):not([contenteditable])').forEach(el=>{
  if(el.classList.contains('viewed'))return;
  if(el.parentElement&&el.parentElement.closest('[role=button]'))return;
  el.setAttribute('tabindex','0');el.setAttribute('role','button');});}
addEventListener('keydown',e=>{const el=document.activeElement;if((e.key==='Enter'||e.key===' ')&&el&&el.hasAttribute('onclick')&&el.getAttribute('contenteditable')!=='true'){e.preventDefault();el.click();}});
function pick(id){sel=id;if(id!=='session')showDetail=true;render();}
function toggleArt(id){artOpen[id]=artOpen[id]===false?true:false;render();}
function openArtifact(aid){const o=OUTCOMES.find(x=>(x.artifacts||[]).includes(aid));if(o){sel='outcome:'+o.id;artOpen[aid]=true;showDetail=true;render();}}
function toggleView(k){viewed[k]=!viewed[k];render();}
function toggleTl(){showTl=!showTl;render();}
function toggleDetail(){showDetail=!showDetail;render();}
function armLand(){landStep.v=landStep.v===0?1:0;render();}
function cancelLand(){landStep.v=0;render();}
function expandTerm(){termTall.v=!termTall.v;document.documentElement.style.setProperty('--r-term',termTall.v?'42vh':'170px');render();}
Object.assign(window,{pick,toggleArt,openArtifact,toggleView,toggleTl,toggleDetail,expandTerm,armLand,cancelLand,render});
function wireSplitters(){document.querySelectorAll('[data-split]').forEach(el=>{el.addEventListener('pointerdown',e=>{e.preventDefault();el.setPointerCapture(e.pointerId);el.classList.add('dragging');
  const kind=el.dataset.split,sx=e.clientX,sy=e.clientY,root=document.documentElement.style,cs=getComputedStyle(document.documentElement);
  const sRail=parseInt(cs.getPropertyValue('--c-rail'))||236,sDet=parseInt(cs.getPropertyValue('--c-det'))||400,sTerm=parseInt(cs.getPropertyValue('--r-term'))||170;
  const move=ev=>{if(kind==='rail')root.setProperty('--c-rail',Math.max(190,Math.min(360,sRail+(ev.clientX-sx)))+'px');
    if(kind==='detail')root.setProperty('--c-det',Math.max(300,Math.min(680,sDet-(ev.clientX-sx)))+'px');
    if(kind==='term')root.setProperty('--r-term',Math.max(92,Math.min(innerHeight*0.6,sTerm-(ev.clientY-sy)))+'px');};
  const up=()=>{el.classList.remove('dragging');removeEventListener('pointermove',move);removeEventListener('pointerup',up);};
  addEventListener('pointermove',move);addEventListener('pointerup',up);});});}
const starC=document.getElementById('stars');
function drawStars(){const dpr=Math.min(2,devicePixelRatio||1);starC.width=innerWidth*dpr;starC.height=innerHeight*dpr;const c=starC.getContext('2d');c.scale(dpr,dpr);c.clearRect(0,0,innerWidth,innerHeight);
  for(let i=0;i<90;i++){const x=Math.random()*innerWidth,y=Math.random()*innerHeight*0.7,r=Math.random()*1.1;c.globalAlpha=0.15+Math.random()*0.5;c.fillStyle='#cbc5bb';c.beginPath();c.arc(x,y,r,0,7);c.fill();}c.globalAlpha=1;}
const ORB=['idle','listening','thinking','speaking'];let orbState=0;
function cycleOrb(){orbState=(orbState+1)%ORB.length;document.getElementById('orbstate').textContent=ORB[orbState];
  document.getElementById('glow').classList.toggle('warm',orbState>0);drawOrb();}
window.cycleOrb=cycleOrb;
function drawOrb(){const cv=document.getElementById('orb');if(!cv)return;const c=cv.getContext('2d'),cx=26,cy=26,R=13,warm=orbState>0;
  const rim=warm?'rgba(242,180,120,0.95)':'rgba(210,224,255,0.95)',glow=warm?'rgba(242,140,77,':'rgba(84,104,234,';
  c.clearRect(0,0,52,52);const g=c.createRadialGradient(cx,cy,R*0.7,cx,cy,R*2);g.addColorStop(0,glow+'0.5)');g.addColorStop(1,glow+'0)');
  c.fillStyle=g;c.beginPath();c.arc(cx,cy,R*2,0,7);c.fill();c.beginPath();c.arc(cx,cy,R,0,7);c.fillStyle='#0a0806';c.fill();c.lineWidth=1.4;c.strokeStyle=rim;c.beginPath();c.arc(cx,cy,R,0,7);c.stroke();}
addEventListener('resize',()=>{drawStars();drawOrb();});
document.getElementById('hint').textContent='Codex = a single flat Timeline of typed steps (no Turns, no user-prompt rows) · Checks = branch health (Review degrades — no Codex skill) · dotted = computed/best-effort · check Viewed on uncommitted files → Commit · approval detection is best-effort · drag dividers';
render();drawStars();
</script>
</body>
