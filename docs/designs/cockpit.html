/* Detail resolves to artifacts + files, a commit's grouped diff, a check's
   output, or a single tool's feed. */
function detailModel(){
  if(sel==='session'||sel==='files') return {kind:'files',title:'Session changes',scope:`${FILES.length} files · whole session`,files:FILES,cta:true};
  if(sel.startsWith('outcome:')){const o=OUTCOMES.find(x=>x.id===sel.slice(8))||{};
    const arts=(o.artifacts||[]).map(id=>ARTIFACTS.find(a=>a.id===id)).filter(Boolean);
    const fs=(o.files||[]).length?FILES.filter(f=>o.files.includes(f.p)):[];
    if(arts.length||fs.length){
      const bits=[o.prov||'',arts.length?`${arts.length} artifact${arts.length>1?'s':''}`:'',fs.length?`${fs.length} file${fs.length>1?'s':''}`:''].filter(Boolean);
      return {kind:'outcome',title:o.title,scope:bits.join(' · '),artifacts:arts,files:fs.length?fs:null};
    }
    return {kind:'empty',title:o.title,scope:o.life==='queued'?'queued — no diff yet':'in progress'};}
  if(sel.startsWith('commit:')){const sha=sel.slice(7),c=COMMITS.find(x=>x.sha===sha)||{files:[]};
    return {kind:'files',title:`Commit ${sha}`,scope:c.msg,files:FILES.filter(f=>c.files.includes(f.p)),commit:c};}
  if(sel==='commits') return {kind:'files',title:'Commits',scope:`${COMMITS.length} commit${COMMITS.length>1?'s':''} · grouped diff`,files:FILES.filter(f=>commitOf(f))};
  if(sel.startsWith('checks:')){const k=sel.slice(7),c=BRANCH[k]||{};
    return {kind:'check',ckey:k,title:'Check · '+({lint:'Lint',types:'Typecheck',tests:'Tests',review:'Review'}[k]||k),scope:c.label||'',check:c};}
  const t=findTool(sel)||{};
  return {kind:t.diff?'files':'feed',title:clean(t.lbl)||'Detail',scope:'one action',files:t.diff||null,feed:t.feed||null};
}
/* v4 state model UI — a status chip (read-only) + a real Address button that
   walks Open → Addressing → Fixed. Shared by the inline diff cards and the
   Findings-tab list, so the two stay consistent. */
const S_WORD={open:'Open',addressing:'Addressing',fixed:'Fixed'};
const S_GLYPH={open:ic('circle'),addressing:ic('circle-notch'),fixed:ic('check')};
function stateChip(st){return `<span class="schip ${st}" title="finding state — Open → Addressing → Fixed">${S_GLYPH[st]} ${S_WORD[st]}</span>`;}
/* The button's label is the NEXT action, honest about what it does:
   Open→ dispatch a fix (Addressing, pending) · Addressing→ confirm the fix
   landed (Fixed) · Fixed→ reopen. It never fabricates that the fix happened. */
function addressBtn(id,st,extra){
  const c=extra||'';
  if(st==='open')      return `<button class="abtn ${c}" onclick="event.stopPropagation();advanceFinding('${id}')" title="dispatch code-review's fix agent">${ic('arrow-bend-down-right')} Address</button>`;
  if(st==='addressing')return `<button class="abtn confirm ${c}" onclick="event.stopPropagation();advanceFinding('${id}')" title="mark the dispatched fix confirmed">${ic('check')} Mark fixed</button>`;
  return `<button class="abtn reopen ${c}" onclick="event.stopPropagation();advanceFinding('${id}')" title="reopen this finding">${ic('arrow-counter-clockwise')} Reopen</button>`;
}
function findingCard(f){
  const st=findingStatus[f.id], fixed=st==='fixed';
  const sev=f.severity==='blocking'?'blocking':'advisory';
  const focus=FINDINGS[walkIdx]&&FINDINGS[walkIdx].id===f.id;
  const glyph=f.severity==='blocking'?'▲':'◆';
  return `<div id="fc-${f.id}" class="finding sev-${sev} ${fixed?'resolved':''} ${focus?'walk-focus':''}">
    <div class="fhead">
      <span class="sev">${glyph}</span><span class="sevw">${f.severity}</span>
      <span class="floc">:${f.line}</span>
      ${stateChip(st)}
      <span class="fstub">fixed · ${esc(f.body).slice(0,46)}…</span>
      <span class="grow"></span>
      <span class="fby">${f.by}</span>
      ${addressBtn(f.id,st,'sm')}</div>
    <div class="fbody">${esc(f.body)}</div></div>`;
}
function fileDiff(gkey,f){
  const key=f.p, isViewed=!!viewed[key];
  const fnd=findingsFor(key);
  const openN=fnd.filter(x=>findingStatus[x.id]!=='fixed').length;
  const flag=fnd.length?`<span class="flag" title="${fnd.length} review finding${fnd.length>1?'s':''} on this file">${ic('flag')} ${openN||fnd.length}</span>`:'';
  /* subtle: a thin marker per finding — the detail lives on the Review tab, not wedged in the code */
  const marks=(fnd.length&&!isViewed)?`<div class="fmarks">${fnd.map(x=>{const st=findingStatus[x.id],done=st==='fixed',sv=x.severity==='blocking'?'block':'changes';return `<div id="fm-${x.id}" class="fmark sev-${sv} ${done?'done':''}" onclick="openFindingInReview('${x.id}')" tabindex="0" role="button" title="open this finding in the Review tab"><span class="fm-bar"></span><span class="fm-lbl">${done?'fixed':x.severity} · :${x.line}</span><span class="grow"></span><span class="fm-go">review ${ic('caret-right')}</span></div>`;}).join('')}</div>`:'';
  return `<div class="inset fdiff pad0 ${isViewed?'viewed-on':''}">
    <div class="fdhead" onclick="toggleView('${key}')">
      <span class="fkind" title="${({M:'modified',A:'added',D:'deleted',R:'renamed'})[f.k]||f.k}">${ic(({M:'file-text',A:'file-plus',D:'file-minus',R:'file-text'})[f.k]||'file-text')}</span><span class="fpath">${f.p}</span><span class="grow"></span>
      ${flag}
      <span class="derived" title="line counts from a file snapshot"><span class="add">+${f.a}</span> <span class="del">−${f.d}</span></span>
      <label class="viewed" onclick="event.stopPropagation()"><input type="checkbox" ${isViewed?'checked':''} onchange="toggleView('${key}')"/> Viewed</label></div>
    ${isViewed?'':`<div class="hunk">${f.hunk.map(([c,t])=>`<span class="${c}">${esc(t)}</span>`).join('\n')}</div>`}
    ${marks}</div>`;
}
const commitOf=f=>COMMITS.find(c=>c.files.includes(f.p));
function groupedFiles(files){
  const groups=[];
  files.forEach(f=>{const c=commitOf(f),key=c?c.sha:'wip';let g=groups.find(x=>x.key===key);if(!g){g={key,commit:c,files:[]};groups.push(g);}g.files.push(f);});
  return groups.map(g=>`<div class="cgroup"><div class="cghead ${g.commit?'':'wip'}">${g.commit?`<span class="sha">${g.commit.sha}</span><span class="cmsg">${g.commit.msg}</span>`:`<span class="cmsg">Uncommitted changes</span>`}<span class="grow"></span><span class="cgn">${g.files.length} file${g.files.length>1?'s':''}</span></div>${g.files.map(f=>fileDiff(g.key,f)).join('')}</div>`).join('');
}

/* Commit CTA — user-initiated, message auto-drafted (never handwritten),
   PTY-committed. Enabled once the uncommitted files are marked Viewed. */
function commitCtaHtml(){
  const unc=FILES.filter(f=>!f.commit);
  if(!unc.length) return '';
  const viewedN=unc.filter(f=>viewed[f.p]).length, ready=viewedN===unc.length;
  const draft='auth: restore audience-claim check in legacy verify()';
  const L=BRANCH.lint, lg=CK_GLYPH[L.state]||'·'; /* gate lint reflects the real Checks state, never a hardcoded pass */
  const n=ready?viewedN:unc.length;
  return `<div class="commitcta">
    <div class="cstage">
      <div class="top"><span class="g">${ic('git-commit')}</span><span>Commit uncommitted work</span><span class="grow" style="flex:1"></span><span class="branchmeta">${viewedN} of ${unc.length} file${unc.length>1?'s':''} viewed</span></div>
      <div class="msg"><span class="draft">draft</span><span class="g">${draft}</span><span class="redraft" onclick="event.stopPropagation()" tabindex="0" role="button" title="re-draft the message from the diff">${ic('arrow-clockwise')}</span></div>
      <button class="btn" ${ready?'':'disabled'} tabindex="0">${ic('git-commit')} Commit ${n} viewed file${n>1?'s':''}</button>
    </div>
    ${landHtml()}
  </div>`;
}

/* Land — user-initiated commit→push→PR. Stage 2 CREATES A PULL REQUEST
   (feat branch → main); it does not merge. Honest: it's a concrete action,
   gated on review addressed + tests green, with a two-step confirm. It does
   NOT claim the PR already exists. */
function landHtml(){
  const openN=openFindings();
  const testsPass=BRANCH.tests.state==='pass';
  const reviewOk=openN===0;
  const ready=reviewOk&&testsPass;
  /* Each prerequisite states its ACTUAL status in words — so a disabled Merge
     button needs no separate "to enable" hint; the gate rows already say why. */
  const reviewRow=`<div class="mgrow"><span class="mgk">Review</span><span class="mgv ${reviewOk?'ok':'warn'}">${ic('binoculars')} ${reviewOk?'all findings addressed':`changes requested · ${openN} open`}</span></div>`;
  const testsRow=`<div class="mgrow"><span class="mgk">Tests</span><span class="mgv ${testsPass?'ok':'wait'}">${testsPass?ic('check'):ic('circle-notch')} ${testsPass?BRANCH.tests.label:'not green yet'}</span></div>`;
  let act;
  if(!ready){
    act=`<button class="mbtn" disabled tabindex="0">${ic('arrows-merge')} Create PR</button>`;
  } else if(landStep===0){
    act=`<button class="mbtn" onclick="event.stopPropagation();armLand()" tabindex="0">${ic('arrows-merge')} Create PR</button><span class="chain">commit → push → open PR</span>`;
  } else {
    act=`<button class="mbtn confirm" onclick="event.stopPropagation();armLand()" tabindex="0">${ic('arrows-merge')} Confirm — create PR</button><span class="mhint">runs the chain · <span class="redraft" onclick="event.stopPropagation();cancelLand()" style="cursor:pointer">cancel</span></span>`;
  }
  return `<div class="mstage">
    <div class="mstage-h">${ic('arrows-merge')} PR <span class="mono">feat/auth-rotation</span> → <span class="mono">main</span></div>
    ${reviewRow}
    ${testsRow}
    <div class="mstage-act">${act}</div>
  </div>`;
}

function checkDetailHtml(m){
  const c=m.check||{};
  const buttons=[`<button class="detbtn primary" tabindex="0">${ic('arrow-clockwise')} Re-run</button>`];
  if(c.fix) buttons.push(`<button class="detbtn" tabindex="0">${ic('pencil-simple')} Fix issues</button>`);
  if(c.artifact) buttons.push(`<button class="detbtn" tabindex="0" onclick="openArtifact('${c.artifact}')">${ic('file-text')} Open ${(ARTIFACTS.find(a=>a.id===c.artifact)||{}).path||'artifact'}</button>`);
  return `<div class="detbtns">${buttons.join('')}</div>
    ${c.by?`<div class="kv"><span class="k">reviewed by</span><span>${c.by} <span class="branchmeta">(convention — an Argo-instrumented review produced this)</span></span></div>`:''}
    ${c.cmd?`<div class="kv"><span class="k">command</span><span style="font-family:var(--mono)">${esc(c.cmd)}</span></div>`:''}
    <div class="feed" style="margin-top:10px">${(c.out||'—').split('\n').map(l=>{const cl=/✓|passed/.test(l)?'a':/✗|error|blocking/.test(l)?'r':/warning|⚠|✖/.test(l)?'w':'';return `<span class="${cl}">${esc(l)}</span>`;}).join('\n')}</div>`;
}

/* ══ v5 · Review as an Activity tab — verdict-first, compact, rendered INSIDE
      the narrow Activity scroll (no takeover). The diff stays in Detail; a
      finding's → diff (or its row) selects the file there + scrolls to the
      inline card, so findings and code sit side by side. ══ */
function reviewFindingRow(f){
  const st=findingStatus[f.id];
  const sev=f.severity==='blocking'?'blocking':'advisory';
  const glyph=f.severity==='blocking'?'▲':'◆';
  /* whole row → the file's inline card in Detail; Address button stops props. */
  return `<div id="rv-${f.id}" class="rvrow sev-${sev} ${st} ${focusFinding===f.id?'rv-focus':''}" onclick="gotoDiff('${f.id}')">
    <span class="rsev">${glyph}</span>
    <div class="rmid">
      <div class="rloc">${f.file}:${f.line}<span class="diffjump" onclick="event.stopPropagation();gotoDiff('${f.id}')" tabindex="0" role="button">${ic('caret-right')} diff</span></div>
      <div class="rbody">${esc(f.body)}</div>
      <div class="rby">${f.by} · ${f.severity}</div></div>
    <div class="ractions">${stateChip(st)}${addressBtn(f.id,st)}</div></div>`;
}
/* Compact verdict-first review body, sized for the narrow Activity column. */
function reviewTabHtml(){
  const total=FINDINGS.length, fixed=fixedFindings(), openN=FINDINGS.filter(f=>findingStatus[f.id]==='open').length;
  const blockingLeft=FINDINGS.filter(f=>findingStatus[f.id]!=='fixed'&&f.severity==='blocking').length;
  const allFixed=fixed===total, testsPass=BRANCH.tests.state==='pass', mergeReady=allFixed&&testsPass;
  const pct=Math.round(fixed/total*100), baseSha='41ce2f0';

  const hero=allFixed
    ? `<div class="rv-hero approve compact">
        <div class="verdict"><span class="vglyph ap">${ic('binoculars')}</span><div class="vhead">All findings addressed</div></div>
        <div class="vsum">${total} of ${total} findings marked <b>Fixed</b>. Argo has not re-run the review — <b>Re-review</b> to refresh the verdict, or open the PR now (tests are green).</div>
        <div class="vattr">argo · code-review<span class="sha">base ${baseSha}</span></div>
        <div class="vnote">Blocking is advisory — Argo holds no merge gate.</div></div>`
    : `<div class="rv-hero compact">
        <div class="verdict"><span class="vglyph">${ic('binoculars')}</span><div class="vhead">Changes requested · <span class="vblock">${blockingLeft} blocking</span></div></div>
        <div class="vsum">Two blocking findings in the auth-rotation change-set: the legacy path dropped an audience claim, and token rotation races the store write.</div>
        <div class="vattr">argo · code-review<span class="sha">base ${baseSha}</span></div>
        <div class="vnote">Blocking is advisory — Argo holds no merge gate.</div></div>`;

  const addressCta=openN>0
    ? `<button class="rv-btn primary" onclick="addressAll()">${ic('arrow-bend-down-right')} Address ${openN} finding${openN>1?'s':''}</button>`
    : `<button class="rv-btn primary" disabled title="nothing left to dispatch">${ic('arrow-bend-down-right')} Address findings</button>`;
  const mergeBtn=mergeReady
    ? (landStep===0
        ? `<button class="rv-btn merge" onclick="armLand()">${ic('arrows-merge')} Create PR</button>`
        : `<button class="rv-btn merge" onclick="armLand()">${ic('arrows-merge')} Confirm — create PR</button>`)
    : `<button class="rv-btn merge" disabled>${ic('arrows-merge')} Create PR</button>`;
  const cta=`<div class="rv-cta compact">${addressCta}<button class="rv-btn ghost" onclick="reReview()">${ic('arrow-clockwise')} Re-review</button>${mergeBtn}</div>`;

  const progress=`<div class="rv-progress compact ${allFixed?'done':''}">
    <span>${fixed} of ${total} addressed</span>
    <span class="track"><span style="width:${pct}%"></span></span>
    ${allFixed?'<span>· review ready — tests green</span>':(landStep===1?'<span>· click Confirm to run commit → push → PR</span>':'')}</div>`;

  return `${hero}${cta}${progress}
    <div class="sect-h" style="margin:16px 2px 9px">Findings <span class="n">· addressable · click a row → its diff</span><span class="grow"></span><span class="n">${total}</span></div>
    <div class="rv-list">${FINDINGS.map(reviewFindingRow).join('')}</div>`;
}

function detailHtml(){
  const m=detailModel();
  let body='', tabsHtml='';
  if(m.kind==='outcome'){
    const arts=m.artifacts||[];
    let artBlock='';
    if(arts.length){
      const cards=arts.map(a=>{const open=artOpen[a.id]!==false&&!a.missing; /* missing has no body */
        return `<div class="acard ${a.missing?'gone':''}">
          <div class="achead" onclick="toggleArt('${a.id}')">
            <span class="cv">${a.missing?'·':(open?ic('caret-down'):ic('caret-right'))}</span>
            <span class="ai">${a.missing?ic('warning'):ic('file-text')}</span><span class="apath">${a.path}</span>
            <span class="grow"></span>${a.missing?'<span class="amiss">no longer on disk</span>':''}</div>
          ${open?`<div class="acbody"><div class="doc">${a.body}</div></div>`:''}</div>`;}).join('');
      artBlock=`<div class="sect-h" style="margin:0 2px 9px">Artifacts <span class="n">· ${arts.length} · click a title to open</span></div>${cards}`;
    }
    const fileBlock=m.files&&m.files.length?`<div class="sect-h" style="margin:${arts.length?'16px':'2px'} 2px 8px">Files <span class="n">· diffs group by commit</span></div>${groupedFiles(m.files)}`:'';
    body=artBlock+fileBlock;
    tabsHtml=`<span class="dtab on">${arts.length?`${arts.length} artifact${arts.length>1?'s':''}`:''}${arts.length&&m.files?' · ':''}${m.files?`Diff · ${m.files.length} file${m.files.length>1?'s':''}`:''}</span>`;
  } else if(m.kind==='check'){
    body=checkDetailHtml(m);
    tabsHtml=`<span class="dtab on">Result</span>`;
  } else if(m.kind==='files'){
    body=(m.cta?commitCtaHtml():'')+groupedFiles(m.files||[]);
    tabsHtml=`<span class="dtab on">Diff · ${(m.files||[]).length} file${(m.files||[]).length>1?'s':''}</span>`;
  } else if(m.kind==='feed'){
    body=`<div class="feed">${esc(m.feed).replace(/▸/g,'<span class="p">▸</span>')}</div>`;
    tabsHtml=`<span class="dtab on">Feed</span>`;
  } else {
    body=`<div class="empty">Nothing captured for this action yet.</div>`;
    tabsHtml=`<span class="dtab on">—</span>`;
  }
  const jump=sel!=='session'?`<span class="scopejump" onclick="pick('session')">${ic('x')} clear filter</span>`:'';
  /* findings apply when the detail is showing files that carry them */
  const modelFiles=m.files||[];
  const hasFindings=modelFiles.some(f=>findingsFor(f.p).length);
  const pager=hasFindings?fwalkHtml():'';
  return `<div class="region detail">
    <div class="rhead"><span class="icon">${ic('git-diff')}</span><span class="name">${m.title}</span><span class="grow"></span></div>
    <div class="dtabs">${tabsHtml}${jump}</div>
    <div class="rscroll">${body}</div></div>`;
}

/* finding-walk pager — the (visual) walk control across all findings */
function fwalkHtml(){
  const n=FINDINGS.length, cur=Math.min(walkIdx,n-1)+1;
  const done=openFindings()===0;
  return `<span class="fwalk">
    <span class="arw" onclick="walkPrev()" title="previous finding">${ic('caret-left')}</span>
    <span class="cnt">finding ${cur} / ${n}${done?' · all resolved':''}</span>
    <span class="arw" onclick="walkNext()" title="next finding">${ic('caret-right')}</span></span>`;
}

/* v5: no takeover — Activity (with its Overview|Review tabs) and Detail always
   sit side by side. showDetail=false still collapses Detail as before. */
function workHtml(){
  return `<div class="work ${showDetail?'':'solo'}">
    ${activityHtml()}
    ${showDetail?`<div class="vsplit" data-split="detail"></div>${detailHtml()}`:'<div></div><div></div>'}
  </div>`;
}
function sessionHtml(){
  return `<div class="panel session">
    <div class="shead">
      <div class="crumb"><span>argo</span><span class="sep">${ic('caret-right')}</span><b>Auth refactor</b></div>
      <div class="toggles"><span class="tg ${showDetail?'on':''}" onclick="toggleDetail()">${ic('sidebar-simple')} Details</span></div>
    </div>
    ${workHtml()}
    <div class="hsplit" data-split="term"></div>
    <div class="term">
      <div class="term-h">Terminal <span class="grow"></span><span class="x" onclick="expandTerm()">${termTall.v?`${ic('caret-down')} collapse`:`${ic('caret-up')} expand`}</span></div>
      <div class="term-body" contenteditable="true" spellcheck="false"><span class="p">▸</span> Edit src/auth/legacy.ts · verify() delegates to rotation core
<span class="p">auth refactor $</span> <span class="caret"></span></div>
    </div></div>`;
}

function render(){app.innerHTML=railHtml()+`<div class="vsplit" data-split="rail"></div>`+sessionHtml();wireSplitters();wireA11y();drawOrb();}
function wireA11y(){document.querySelectorAll('[onclick]:not([tabindex]):not([contenteditable])').forEach(el=>{
  if(el.classList.contains('viewed'))return; /* the Viewed label wraps a native checkbox */
  if(el.parentElement&&el.parentElement.closest('[role=button]'))return; /* never nest button roles */
  el.setAttribute('tabindex','0');el.setAttribute('role','button');});}
addEventListener('keydown',e=>{const el=document.activeElement;if((e.key==='Enter'||e.key===' ')&&el&&el.hasAttribute('onclick')&&el.getAttribute('contenteditable')!=='true'){e.preventDefault();el.click();}});
function pick(id){sel=id;detailTab=null;if(id!=='session')showDetail=true;render();}
function toggleArt(id){artOpen[id]=artOpen[id]===false?true:false;render();}
function openArtifact(aid){const o=OUTCOMES.find(x=>(x.artifacts||[]).includes(aid));if(o){sel='outcome:'+o.id;artOpen[aid]=true;showDetail=true;render();}}
function setTab(t){detailTab=t;render();}
function toggleMsg(id){expanded[id]=!expanded[id];render();}
function toggleView(key){viewed[key]=!viewed[key];render();}
function toggleDetail(){showDetail=!showDetail;render();}
/* Projects group header — collapsible (root cause of the dead toggle: the mock
   rendered a static chevron with no click handler or open/closed state). */
function toggleProj(){projOpen=!projOpen;render();}
/* ── v5 Review-tab routing + finding-walk ── */
function setActiveTab(t){activeTab=t;render();}
/* Enter the Review tab: switch the Activity column to it, keep the whole
   change-set diff visible in Detail (findings on) — no takeover. */
function openReview(){activeTab='review';sel='session';showDetail=true;walkIdx=0;landStep=0;render();}
/* subtle diff marker → jump to this finding's card on the Review tab (the home). */
function openFindingInReview(id){activeTab='review';focusFinding=id;const i=FINDINGS.findIndex(f=>f.id===id);if(i>=0)walkIdx=i;render();requestAnimationFrame(()=>{const el=document.getElementById('rv-'+id);if(el)el.scrollIntoView({block:'center',behavior:'smooth'});});}
/* Address button: walk Open → Addressing → Fixed (Fixed → Open reopens). */
function advanceFinding(id){const s=findingStatus[id];
  findingStatus[id]= s==='open'?'addressing' : s==='addressing'?'fixed' : 'open';
  if(findingStatus[id]!=='fixed'&&openFindings()>0)landStep=0; /* reopening un-arms merge */
  render();}
const toggleFinding=advanceFinding; /* back-compat alias */
/* Top CTA: dispatch every still-Open finding to its fix agent (→ Addressing,
   a PENDING state — no fabricated success; user confirms Fixed after). */
function addressAll(){FINDINGS.forEach(f=>{if(findingStatus[f.id]==='open')findingStatus[f.id]='addressing';});render();}
/* Re-review: would re-run /code-review. Prototype no-op re-render (no fake verdict). */
function reReview(){render();}
/* → diff: select the finding's file in Detail (whole change-set diff, findings
   on) and scroll to its inline card — findings (Activity) beside code (Detail). */
function gotoDiff(id){const f=FINDINGS.find(x=>x.id===id);if(!f)return;
  sel='session';showDetail=true;const i=FINDINGS.findIndex(x=>x.id===id);if(i>=0)walkIdx=i;
  render();requestAnimationFrame(()=>{const el=document.getElementById('fm-'+id);if(el)el.scrollIntoView({block:'center',behavior:'smooth'});});}
function walkNext(){walkIdx=(walkIdx+1)%FINDINGS.length;render();scrollToWalk();}
function walkPrev(){walkIdx=(walkIdx-1+FINDINGS.length)%FINDINGS.length;render();scrollToWalk();}
function scrollToWalk(){const f=FINDINGS[walkIdx];if(!f)return;requestAnimationFrame(()=>{const el=document.getElementById('fm-'+f.id);if(el)el.scrollIntoView({block:'center',behavior:'smooth'});});}
function armLand(){if(landStep===0){landStep=1;}else{landStep=0;/* prototype: no fabricated success — chain would run here */}render();}
function cancelLand(){landStep=0;render();}
function expandTerm(){termTall.v=!termTall.v;document.documentElement.style.setProperty('--r-term',termTall.v?'44vh':'170px');render();}
Object.assign(window,{pick,toggleArt,openArtifact,setTab,toggleMsg,toggleView,toggleDetail,toggleProj,expandTerm,
  setActiveTab,openReview,openFindingInReview,toggleFinding,advanceFinding,addressAll,reReview,gotoDiff,
  walkNext,walkPrev,armLand,cancelLand});

function wireSplitters(){
  document.querySelectorAll('[data-split]').forEach(el=>{
    el.addEventListener('pointerdown',e=>{
      e.preventDefault();el.setPointerCapture(e.pointerId);el.classList.add('dragging');
      const kind=el.dataset.split,sx=e.clientX,sy=e.clientY,root=document.documentElement.style,cs=getComputedStyle(document.documentElement);
      const sRail=parseInt(cs.getPropertyValue('--c-rail'))||236,sTerm=parseInt(cs.getPropertyValue('--r-term'))||170;
      /* Activity owns the sized track (default 1fr — an even 50/50 split);
         dragging pins --c-act to px. Clamp keeps Session changes ≥300px
         (306 = 300 + the 6px splitter). */
      const actEl=document.querySelector('.region.activity'),workEl=document.querySelector('.work');
      const sAct=actEl?actEl.getBoundingClientRect().width:640;
      const move=ev=>{
        if(kind==='rail')root.setProperty('--c-rail',Math.max(190,Math.min(360,sRail+(ev.clientX-sx)))+'px');
        if(kind==='detail'){const workW=workEl?workEl.getBoundingClientRect().width:innerWidth;
          root.setProperty('--c-act',Math.max(360,Math.min(workW-306,sAct+(ev.clientX-sx)))+'px');}
        if(kind==='term')root.setProperty('--r-term',Math.max(92,Math.min(innerHeight*0.6,sTerm-(ev.clientY-sy)))+'px');
      };
      const up=()=>{el.classList.remove('dragging');removeEventListener('pointermove',move);removeEventListener('pointerup',up);};
      addEventListener('pointermove',move);addEventListener('pointerup',up);
    });
  });
}
let t=9,tok=118000;
setInterval(()=>{t++;tok+=Math.round(420*(0.6+Math.random()*0.8));
  const el=document.getElementById('nowel'),tk=document.getElementById('nowtok');
  if(el)el.textContent=Math.floor(t/60)+':'+String(t%60).padStart(2,'0');
  if(tk)tk.textContent=(tok/1000).toFixed(0)+'K';},1000);
const starC=document.getElementById('stars');
function drawStars(){const dpr=Math.min(2,devicePixelRatio||1);starC.width=innerWidth*dpr;starC.height=innerHeight*dpr;
  const c=starC.getContext('2d');c.scale(dpr,dpr);c.clearRect(0,0,innerWidth,innerHeight);
  for(let i=0;i<90;i++){const x=Math.random()*innerWidth,y=Math.random()*innerHeight*0.7,r=Math.random()*1.1;
    c.globalAlpha=0.15+Math.random()*0.5;c.fillStyle='#cbc5bb'/* component-local: canvas star ink (decorative; canvas can't read CSS vars) */;c.beginPath();c.arc(x,y,r,0,7);c.fill();}c.globalAlpha=1;}
const ORB=['idle','listening','thinking','speaking'];let orbState=0;
function cycleOrb(){orbState=(orbState+1)%ORB.length;document.getElementById('orbstate').textContent=ORB[orbState];
  document.getElementById('glow').classList.toggle('warm',orbState>0);drawOrb();}
window.cycleOrb=cycleOrb;
function drawOrb(){const cv=document.getElementById('orb');if(!cv)return;const c=cv.getContext('2d'),cx=26,cy=26,R=13,warm=orbState>0;
  /* component-local: concierge-orb canvas palette (Round-2 resolution — decorative singleton, not tokenized) */
  const rim=warm?'rgba(242,180,120,0.95)':'rgba(210,224,255,0.95)',glow=warm?'rgba(242,140,77,':'rgba(84,104,234,';
  c.clearRect(0,0,52,52);const g=c.createRadialGradient(cx,cy,R*0.7,cx,cy,R*2);g.addColorStop(0,glow+'0.5)');g.addColorStop(1,glow+'0)');
  c.fillStyle=g;c.beginPath();c.arc(cx,cy,R*2,0,7);c.fill();c.beginPath();c.arc(cx,cy,R,0,7);c.fillStyle='#0a0806';c.fill();
  c.lineWidth=1.4;c.strokeStyle=rim;c.beginPath();c.arc(cx,cy,R,0,7);c.stroke();}
addEventListener('resize',()=>{drawStars();drawOrb();});
document.getElementById('hint').textContent='v5 · Review as an Activity tab — Checks/Outcomes "Review" row switches the Activity column to its Review tab (no takeover; Detail keeps the diff beside it). Compact verdict hero + addressable findings: Address dispatches (→ Addressing, pending), rows walk Open → Addressing → Fixed, progress + Create PR enable when all Fixed. A finding\'s row / → diff selects its file in Detail and scrolls to the inline card. "Blocking" is advisory — Argo holds no merge gate.';
render();drawStars();
</script>
