<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Argo · v5 · Review as Activity tab</title>
<link rel="stylesheet" href="tokens.css" />
<style>
  /* One glass depth per region. RAIL + SESSION are the only glass panels.
     Activity / Detail / Terminal live inside the one session card; their
     inner sections are flat inset cards.
     Styled via the LANDED contract (tokens.css → argo-tokens.css): semantic
     roles, core ramps (color-mix alphas on the quantized scales), and the
     --type-* tuples. The only raw values left are flagged component-local
     literals (orb/stars canvas, decorative animation durations, icon boxes). */
  :root{
    color-scheme:dark;
  }
  *{box-sizing:border-box;}
  /* Phosphor Light inline-icon helper — 1em so it scales with the row's font-size;
     fill:currentColor so the existing colour tokens (muted/indigo/success/warning/
     critical) tint the icon exactly like they tinted the old glyph. */
  .ic{width:1em;height:1em;display:inline-block;vertical-align:-0.14em;flex:none;fill:currentColor;}
  .ic.sm{width:.86em;height:.86em;}
  html,body{margin:0;height:100%;}
  body{overflow:hidden;} /* colour/type/background come from the tokens.css body rule */
  #sky{position:fixed;inset:0;z-index:0;overflow:hidden;}
  #sky .glow{position:absolute;left:50%;bottom:-38%;transform:translateX(-50%);width:150vw;height:110vh;border-radius:50%;
    background:radial-gradient(closest-side,color-mix(in srgb,var(--indigo-500) 24%,transparent),color-mix(in srgb,var(--indigo-500) 6%,transparent) 55%,transparent 72%);filter:blur(20px);}
  #sky .glow.warm{width:70vw;height:50vh;bottom:-14%;opacity:.5;background:radial-gradient(closest-side,color-mix(in srgb,var(--amber-500) 12%,transparent),transparent 70%);}
  #sky canvas{position:absolute;inset:0;width:100%;height:100%;}

  .app{position:relative;z-index:1;height:100vh;display:grid;grid-template-columns:var(--c-rail,236px) 6px 1fr;padding:12px;}
  .panel{position:relative;min-width:0;min-height:0;background:var(--panel);
    -webkit-backdrop-filter:blur(22px) saturate(1.2);backdrop-filter:blur(22px) saturate(1.2);
    border:1px solid var(--border);border-radius:calc(var(--radius) + 4px);box-shadow:0 1px 0 color-mix(in srgb,var(--gray-50) 9%,transparent) inset,0 18px 40px var(--shadow-3);
    display:flex;flex-direction:column;overflow:hidden;}
  .vsplit,.hsplit{position:relative;z-index:3;}
  .vsplit{cursor:col-resize;} .hsplit{cursor:row-resize;height:6px;}
  .vsplit::after{content:"";position:absolute;inset:0;margin:auto;width:2px;height:34px;border-radius:calc(var(--radius) - 4px);background:var(--border);transition:background var(--time-fast);}
  .hsplit::after{content:"";position:absolute;inset:0;margin:auto;height:2px;width:34px;border-radius:calc(var(--radius) - 4px);background:var(--border);transition:background var(--time-fast);}
  .vsplit:hover::after,.hsplit:hover::after,.dragging::after{background:var(--primary);}

  /* DERIVED — a computed / best-effort value (parsed stdout, snapshot diff,
     timestamp delta, token-sum estimate). Dotted underline, NEVER a state
     colour; the title names its source. `.gone` = value not captured. */
  .derived{text-decoration:underline dotted;text-decoration-color:var(--foreground-faint);text-underline-offset:2px;text-decoration-thickness:from-font;cursor:help;}
  .derived.gone{text-decoration:none;color:var(--foreground-faint);}

  /* Rail */
  .rail-h{display:flex;align-items:center;gap:8px;padding:13px 14px 9px;color:var(--muted-foreground);font:var(--type-eyebrow-weight) var(--type-eyebrow)/var(--type-eyebrow-leading) var(--sans);letter-spacing:var(--type-eyebrow-tracking);text-transform:uppercase;}
  .rail-h .plus,.proj .plus{margin-left:auto;width:18px;height:18px;border-radius:calc(var(--radius) - 2px);display:grid;place-items:center;color:var(--muted-foreground);border:1px solid var(--border);cursor:pointer;flex:none;}
  .proj{display:flex;align-items:center;gap:7px;padding:5px 14px;color:var(--foreground);font:var(--type-row-strong-weight) var(--type-row-strong)/var(--type-row-strong-leading) var(--sans);letter-spacing:var(--type-row-strong-tracking);cursor:pointer;user-select:none;}
  .proj .n{color:var(--foreground-faint);font-weight:var(--type-meta-weight);}
  .rail-scroll{flex:1;overflow:auto;padding:2px 10px 8px;}
  .srow{display:block;background:var(--inset);border:1px solid var(--inset-hair);border-radius:calc(var(--radius) + 4px);padding:9px 11px;margin:6px 0;cursor:pointer;transition:border-color var(--time-fast),background var(--time-fast);}
  .srow:hover{background:color-mix(in srgb,var(--gray-50) 4%,transparent);}
  .srow.sel{border-color:color-mix(in srgb,var(--primary) 55%,transparent);background:linear-gradient(135deg, color-mix(in srgb, var(--primary) 24%, transparent), color-mix(in srgb, var(--primary) 6%, transparent));box-shadow:0 0 0 1px color-mix(in srgb,var(--primary) 24%,transparent);}
  .srow .t{display:flex;align-items:center;gap:6px;font:var(--type-row-strong-weight) var(--type-row-strong)/var(--type-row-strong-leading) var(--sans);letter-spacing:var(--type-row-strong-tracking);} .srow .t .grow{flex:1;}
  .srow .sic{flex:none;display:inline-flex;font-size:14px;} /* icon box — container-sized, outside the type ramp */
  .srow .sic.run{color:var(--status-working);} .srow .sic.amber{color:var(--status-awaiting-input);} .srow .sic.mist{color:var(--status-idle);} .srow .sic.red{color:var(--status-failed);} .srow .sic.gray{color:var(--status-idle);} .srow .sic.stale{color:var(--status-exited);}
  @media (prefers-reduced-motion:no-preference){ .srow .sic.run{animation:sicpulse 1.9s ease-in-out infinite;} }
  @keyframes sicpulse{0%,100%{opacity:1;}50%{opacity:.5;}}
  .srow .ttl{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .srow .t .stw{display:inline-flex;align-items:center;gap:5px;color:var(--muted-foreground);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);flex:none;}
  .srow .t .stw.amber{color:var(--status-awaiting-input);} .srow .t .stw.red{color:var(--status-failed);}
  .srow .slot{color:var(--muted-foreground);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);margin:6px 0 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .srow .meta{color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);font-variant-numeric:tabular-nums;margin:4px 0 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .srow .slot::first-letter,.srow .meta::first-letter{text-transform:uppercase;}
  /* Context gauge — ONE shape for "context remaining" everywhere (rail rows +
     session header): CTX tag + bar + ~n%. Un-scoped so both sites share it. */
  .ctxrow{display:flex;align-items:center;gap:7px;}
  .srow .ctxrow{margin:3px 0 0;}
  .ctxlbl{color:var(--foreground-faint);font:var(--type-tag-weight) var(--type-tag)/var(--type-tag-leading) var(--sans);letter-spacing:var(--type-tag-tracking);text-transform:uppercase;flex:none;}
  .srow .ctxrow .ctxbar{flex:1;width:auto;}
  .ctxpct{color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);font-variant-numeric:tabular-nums;flex:none;}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex:none;}
  .dot.run{background:var(--status-working);box-shadow:0 0 8px color-mix(in srgb,var(--status-working) 70%,transparent);}
  .dot.amber{background:var(--status-awaiting-input);box-shadow:0 0 8px color-mix(in srgb,var(--status-awaiting-input) 55%,transparent);}
  .dot.mist{background:var(--status-idle);box-shadow:0 0 7px color-mix(in srgb,var(--status-idle) 55%,transparent);}
  .dot.gray{background:var(--status-idle);box-shadow:0 0 6px color-mix(in srgb,var(--status-idle) 55%,transparent);}
  .dot.red{background:var(--status-failed);box-shadow:0 0 8px color-mix(in srgb,var(--status-failed) 70%,transparent);}
  .dot.stale{background:var(--status-exited);box-shadow:0 0 6px color-mix(in srgb,var(--status-exited) 40%,transparent);}
  .dock{margin-top:auto;display:flex;align-items:center;gap:9px;padding:11px 14px;border-top:1px solid var(--border);cursor:pointer;}
  .dock canvas{width:26px;height:26px;border-radius:50%;} .dock .lbl{font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);}
  .dock .state{margin-left:auto;color:var(--foreground-faint);font:var(--type-tag-weight) var(--type-tag)/var(--type-tag-leading) var(--sans);letter-spacing:var(--type-tag-tracking);text-transform:uppercase;}

  /* Session card */
  .session{display:grid;grid-template-rows:auto var(--r-work,1fr) 6px var(--r-term,170px);min-height:0;}
  .shead{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .crumb{display:flex;align-items:center;gap:7px;font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);color:var(--muted-foreground);} .crumb b{color:var(--foreground);font-weight:var(--type-row-strong-weight);} .crumb .sep{color:var(--foreground-faint);}
  .smeta{display:flex;align-items:center;gap:7px;color:var(--muted-foreground);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);font-variant-numeric:tabular-nums;}
  .mref{font-family:var(--mono);color:var(--muted-foreground);}
  .ctxbar{display:inline-block;width:48px;height:5px;border-radius:calc(var(--radius) - 4px);background:color-mix(in srgb,var(--gray-50) 9%,transparent);overflow:hidden;vertical-align:middle;}
  .ctxbar>span{display:block;height:100%;background:linear-gradient(90deg,var(--primary),var(--indigo-400));}
  .toggles{margin-left:auto;display:flex;gap:5px;}
  .tg{font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);color:var(--muted-foreground);border:1px solid var(--border);border-radius:var(--radius);padding:3px 9px;cursor:pointer;display:inline-flex;gap:5px;align-items:center;user-select:none;}
  .tg.on{color:var(--foreground);border-color:color-mix(in srgb,var(--primary) 55%,transparent);background:var(--accent);}

  /* Default split: the two work panes (Activity | Session changes) share the
     width 50/50; a splitter drag pins --c-act (the Activity track) to px. */
  .work{display:grid;grid-template-columns:var(--c-act,1fr) 6px 1fr;min-height:0;overflow:hidden;}
  .work.solo{grid-template-columns:1fr 0 0;}
  .region{display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden;}
  .region.detail{border-left:1px solid var(--border);}
  .rhead{display:flex;align-items:center;gap:8px;padding:9px 13px 8px;border-bottom:1px solid var(--border);min-height:38px;}
  .rhead .icon{color:var(--muted-foreground);} .rhead .name{font:var(--type-row-strong-weight) var(--type-row-strong)/var(--type-row-strong-leading) var(--sans);letter-spacing:var(--type-row-strong-tracking);} .rhead .grow{flex:1;} .rhead .sub{color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);}
  .rscroll{flex:1;overflow:auto;padding:12px 13px 16px;min-height:0;}
  .inset{background:var(--inset);border:1px solid var(--inset-hair);border-radius:calc(var(--radius) + 4px);box-shadow:0 1px 0 color-mix(in srgb,var(--gray-50) 4%,transparent) inset;padding:12px 13px;margin:0 0 12px;}
  .inset.pad0{padding:0;overflow:hidden;}
  .sect-h{display:flex;align-items:center;gap:8px;color:var(--muted-foreground);font:var(--type-eyebrow-weight) var(--type-eyebrow)/var(--type-eyebrow-leading) var(--sans);letter-spacing:var(--type-eyebrow-tracking);text-transform:uppercase;margin:2px 2px 8px;}
  .sect-h .grow{flex:1;} .sect-h .n{color:var(--foreground-faint);letter-spacing:0;text-transform:none;}

  /* Now-line */
  .now{display:flex;align-items:center;gap:13px;}
  .now .verb{width:38px;height:38px;border-radius:calc(var(--radius) + 4px);flex:none;display:grid;place-items:center;font-size:17px;position:relative; /* icon box */
    background:radial-gradient(circle at 50% 35%,color-mix(in srgb,var(--primary) 24%,transparent),color-mix(in srgb,var(--primary) 6%,transparent) 70%);border:1px solid color-mix(in srgb,var(--primary) 40%,transparent);color:var(--indigo-200);}
  .now .verb .pulse{position:absolute;inset:-1px;border-radius:calc(var(--radius) + 4px);border:1px solid color-mix(in srgb,var(--primary) 55%,transparent);animation:pulse 1.8s ease-out infinite;}
  @keyframes pulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.35);opacity:0}}
  @media (prefers-reduced-motion:reduce){.now .verb .pulse{animation:none;}}
  .now .body{min-width:0;flex:1;} .now .line{font:var(--type-title-weight) var(--type-title)/var(--type-title-leading) var(--sans);letter-spacing:var(--type-title-tracking);} .now .line .mono{font-family:var(--mono);color:var(--indigo-100);}
  .now .sub{color:var(--muted-foreground);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);margin-top:3px;font-variant-numeric:tabular-nums;display:flex;gap:11px;flex-wrap:wrap;} .now .sub .k{color:var(--foreground-faint);} .now .live{color:var(--status-working);}
  .now .orphan{color:var(--status-exited);font-weight:var(--type-tag-weight);font-variant-emoji:text;} .inset.orphaned{border-color:color-mix(in srgb,var(--status-exited) 40%,transparent);}

  /* Checks — branch-level health, keyed to the latest commit. */
  .checks{display:flex;flex-direction:column;gap:1px;}
  .chkrow{display:flex;align-items:center;gap:9px;padding:5px 8px;border-radius:var(--radius);font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);cursor:pointer;}
  .chkrow:hover{background:color-mix(in srgb,var(--gray-50) 4%,transparent);}
  .chkrow.sel{background:var(--accent);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--primary) 40%,transparent);}
  .chkrow .ck{width:15px;text-align:center;flex:none;font-variant-emoji:text;}
  .chkrow .cklbl{color:var(--muted-foreground);width:82px;flex:none;}
  .chkrow .ckval{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .chkrow .grow{flex:1;} .chkrow .rerun{color:var(--primary);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);flex:none;opacity:0;} .chkrow:hover .rerun,.chkrow:focus-visible .rerun{opacity:1;}
  /* check pass/warn/fail have no semantic family yet — core ramp steps (follow-up) */
  .ck.pass{color:var(--green-500);} .ck.fail{color:var(--red-500);} .ck.warn{color:var(--amber-500);} .ck.none{color:var(--foreground-faint);}
  .ck.run{color:var(--status-working);} .ck.changes{color:var(--verdict-changes);} .ck.approve{color:var(--verdict-approve);} .ck.partial{color:var(--muted-foreground);}
  .ckval.fail{color:var(--red-300);} .ckval.warn{color:var(--amber-300);}
  .branchmeta{color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);font-variant-numeric:tabular-nums;}

  /* Working set / file rows */
  .wsrow{display:flex;align-items:center;gap:9px;padding:5px 8px;border-radius:var(--radius);cursor:pointer;font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);}
  .wsrow:hover{background:color-mix(in srgb,var(--gray-50) 4%,transparent);}
  .doc{font:var(--type-prose-weight) var(--type-prose)/var(--type-prose-leading) var(--sans);letter-spacing:var(--type-prose-tracking);color:var(--foreground-soft);} .doc b{color:var(--gray-50);} .doc code{font:var(--type-code-inline-weight) var(--type-code-inline)/var(--type-code-inline-leading) var(--mono);letter-spacing:var(--type-code-inline-tracking);color:var(--foreground-soft);background:color-mix(in srgb,var(--gray-50) 6%,transparent);padding:1px 4px;border-radius:calc(var(--radius) - 4px);}

  /* ── Outcomes — the "what got done" spine ── */
  .orow{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:var(--radius);cursor:pointer;font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);}
  .orow:hover{background:color-mix(in srgb,var(--gray-50) 4%,transparent);}
  .orow.sel{background:var(--accent);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--primary) 40%,transparent);}
  .orow .otype{width:15px;text-align:center;color:var(--muted-foreground);flex:none;font-size:13px;font-variant-emoji:text;} /* icon box */
  .orow .otype.prefix{opacity:.45;}
  .orow .otw{color:var(--muted-foreground);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);width:88px;flex:none;}
  .orow .otitle{color:var(--foreground);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .orow .grow{flex:1;}
  .orow .oprov{color:var(--foreground-faint);font:var(--type-code-inline-weight) var(--type-code-inline)/var(--type-code-inline-leading) var(--mono);letter-spacing:var(--type-code-inline-tracking);flex:none;}
  .orow .oroll{color:var(--muted-foreground);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);font-variant-numeric:tabular-nums;flex:none;} .orow .oroll .pm{color:var(--foreground-faint);}
  .orow .ostate{display:inline-flex;align-items:center;gap:6px;justify-content:flex-end;min-width:82px;flex:none;} .orow .ostate .sword{color:var(--muted-foreground);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);}
  .sumpeer .go{color:var(--foreground-faint);margin-left:4px;}
  .cgroup{margin:0 0 14px;} .cghead{display:flex;align-items:center;gap:8px;padding:6px 4px 8px;font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);}
  .cghead .sha{font:var(--type-code-inline-weight) var(--type-code-inline)/var(--type-code-inline-leading) var(--mono);letter-spacing:var(--type-code-inline-tracking);color:var(--muted-foreground);} .cghead .cmsg{color:var(--foreground);font-weight:var(--type-row-strong-weight);} .cghead .grow{flex:1;} .cghead .cgn{color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);} .cghead.wip .cmsg{color:var(--amber-500);} /* uncommitted-warning — no check/warn semantic yet (follow-up) */
  /* shadcn Badge — soft semantic variant: subtle fill + hairline border,
     medium-weight label. One badge language for every chip in the cockpit. */
  .badge,.vtag{display:inline-flex;align-items:center;gap:4px;font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);padding:1.5px 7px;border-radius:calc(var(--radius) - 2px);border:1px solid transparent;white-space:nowrap;flex:none;font-variant-numeric:tabular-nums;}
  .badge .ic,.vtag .ic{opacity:.85;}
  .badge.success,.vtag.approve{color:var(--verdict-approve);background:color-mix(in srgb,var(--green-500) 12%,transparent);border-color:color-mix(in srgb,var(--green-500) 24%,transparent);}
  .badge.warning,.vtag.changes{color:var(--verdict-changes);background:color-mix(in srgb,var(--amber-500) 12%,transparent);border-color:color-mix(in srgb,var(--amber-500) 24%,transparent);}
  .badge.critical,.vtag.block{color:var(--verdict-block);background:color-mix(in srgb,var(--red-500) 12%,transparent);border-color:color-mix(in srgb,var(--red-500) 24%,transparent);}
  .badge.secondary,.vtag.neutral{color:var(--muted-foreground);background:color-mix(in srgb,var(--gray-50) 6%,transparent);border-color:var(--border);}
  .sumpeer{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--radius);cursor:pointer;color:var(--muted-foreground);font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);}
  .sumpeer:hover{background:color-mix(in srgb,var(--gray-50) 4%,transparent);} .sumpeer .cv{color:var(--foreground-faint);width:10px;flex:none;} .sumpeer .grow{flex:1;} .sumpeer .meta{color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);font-variant-numeric:tabular-nums;}
  .peerdiv{border-top:1px solid var(--inset-hair);margin:4px 2px;}
  /* non-interactive section header (Timeline) — same row anatomy, no click affordance */
  .sumpeer.static{cursor:default;} .sumpeer.static:hover{background:transparent;}

  /* Narrative */
  .msg{border-left:2px solid var(--inset-hair);padding:2px 0 2px 11px;margin:0 2px 3px;}
  .msg.run{border-left-color:var(--status-working);} .msg.done{border-left-color:color-mix(in srgb,var(--gray-400) 40%,transparent);}
  .msg-head{display:flex;align-items:flex-start;gap:8px;padding:5px 4px;cursor:pointer;}
  .msg-head .cv{color:var(--foreground-faint);font-size:10px;width:10px;flex:none;margin-top:3px;} /* icon box */
  .msg-head .say{font:var(--type-prose-weight) var(--type-prose)/var(--type-prose-leading) var(--sans);letter-spacing:var(--type-prose-tracking);color:var(--foreground);flex:1;}
  .msg-head .decl{font:var(--type-tag-weight) var(--type-tag)/var(--type-tag-leading) var(--sans);letter-spacing:var(--type-tag-tracking);text-transform:uppercase;color:var(--indigo-200);border:1px solid color-mix(in srgb,var(--primary) 40%,transparent);background:color-mix(in srgb,var(--primary) 12%,transparent);border-radius:calc(var(--radius) - 4px);padding:1px 6px;flex:none;margin-top:1px;}
  .msg-head .sd{flex:none;margin-top:5px;}
  .msg-tools{margin:2px 0 6px 18px;}
  .lrow{display:flex;align-items:center;gap:9px;padding:4px 8px;border-radius:var(--radius);cursor:pointer;}
  .lrow:hover{background:color-mix(in srgb,var(--gray-50) 4%,transparent);}
  .lrow.sel{background:var(--accent);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--primary) 40%,transparent);}
  .lrow .ti{width:16px;text-align:center;color:var(--muted-foreground);font-size:12px;flex:none;font-variant-emoji:text;} /* icon box */
  .lrow.done .ti{color:var(--status-idle);} .lrow.run .ti{color:var(--status-working);}
  .lrow .lbl{font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);color:var(--muted-foreground);} .lrow .lbl .path{font:var(--type-code-inline-weight) var(--type-code-inline)/var(--type-code-inline-leading) var(--mono);letter-spacing:var(--type-code-inline-tracking);color:var(--foreground-soft);}
  .lrow .grow{flex:1;} .lrow .rmeta{color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);font-variant-numeric:tabular-nums;}
  .lrow .tv{flex:none;font-variant-emoji:text;} .lrow .tv.pass{color:var(--green-500);} .lrow .tv.fail{color:var(--red-500);}
  .lrow .ok{color:var(--green-500);} .lrow .add{color:var(--foreground-faint);} .lrow .del{color:var(--foreground-faint);}
  .tierline{font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);color:var(--muted-foreground);margin:8px 2px 0;} .tierline b{color:var(--foreground);} .tierline .tk{font-weight:var(--type-tag-weight);}
  .tierline .tk.direct{color:var(--foreground);} .tierline .tk.derived{color:var(--foreground-soft);text-decoration:underline dotted;text-decoration-color:var(--foreground-faint);text-underline-offset:2px;} .tierline .tk.conv{color:var(--indigo-200);}

  /* Detail */
  /* Shared PaneHeader strip metrics — .atabs (Activity) and .dtabs (Detail) hold
     the SAME height so their bottom hairlines form one continuous line. The old
     mismatch: .atab carries a 1px border + 1px more padding than .dtab, making
     the left strip 2px taller. */
  .dtabs{display:flex;gap:2px;padding:6px 12px 8px;border-bottom:1px solid var(--border);align-items:center;min-height:41px;}
  .dtab{font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);color:var(--muted-foreground);padding:4px 10px;border-radius:var(--radius);cursor:pointer;} .dtab.on{color:var(--foreground);background:color-mix(in srgb,var(--gray-50) 6%,transparent);}
  .scopejump{margin-left:auto;font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);color:var(--primary);cursor:pointer;}
  .feed{font:var(--type-code-weight) var(--type-code)/var(--type-code-leading) var(--mono);letter-spacing:var(--type-code-tracking);color:var(--foreground-soft);white-space:pre-wrap;} .feed .p{color:var(--muted-foreground);} .feed .a{color:var(--green-300);} .feed .r{color:var(--red-300);} .feed .w{color:var(--amber-300);}
  .fdiff{margin:0 0 10px;}
  .fdhead{display:flex;align-items:center;gap:8px;padding:8px 11px;border-bottom:1px solid var(--inset-hair);font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);cursor:pointer;}
  .fkind{display:inline-flex;align-items:center;color:var(--muted-foreground);font-size:14px;flex:none;} /* icon box */
  .fpath{font:var(--type-code-inline-weight) var(--type-code-inline)/var(--type-code-inline-leading) var(--mono);letter-spacing:var(--type-code-inline-tracking);color:var(--foreground-soft);} .fdhead .grow{flex:1;} .fdhead .add{color:var(--foreground-faint);} .fdhead .del{color:var(--foreground-faint);}
  .viewed{display:inline-flex;align-items:center;gap:4px;color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);cursor:pointer;margin-left:6px;} .viewed input{accent-color:var(--primary);margin:0;}
  .fdiff.viewed-on{opacity:.62;} .fdiff.viewed-on .fpath{text-decoration:line-through;}
  .hunk{font:var(--type-code-weight) var(--type-code)/var(--type-code-leading) var(--mono);letter-spacing:var(--type-code-tracking);padding:9px 11px;white-space:pre-wrap;} .hunk .a{color:var(--green-300);} .hunk .r{color:var(--red-300);} .hunk .m{color:var(--foreground-faint);}
  .empty{color:var(--muted-foreground);font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);padding:8px 2px;}

  /* Commit / PR — a two-stage "ship this work" card. Stage 1 commits the
     uncommitted files (accent primary). Stage 2 creates the pull request
     (worktree branch → main) behind an explicit review+tests gate. Only one
     stage is active at once; each state fact is shown exactly ONCE. */
  .commitcta{background:color-mix(in srgb,var(--primary) 6%,transparent);border:1px solid color-mix(in srgb,var(--primary) 24%,transparent);border-radius:calc(var(--radius) + 4px);margin:0 0 13px;overflow:hidden;}
  .cstage{padding:11px 12px;}
  .commitcta .top{display:flex;align-items:center;gap:8px;font:var(--type-row-strong-weight) var(--type-row-strong)/var(--type-row-strong-leading) var(--sans);letter-spacing:var(--type-row-strong-tracking);} .commitcta .top .g{color:var(--muted-foreground);}
  .commitcta .branchmeta{color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);font-variant-numeric:tabular-nums;}
  .commitcta .msg{font:var(--type-code-weight) var(--type-code)/var(--type-code-leading) var(--mono);letter-spacing:var(--type-code-tracking);color:var(--foreground-soft);background:var(--well);border:1px solid var(--inset-hair);border-radius:var(--radius);padding:6px 9px;margin:9px 0 10px;display:flex;align-items:center;gap:9px;}
  .commitcta .msg .draft{color:var(--foreground-faint);font:var(--type-tag-weight) var(--type-tag)/var(--type-tag-leading) var(--sans);letter-spacing:var(--type-tag-tracking);text-transform:uppercase;flex:none;border:1px solid var(--border);border-radius:calc(var(--radius) - 4px);padding:1px 5px;}
  .commitcta .msg .g{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--gray-200);}
  .commitcta .msg .redraft{color:var(--primary);cursor:pointer;flex:none;}
  .commitcta .btn{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg, var(--indigo-400), var(--primary));color:var(--primary-foreground);border:1px solid color-mix(in srgb,var(--primary) 55%,transparent);border-radius:var(--radius);padding:7px 13px;font:var(--type-row-strong-weight) var(--type-row-strong)/var(--type-row-strong-leading) var(--sans);letter-spacing:var(--type-row-strong-tracking);cursor:pointer;}
  .commitcta .btn[disabled]{opacity:.45;cursor:not-allowed;}

  /* Stage 2 — PR creation behind its own labelled gate. The gate rows spell out
     each prerequisite's real state, so "why disabled" is self-evident (no hint text). */
  .mstage{border-top:1px solid var(--inset-hair);background:var(--well);padding:11px 12px;}
  .mstage-h{display:inline-flex;align-items:center;gap:6px;font:var(--type-tag-weight) var(--type-tag)/var(--type-tag-leading) var(--sans);letter-spacing:var(--type-tag-tracking);color:var(--muted-foreground);text-transform:uppercase;margin-bottom:9px;}
  .mstage-h .ic{font-size:13px;} /* icon box */
  .mstage-h .mono{font-family:var(--mono);text-transform:none;letter-spacing:0;color:var(--muted-foreground);font-weight:var(--type-meta-weight);}
  .mgrow{display:flex;align-items:center;gap:10px;font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);padding:2.5px 0;}
  .mgrow .mgk{color:var(--muted-foreground);width:50px;flex:none;}
  .mgrow .mgv{display:inline-flex;align-items:center;gap:5px;}
  .mgrow .mgv.ok{color:var(--green-500);} .mgrow .mgv.warn{color:var(--verdict-changes);} .mgrow .mgv.wait{color:var(--status-working);}
  .mstage-act{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:11px;}
  .mbtn{display:inline-flex;align-items:center;gap:6px;border-radius:var(--radius);padding:7px 13px;font:var(--type-row-strong-weight) var(--type-row-strong)/var(--type-row-strong-leading) var(--sans);letter-spacing:var(--type-row-strong-tracking);cursor:pointer;
    background:linear-gradient(135deg, var(--indigo-400), var(--primary));color:var(--primary-foreground);border:1px solid color-mix(in srgb,var(--primary) 55%,transparent);}
  .mbtn[disabled]{opacity:.4;cursor:not-allowed;background:transparent;color:var(--muted-foreground);border-color:var(--border);}
  .mbtn.confirm{background:linear-gradient(135deg, var(--indigo-400), var(--primary));} /* confirm brightness step collapsed onto indigo-400 (label carries the state) */
  .mhint{color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);} .chain{color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);}

  /* ── Inline review findings — a verdict-tinted comment card wedged under a
     file's hunk. Left border carries the severity's verdict colour. ── */
  .finding{margin:0;border-left:3px solid var(--verdict-block);background:color-mix(in srgb,var(--red-500) 6%,transparent);
    border-top:1px solid var(--inset-hair);padding:9px 12px 10px;}
  .finding.sev-advisory{border-left-color:var(--verdict-changes);background:color-mix(in srgb,var(--amber-500) 6%,transparent);}
  .finding.resolved{background:var(--inset);padding:6px 12px;}
  .finding .fhead{display:flex;align-items:center;gap:8px;font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);}
  .finding .sev{font-variant-emoji:text;flex:none;} .finding.sev-blocking .sev{color:var(--verdict-block);} .finding.sev-advisory .sev{color:var(--verdict-changes);}
  .finding .sevw{font:var(--type-tag-weight) var(--type-tag)/var(--type-tag-leading) var(--sans);letter-spacing:var(--type-tag-tracking);text-transform:uppercase;color:var(--muted-foreground);}
  .finding .floc{font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--mono);letter-spacing:var(--type-meta-tracking);color:var(--muted-foreground);}
  .finding .grow{flex:1;}
  .finding .fby{color:var(--foreground-faint);}
  .finding .fbody{font:var(--type-prose-weight) var(--type-prose)/var(--type-prose-leading) var(--sans);letter-spacing:var(--type-prose-tracking);color:var(--gray-200);margin:6px 0 0;}
  .finding.resolved .fbody{display:none;}
  .finding .fstub{display:none;color:var(--muted-foreground);font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);} .finding.resolved .fstub{display:inline;}
  .finding .resolve{flex:none;font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);color:var(--verdict-approve);border:1px solid color-mix(in srgb,var(--green-500) 40%,transparent);border-radius:calc(var(--radius) - 2px);padding:1px 8px;cursor:pointer;user-select:none;}
  .finding.resolved .resolve{color:var(--muted-foreground);border-color:var(--border);}
  .finding.walk-focus{box-shadow:0 0 0 1px color-mix(in srgb,var(--red-500) 40%,transparent);background:color-mix(in srgb,var(--red-500) 12%,transparent);}

  /* Findings flag on a file's diff header, next to Viewed */
  .flag{display:inline-flex;align-items:center;gap:3px;color:var(--verdict-block);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);font-variant-emoji:text;margin-left:2px;}

  /* Finding-walk navigator + Findings toggle in the Detail header */
  .fwalk{display:inline-flex;align-items:center;gap:2px;font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);color:var(--muted-foreground);font-variant-numeric:tabular-nums;}
  .fwalk .arw{cursor:pointer;padding:1px 5px;border-radius:calc(var(--radius) - 4px);color:var(--verdict-changes);user-select:none;} .fwalk .arw:hover{background:color-mix(in srgb,var(--gray-50) 4%,transparent);}
  .fwalk .cnt{padding:0 3px;}

  /* Artifacts — stacked collapsible cards, same visual family as file diffs
     (a title bar you expand/collapse), so any number of them stack cleanly. */
  .acard{background:var(--inset);border:1px solid var(--inset-hair);border-radius:calc(var(--radius) + 4px);box-shadow:0 1px 0 color-mix(in srgb,var(--gray-50) 4%,transparent) inset;margin:0 0 10px;overflow:hidden;}
  .achead{display:flex;align-items:center;gap:8px;padding:9px 11px;cursor:pointer;font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);}
  .achead .cv{color:var(--foreground-faint);font-size:10px;width:9px;flex:none;} /* icon box */
  .achead .ai{color:var(--muted-foreground);flex:none;font-variant-emoji:text;}
  .achead .apath{font:var(--type-code-inline-weight) var(--type-code-inline)/var(--type-code-inline-leading) var(--mono);letter-spacing:var(--type-code-inline-tracking);color:var(--foreground-soft);}
  .achead .grow{flex:1;} .achead .amiss{color:var(--amber-500);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);font-variant-emoji:text;}
  .acbody{padding:11px 13px;border-top:1px solid var(--inset-hair);}
  .acard.gone .apath{color:var(--foreground-faint);text-decoration:line-through;}

  .detbtns{display:flex;gap:8px;margin:12px 0 4px;}
  .detbtn{display:inline-flex;align-items:center;gap:6px;font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);color:var(--muted-foreground);border:1px solid var(--border);border-radius:var(--radius);padding:5px 11px;cursor:pointer;background:transparent;}
  .detbtn.primary{color:var(--gray-200);border-color:color-mix(in srgb,var(--primary) 55%,transparent);background:color-mix(in srgb,var(--primary) 12%,transparent);}
  .kv{display:flex;gap:8px;font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);color:var(--muted-foreground);margin:2px 0;} .kv .k{color:var(--foreground-faint);width:64px;flex:none;}

  .term{display:grid;grid-template-rows:auto 1fr;min-height:0;border-top:1px solid var(--input);}
  .term-h{display:flex;align-items:center;gap:8px;padding:7px 13px;background:color-mix(in srgb,var(--gray-950) 55%,transparent);color:var(--muted-foreground);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);} .term-h .grow{flex:1;} .term-h .x{cursor:pointer;color:var(--foreground-faint);}
  .term-body{background:var(--background);color:var(--foreground-soft);font:var(--type-code-weight) var(--type-code)/var(--type-code-leading) var(--mono);letter-spacing:var(--type-code-tracking);padding:10px 13px;overflow:auto;white-space:pre-wrap;outline:none;} .term-body .p{color:var(--status-working);} .term-body .dim{color:var(--foreground-faint);}
  .caret{display:inline-block;width:7px;height:14px;background:var(--foreground-soft);vertical-align:-2px;animation:blink 1.1s steps(1) infinite;} @keyframes blink{50%{opacity:0}}
  .hint{position:fixed;left:16px;bottom:12px;z-index:5;color:var(--muted-foreground);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);}
  [tabindex]:focus-visible{outline:2px solid var(--ring);outline-offset:1px;border-radius:calc(var(--radius) - 2px);}
  .term-body:focus-visible{outline:none;box-shadow:inset 0 0 0 1px var(--ring);}

  /* ══ v5 · Review lives as a TAB inside the Activity column (no takeover).
        Activity (left) + Detail (right) stay side by side; the review content
        renders in the narrow Activity scroll, the diff stays in Detail. ══ */

  /* Activity tab row — Overview | Review · <verdict> · <n> */
  .atabs{display:flex;gap:4px;padding:6px 12px 8px;border-bottom:1px solid var(--border);align-items:center;min-height:41px;} /* same strip height as .dtabs (shared PaneHeader) */
  .atab{font:var(--type-row-strong-weight) var(--type-row-strong)/var(--type-row-strong-leading) var(--sans);letter-spacing:var(--type-row-strong-tracking);color:var(--muted-foreground);padding:4px 11px;border-radius:var(--radius);cursor:pointer;border:1px solid transparent;user-select:none;}
  .atab:hover{color:var(--foreground);}
  .atab.on{color:var(--foreground);background:color-mix(in srgb,var(--gray-50) 6%,transparent);}
  .atab.review{color:var(--verdict-changes);}
  .atab.review.on{background:color-mix(in srgb,var(--amber-500) 12%,transparent);border-color:color-mix(in srgb,var(--amber-500) 40%,transparent);color:var(--verdict-changes);}
  /* glowing badge while a review is outstanding (any finding not Fixed) */
  .atab.review.glow{animation:tabglow 2.2s ease-in-out infinite;}
  @keyframes tabglow{0%,100%{box-shadow:0 0 0 0 transparent;}50%{box-shadow:0 0 12px 1px color-mix(in srgb,var(--red-500) 40%,transparent);}}
  @media (prefers-reduced-motion:reduce){.atab.review.glow{animation:none;box-shadow:0 0 9px 1px color-mix(in srgb,var(--red-500) 40%,transparent);}}
  .atab .tglow{width:6px;height:6px;border-radius:50%;background:var(--verdict-block);box-shadow:0 0 7px color-mix(in srgb,var(--red-500) 70%,transparent);display:inline-block;margin-right:6px;vertical-align:middle;}
  /* subtle in-diff finding marker — a thin tinted row that jumps to the Review tab */
  .fmarks{border-top:1px solid var(--inset-hair);}
  .fmark{display:flex;align-items:center;gap:8px;padding:5px 11px;cursor:pointer;font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);color:var(--muted-foreground);border-left:2px solid transparent;background:var(--inset);}
  .fmark:hover{background:color-mix(in srgb,var(--gray-50) 4%,transparent);color:var(--foreground);}
  .fmark .fm-bar{display:none;}
  .fmark.sev-block{border-left-color:color-mix(in srgb,var(--red-500) 55%,transparent);} .fmark.sev-changes{border-left-color:color-mix(in srgb,var(--amber-500) 55%,transparent);}
  .fmark .fm-lbl{font-variant-numeric:tabular-nums;} .fmark.sev-block .fm-lbl{color:var(--verdict-block);} .fmark.done{border-left-color:color-mix(in srgb,var(--green-500) 55%,transparent);} .fmark.done .fm-lbl{color:var(--muted-foreground);text-decoration:line-through;}
  .fmark .grow{flex:1;} .fmark .fm-go{color:var(--primary);opacity:0;} .fmark:hover .fm-go,.fmark:focus-visible .fm-go{opacity:1;}
  /* Review-tab row briefly highlighted when reached from a diff marker */
  .rvrow.rv-focus{box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--amber-500) 55%,transparent);background:color-mix(in srgb,var(--amber-500) 12%,transparent);}

  /* Compact verdict hero + narrow-column tweaks for the Review tab */
  .rv-hero.compact{padding:13px 14px;margin:2px 0 12px;}
  .rv-hero.compact .verdict{gap:11px;}
  .rv-hero.compact .vglyph{width:36px;height:36px;font-size:18px;} /* icon box */
  .rv-hero.compact .vhead{font:var(--type-title-weight) var(--type-title)/var(--type-title-leading) var(--sans);letter-spacing:var(--type-title-tracking);}
  .rv-hero.compact .vsum{margin-top:9px;max-width:none;}
  .rv-hero.compact .vattr{gap:9px;flex-wrap:wrap;margin-top:10px;}
  .rv-hero .vnote{color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);margin-top:8px;font-style:italic;}
  .rv-progress.compact{flex-wrap:wrap;gap:8px;}
  .rv-progress.compact .track{flex:1 1 90px;width:auto;}
  .rv-cta.compact .rv-btn{padding:8px 13px;}

  /* Verdict HERO — magenta accent because there are blocking findings; flips to
     a teal "addressed" band once every finding is marked Fixed (re-review still
     pending — the copy never claims the verdict was refreshed). */
  .rv-hero{position:relative;border-radius:calc(var(--radius) + 4px);padding:16px 18px;margin:2px 0 15px;
    border:1px solid color-mix(in srgb,var(--amber-500) 40%,transparent);
    background:linear-gradient(135deg,color-mix(in srgb,var(--amber-500) 12%,transparent),color-mix(in srgb,var(--amber-500) 6%,transparent) 62%,transparent);
    box-shadow:0 1px 0 color-mix(in srgb,var(--gray-50) 4%,transparent) inset,0 14px 34px var(--shadow-2);}
  .rv-hero.approve{border-color:color-mix(in srgb,var(--green-500) 40%,transparent);background:linear-gradient(135deg,color-mix(in srgb,var(--green-500) 12%,transparent),color-mix(in srgb,var(--green-500) 6%,transparent) 62%,transparent);}
  .rv-hero .verdict{display:flex;align-items:center;gap:12px;}
  .rv-hero .vglyph{width:42px;height:42px;border-radius:calc(var(--radius) + 4px);flex:none;display:grid;place-items:center;font-size:21px;font-variant-emoji:text; /* icon box */
    color:var(--verdict-changes);border:1px solid color-mix(in srgb,var(--amber-500) 55%,transparent);background:radial-gradient(circle at 50% 35%,color-mix(in srgb,var(--amber-500) 24%,transparent),transparent 70%);}
  .rv-hero .vglyph.ap{color:var(--verdict-approve);border-color:color-mix(in srgb,var(--green-500) 55%,transparent);background:radial-gradient(circle at 50% 35%,color-mix(in srgb,var(--green-500) 24%,transparent),transparent 70%);}
  .rv-hero .vhead{font:var(--type-headline-weight) var(--type-headline)/var(--type-headline-leading) var(--sans);letter-spacing:var(--type-headline-tracking);color:var(--foreground);}
  .rv-hero.approve .vhead{color:var(--foreground);}
  .rv-hero .vhead .vblock{color:var(--verdict-block);}
  .rv-hero .vsum{color:var(--gray-200);font:var(--type-prose-weight) var(--type-prose)/var(--type-prose-leading) var(--sans);letter-spacing:var(--type-prose-tracking);margin:11px 0 0;max-width:70ch;}
  .rv-hero .vsum b{color:var(--gray-50);}
  .rv-hero .vattr{display:flex;align-items:center;gap:12px;margin-top:12px;color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);}
  .rv-hero .vattr .sha{font-family:var(--mono);}
  .rv-hero .vattr .sha{color:var(--muted-foreground);}

  /* Primary CTA row */
  .rv-cta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 0 13px;}
  .rv-btn{display:inline-flex;align-items:center;gap:7px;border-radius:var(--radius);padding:9px 15px;font:var(--type-row-strong-weight) var(--type-row-strong)/var(--type-row-strong-leading) var(--sans);letter-spacing:var(--type-row-strong-tracking);cursor:pointer;border:1px solid transparent;transition:filter var(--time-fast),border-color var(--time-fast),background var(--time-fast);}
  .rv-btn.primary{background:linear-gradient(135deg, var(--indigo-400), var(--primary));color:var(--primary-foreground);border-color:color-mix(in srgb,var(--primary) 55%,transparent);box-shadow:0 6px 16px color-mix(in srgb,var(--primary) 24%,transparent);}
  .rv-btn.primary:hover{filter:brightness(1.09);}
  .rv-btn.ghost{color:var(--gray-200);border-color:var(--input);background:color-mix(in srgb,var(--gray-50) 4%,transparent);}
  .rv-btn.ghost:hover{border-color:var(--primary);}
  .rv-btn.merge{color:var(--primary-foreground);border-color:color-mix(in srgb,var(--primary) 55%,transparent);background:linear-gradient(135deg, var(--indigo-400), var(--primary));}
  .rv-btn.merge:hover{filter:brightness(1.09);} /* hover hand-mix collapsed; brightness carries the feedback */
  .rv-btn[disabled]{opacity:.4;cursor:not-allowed;filter:none;box-shadow:none;}

  .rv-progress{display:flex;align-items:center;gap:11px;font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);color:var(--muted-foreground);margin:0 0 14px;font-variant-numeric:tabular-nums;}
  .rv-progress .track{flex:none;width:200px;height:5px;border-radius:calc(var(--radius) - 4px);background:color-mix(in srgb,var(--gray-50) 9%,transparent);overflow:hidden;}
  .rv-progress .track>span{display:block;height:100%;background:linear-gradient(90deg,var(--verdict-changes),var(--verdict-approve));transition:width var(--time-slow);}
  .rv-progress.done{color:var(--verdict-approve);}

  /* Addressable findings LIST — each row is a real actionable card */
  .rv-list{display:flex;flex-direction:column;gap:9px;}
  .rvrow{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:calc(var(--radius) + 4px);
    border:1px solid var(--inset-hair);background:var(--inset);box-shadow:0 1px 0 color-mix(in srgb,var(--gray-50) 4%,transparent) inset;border-left:3px solid var(--verdict-block);}
  .rvrow.sev-advisory{border-left-color:var(--verdict-changes);}
  .rvrow.fixed{border-left-color:var(--verdict-approve);opacity:.74;}
  .rvrow .rsev{font-size:14px;flex:none;margin-top:1px;font-variant-emoji:text;color:var(--verdict-block);} /* icon box */
  .rvrow.sev-advisory .rsev{color:var(--verdict-changes);}
  .rvrow.fixed .rsev{color:var(--verdict-approve);}
  .rvrow{flex-wrap:wrap;}
  .rvrow .rmid{flex:1 1 62%;min-width:0;}
  .rvrow .rloc{font:var(--type-code-inline-weight) var(--type-code-inline)/var(--type-code-inline-leading) var(--mono);letter-spacing:var(--type-code-inline-tracking);color:var(--muted-foreground);}
  .rvrow .diffjump{color:var(--primary);cursor:pointer;margin-left:9px;font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);}
  .rvrow .diffjump:hover{text-decoration:underline;}
  .rvrow .rbody{color:var(--gray-200);font:var(--type-prose-weight) var(--type-prose)/var(--type-prose-leading) var(--sans);letter-spacing:var(--type-prose-tracking);margin:5px 0 0;}
  .rvrow.fixed .rbody{color:var(--muted-foreground);}
  .rvrow .rby{color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);margin-top:6px;}
  .rvrow .ractions{display:flex;flex-direction:row;align-items:center;gap:8px;flex:none;margin-left:auto;flex-wrap:wrap;justify-content:flex-end;}

  /* State chip (status, not a control) — Open · Addressing · Fixed */
  .schip{display:inline-flex;align-items:center;gap:5px;font:var(--type-tag-weight) var(--type-tag)/var(--type-tag-leading) var(--sans);letter-spacing:var(--type-tag-tracking);text-transform:uppercase;padding:2px 9px;border-radius:999px;border:1px solid transparent;white-space:nowrap;font-variant-emoji:text;} /* pill — outside the 4/6/8/12 radius family (follow-up) */
  .schip.open{color:var(--verdict-block);border-color:color-mix(in srgb,var(--red-500) 40%,transparent);background:color-mix(in srgb,var(--red-500) 12%,transparent);}
  .schip.addressing{color:var(--verdict-changes);border-color:color-mix(in srgb,var(--amber-500) 40%,transparent);background:color-mix(in srgb,var(--amber-500) 12%,transparent);}
  .schip.fixed{color:var(--verdict-approve);border-color:color-mix(in srgb,var(--green-500) 40%,transparent);background:color-mix(in srgb,var(--green-500) 12%,transparent);}

  /* Address button (the real control) — reused inline in the Diff tab too */
  .abtn{display:inline-flex;align-items:center;gap:6px;font:var(--type-row-strong-weight) var(--type-row-strong)/var(--type-row-strong-leading) var(--sans);letter-spacing:var(--type-row-strong-tracking);cursor:pointer;border-radius:var(--radius);padding:6px 12px;
    color:var(--amber-100);border:1px solid color-mix(in srgb,var(--amber-500) 55%,transparent);background:color-mix(in srgb,var(--amber-500) 12%,transparent);transition:background var(--time-fast),border-color var(--time-fast);}
  .abtn:hover{background:color-mix(in srgb,var(--amber-500) 24%,transparent);border-color:var(--amber-500);}
  .abtn.confirm{color:var(--green-100);border-color:color-mix(in srgb,var(--green-500) 55%,transparent);background:color-mix(in srgb,var(--green-500) 12%,transparent);}
  .abtn.confirm:hover{background:color-mix(in srgb,var(--green-500) 24%,transparent);border-color:var(--green-500);}
  .abtn.reopen{color:var(--muted-foreground);border-color:var(--border);background:transparent;}
  .abtn.reopen:hover{color:var(--foreground);border-color:var(--input);background:color-mix(in srgb,var(--gray-50) 4%,transparent);}
  .abtn.sm{padding:4px 10px;}
  .abtn:focus-visible,.rv-btn:focus-visible,.rv-back:focus-visible{outline:2px solid var(--ring);outline-offset:1px;}
</style>
</head>

/* Checks — branch-level, keyed to the latest commit. */
/* changes/approve stay geometric (verdict legend ◆●); `none` stays a dot; warn is
   a lint/checks warning (icon), not the blocking verdict ▲. */
const CK_GLYPH={pass:ic('check'),fail:ic('x'),warn:ic('warning'),run:ic('circle-notch'),none:'·',changes:'◆',approve:'●',partial:ic('circle-half')};
function chkRow(key,label,c){
  const g=key==='review'?ic('binoculars'):(CK_GLYPH[c.state]||'·'); /* review has ONE identity icon everywhere; verdict shown by colour+word */
  const valcls=c.state==='fail'?'fail':c.state==='warn'?'warn':'';
  /* v5: the Review row switches the Activity column to the Review tab (no
     takeover) and keeps the whole-change-set diff visible in Detail. */
  const act=key==='review'?'openReview()':`pick('checks:${key}')`;

  return `<div class="chkrow ${isSel?'sel':''}" onclick="${act}">
    <span class="ck ${c.state}">${g}</span><span class="cklbl">${label}</span>
    <span class="ckval ${c.derived?'derived':valcls}" ${c.derived?'title="parsed from captured tool output"':''}>${c.label}</span>
    ${c.by?`<span class="branchmeta">· ${c.by}</span>`:''}

}
function checksHtml(){

}

/* diff-stat / artifact roll-up rendered NEUTRAL — colour is lifecycle only */
function orollHtml(o){
  const fs=(o.files||[]).map(p=>FILES.find(f=>f.p===p)).filter(Boolean);
  const na=(o.artifacts||[]).length;
  const parts=[];
  if(fs.length) parts.push(`${fs.length} file${fs.length>1?'s':''} <span class="pm">+${fs.reduce((s,f)=>s+f.a,0)} −${fs.reduce((s,f)=>s+f.d,0)}</span>`);
  if(na) parts.push(`${na} artifact${na>1?'s':''}`);
  if(!parts.length) return o.life==='queued'?`<span class="oroll">queued</span>`:'';
  return `<span class="oroll">${parts.join(' · ')}</span>`;
}
const OSTATE={run:'Running',done:'Done',queued:'Queued',fail:'Failed',interrupted:'Interrupted','needs-input':'Needs input'};
function outcomeRow(o){
  const t=OTYPE[o.type]||OTYPE.untyped;
  /* lean: verdict lives once on the Checks Review row; drop the provenance pedigree.
     v5: a review outcome switches the Activity column to the Review tab. */
  const isRev=o.type==='review';
  const act=isRev?'openReview()':`pick('outcome:${o.id}')`;
  const isSel=isRev?(activeTab==='review'):(sel==='outcome:'+o.id);
  return `<div class="orow ${isSel?'sel':''}" onclick="${act}">
    <span class="otype" title="${t.w}">${t.g}</span>
    <span class="otw">${t.w}</span><span class="otitle">${o.title}</span>
    <span class="grow"></span>${orollHtml(o)}
    <span class="ostate"><span class="sword">${OSTATE[o.life]||''}</span><span class="dot ${agLifeDot(o)}" title="${OSTATE[o.life]||''}" aria-label="${OSTATE[o.life]||''}"></span></span></div>`;
}
const orank=o=>['run','fail','interrupted','needs-input','stopped'].includes(o.life)?0:o.life==='queued'?2:1;
function trigRow(k,label,meta){
  return `<div class="sumpeer ${sel===k?'sel':''}" onclick="pick('${k}')"><span>${label}</span><span class="grow"></span><span class="meta">${meta}</span><span class="go">${ic('caret-right')}</span></div>`;
}
function summaryHtml(){
  const olist=OUTCOMES.map((o,i)=>({o,i})).sort((a,b)=>orank(a.o)-orank(b.o)||a.i-b.i).map(x=>x.o);
  return `<div class="inset">${olist.map(outcomeRow).join('')}</div>`;
}
/* lean: the timeline section is ALWAYS present and NOT collapsible (no section
   chevron); each STEP starts collapsed — Outcomes is the spine, a step's tool
   rows are opt-in. The collapsed row still carries its status chip + dot; the
   now-line elsewhere shows the live activity. */
function narrHtml(){
  const n=MSGS.length;
  return `<div class="sumpeer static" style="margin-top:4px"><span>Timeline</span><span class="grow"></span><span class="meta">${n} steps</span></div>
    <div class="inset pad0" style="padding:8px 6px">${MSGS.map(msgHtml).join('')}</div>`;
}

function toolRow(t){
  const cls=t.running?'run':'done';
  let rm='';
  if(t.running) rm=`<span class="rmeta ${t.dv?'derived':''}" ${t.dv?'title="estimated from timestamps — not reported by the tool"':'style="color:var(--status-working)"'}>${t.dv?'~':''}${t.rmeta||'…'}</span>`;
  else if(t.kind==='test'){ /* pass/fail glyph is exit-driven (DIRECT); the count is parsed (DERIVED) */
    const ok=t.exit===0;
    rm=`<span class="tv ${ok?'pass':'fail'}" title="from exit code">${ok?ic('check'):ic('x')}</span> <span class="rmeta derived" title="parsed from captured tool output">${t.pass||(ok?'passed':'')}${t.fail?` · ${t.fail}`:''}</span>`;
  }
  else if(t.noCapture) rm=`<span class="rmeta derived gone" title="tool ran; output not captured">no output</span>`;
  else if(t.add!=null) rm=`<span class="rmeta derived" title="line counts from a file snapshot around the edit"><span class="add">+${t.add}</span> <span class="del">−${t.del}</span></span>`;
  else if(t.rmeta) rm=`<span class="rmeta ${t.dv?'derived':''}" ${t.dv?'title="parsed from captured tool output"':''}>${t.rmeta}</span>`;
  return `<div class="lrow ${cls} ${sel===t.id?'sel':''}" onclick="pick('${t.id}')">
    <span class="ti">${t.ti}</span><span class="lbl">${t.lbl}</span><span class="grow"></span>${rm}</div>`;
}
function msgHtml(m){
