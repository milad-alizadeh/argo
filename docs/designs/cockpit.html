<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Argo · cockpit — ship-ribbon lifecycle</title>
<link rel="stylesheet" href="tokens.css" />
<style>
  /* COCKPIT — settled from the ship-ribbon experiment — the ribbon (Commits → PR → CI → Review →
     Merge) is the work pane's header and the ONE home of ship-flow state.
     Rules R1–R15 + state table + pane anatomy: cockpit-matrix.md. */
  :root{
    color-scheme:dark;
    /* --status-landed (Merged ≠ CI-green) was promoted into argo-tokens.css at
       settle time — it arrives via tokens.css like every other role. */
  }
  *{box-sizing:border-box;}
  .ic{width:1em;height:1em;display:inline-block;vertical-align:-0.14em;flex:none;fill:currentColor;}
  .ic.sm{width:.86em;height:.86em;}
  html,body{margin:0;height:100%;}
  body{overflow:hidden;} /* colour/type/background come from the tokens.css body rule */
  #sky{position:fixed;inset:0;z-index:0;overflow:hidden;}
  #sky .halo{position:absolute;left:50%;bottom:-38%;transform:translateX(-50%);width:150vw;height:110vh;border-radius:50%;
    background:radial-gradient(closest-side,color-mix(in srgb,var(--primary) 24%,transparent),color-mix(in srgb,var(--primary) 6%,transparent) 55%,transparent 72%);filter:blur(20px);}
  #sky .halo.warm{width:70vw;height:50vh;bottom:-14%;opacity:.5;background:radial-gradient(closest-side,color-mix(in srgb,var(--status-awaiting-input) 12%,transparent),transparent 70%);}
  #sky canvas{position:absolute;inset:0;width:100%;height:100%;}

  .app{position:relative;z-index:1;height:100vh;display:grid;grid-template-columns:var(--c-rail,248px) 6px 1fr;padding:12px;}
  .panel{position:relative;min-width:0;min-height:0;background:var(--panel);
    -webkit-backdrop-filter:blur(22px) saturate(1.2);backdrop-filter:blur(22px) saturate(1.2);
    border:1px solid var(--border);border-radius:calc(var(--radius) + 4px);box-shadow:0 1px 0 var(--border) inset,0 18px 40px var(--shadow-3);
    display:flex;flex-direction:column;overflow:hidden;}
  .vsplit,.hsplit{position:relative;z-index:3;}
  .vsplit{cursor:col-resize;} .hsplit{cursor:row-resize;height:6px;}
  .vsplit::after{content:"";position:absolute;inset:0;margin:auto;width:2px;height:34px;border-radius:calc(var(--radius) - 4px);background:var(--border);transition:background var(--time-fast);}
  .hsplit::after{content:"";position:absolute;inset:0;margin:auto;height:2px;width:34px;border-radius:calc(var(--radius) - 4px);background:var(--border);transition:background var(--time-fast);}
  .vsplit:hover::after,.hsplit:hover::after,.dragging::after{background:var(--primary);}

  /* An estimated value (parsed stdout, snapshot diff, token sum) reads as plain text —
     its provenance lives in the title, never in decoration. Only a value the tool never
     reported dims, which is what `.unreported` says. */
  .unreported{color:var(--foreground-faint);}

  /* ── THE one animation budget: at most one .pulse1 element per render, bound
     to the ribbon's blocked/gate node — or, when the ribbon is quiet, to the
     top needs-you rail row's dot. Everything else renders static. ── */
  @media (prefers-reduced-motion:no-preference){.pulse1{animation:pulse1 var(--time-pulse) ease-in-out infinite;}}
  @keyframes pulse1{0%,100%{opacity:1;}50%{opacity:.45;}}

  /* Rail — cross-session triage: per-row status word, doing-now, workspace
     echo, Context, model·tokens·duration. Per-row repetition is the rail's job;
     it is also the SOLE home of the Context/model/tokens/duration tuple. */
  .rail-h{display:flex;align-items:center;gap:var(--space-gap);padding:13px 14px 9px;color:var(--muted-foreground);font:var(--type-eyebrow-weight) var(--type-eyebrow)/var(--type-eyebrow-leading) var(--sans);letter-spacing:var(--type-eyebrow-tracking);text-transform:uppercase;}
  .rail-h .plus,.proj .plus{margin-left:auto;width:18px;height:18px;border-radius:calc(var(--radius) - 2px);display:grid;place-items:center;color:var(--muted-foreground);border:1px solid var(--border);cursor:pointer;flex:none;}
  .proj{display:flex;align-items:center;gap:7px;padding:5px 14px;color:var(--foreground);font:var(--type-row-strong-weight) var(--type-row-strong)/var(--type-row-strong-leading) var(--sans);letter-spacing:var(--type-row-strong-tracking);cursor:pointer;user-select:none;}
  .rail-scroll{flex:1;overflow:auto;padding:2px 10px 8px;}
  .srow{display:block;background:var(--inset);border:1px solid var(--inset-hair);border-radius:calc(var(--radius) + 4px);padding:9px 11px;margin:6px 0;cursor:pointer;transition:border-color var(--time-fast),background var(--time-fast);}
  .srow:hover{background:color-mix(in srgb,var(--foreground) 4%,transparent);}
  .srow.sel{border-color:color-mix(in srgb,var(--primary) 55%,transparent);background:linear-gradient(135deg, color-mix(in srgb, var(--primary) 24%, transparent), color-mix(in srgb, var(--primary) 6%, transparent));box-shadow:0 0 0 1px color-mix(in srgb,var(--primary) 24%,transparent);}
  .srow .t{display:flex;align-items:center;gap:var(--space-snug);font:var(--type-row-strong-weight) var(--type-row-strong)/var(--type-row-strong-leading) var(--sans);letter-spacing:var(--type-row-strong-tracking);} .srow .t .grow{flex:1;}
  .srow .sic{flex:none;display:inline-flex;font-size:14px;} /* icon box — container-sized, outside the type ramp */
  .srow .sic.run{color:var(--status-working);} .srow .sic.amber{color:var(--status-awaiting-input);} .srow .sic.mist{color:var(--status-idle);} .srow .sic.red{color:var(--status-failed);} .srow .sic.gray{color:var(--status-idle);} .srow .sic.stale{color:var(--status-exited);}
  .srow .sic.landed{color:var(--status-landed);}
  .srow .ttl{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .srow .t .stw{display:inline-flex;align-items:center;gap:5px;color:var(--muted-foreground);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);flex:none;font-variant-numeric:tabular-nums;}
  .srow .t .stw.amber{color:var(--status-awaiting-input);} .srow .t .stw.red{color:var(--status-failed);}
  .srow .t .stw.landed{color:var(--status-landed);} .srow .t .stw.stale{color:var(--status-exited);}
  .srow .slot{color:var(--muted-foreground);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);margin:6px 0 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .srow .meta{color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);font-variant-numeric:tabular-nums;margin:4px 0 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .srow .slot::first-letter,.srow .meta::first-letter{text-transform:uppercase;}
  /* Workspace echo — compact branch + tree pointer under the doing-now slot.
     The FULL workspace fact (dir, dirty, ahead/behind) lives once, in the
     session header's WorkspaceIdentity chip. */
  .srow .wsline{display:flex;align-items:center;gap:5px;color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);margin:4px 0 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .srow .wsline .b{font:var(--type-code-inline-weight) var(--type-code-inline)/var(--type-code-inline-leading) var(--mono);letter-spacing:var(--type-code-inline-tracking);}
  .srow .wsline.shared{color:var(--status-awaiting-input);}
  /* Context gauge — ONE shape for "context remaining" (rail only in this
     variation; the session header no longer repeats it). */
  .ctxrow{display:flex;align-items:center;gap:7px;}
  .srow .ctxrow{margin:4px 0 0;}
  .ctxlbl{color:var(--foreground-faint);font:var(--type-tag-weight) var(--type-tag)/var(--type-tag-leading) var(--sans);letter-spacing:var(--type-tag-tracking);text-transform:uppercase;flex:none;}
  .srow .ctxrow .ctxbar{flex:1;width:auto;}
  .ctxpct{color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);font-variant-numeric:tabular-nums;flex:none;}
  .ctxbar{display:inline-block;width:48px;height:var(--space-tight);border-radius:calc(var(--radius) - 4px);background:var(--border);vertical-align:middle;}
  .ctxbar>span{display:block;height:100%;border-radius:inherit;color:var(--primary-bright);background:linear-gradient(90deg,var(--primary),var(--primary-bright));}
  /* Status dots — a lit signal, not a printed bullet. Fill and glow both read
     currentColor, so a tone class sets one property. */
  .dot{width:var(--space-gap);height:var(--space-gap);border-radius:50%;display:inline-block;flex:none;background:currentColor;}
  .dot.run{color:var(--status-working);}
  .dot.amber{color:var(--status-awaiting-input);}
  .dot.mist{color:var(--status-idle);}
  .dot.gray{color:var(--status-idle);}
  .dot.red{color:var(--status-failed);}
  .dot.stale{color:var(--status-exited);}
  .dot.landed{color:var(--status-landed);}
  .dock{margin-top:auto;display:flex;align-items:center;gap:9px;padding:11px 14px;border-top:1px solid var(--border);cursor:pointer;}
  .dock canvas{width:26px;height:26px;border-radius:50%;} .dock .lbl{font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);}
  .dock .state{margin-left:auto;color:var(--foreground-faint);font:var(--type-tag-weight) var(--type-tag)/var(--type-tag-leading) var(--sans);letter-spacing:var(--type-tag-tracking);text-transform:uppercase;}

  /* Session card */
  .session{display:grid;grid-template-rows:auto var(--r-work,1fr) 6px var(--r-term,170px);min-height:0;}
  .shead{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .crumb{display:flex;align-items:center;gap:7px;font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);color:var(--muted-foreground);} .crumb b{color:var(--foreground);font-weight:var(--type-row-strong-weight);} .crumb .sep{color:var(--foreground-faint);}
  /* WorkspaceIdentity — the ONE home of "where is this session working":
     branch (typed exactly once on screen), worktree-vs-main-tree + dir, dirty
     count, ahead/behind vs main. PR surfaces show only "→ main". */
  .wschip{display:inline-flex;align-items:center;gap:var(--space-gap);padding:3px 10px;background:var(--inset);border:1px solid var(--inset-hair);border-radius:var(--radius);color:var(--muted-foreground);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);font-variant-numeric:tabular-nums;}
  .wschip .branch{font:var(--type-code-inline-weight) var(--type-code-inline)/var(--type-code-inline-leading) var(--mono);letter-spacing:var(--type-code-inline-tracking);color:var(--foreground-soft);}
  /* Badge — ONE atom for the mini uppercase bordered label (worktree marker,
     "uncommitted" flag, declared intent, draft). Three tones; the `tag` role
     supplies the uppercase, so the label is authored lower-case. */
  .badge{display:inline-flex;align-items:center;flex:none;border:1px solid var(--border);border-radius:calc(var(--radius) - 4px);padding:0 5px;color:var(--foreground-faint);font:var(--type-tag-weight) var(--type-tag)/var(--type-tag-leading) var(--sans);letter-spacing:var(--type-tag-tracking);text-transform:uppercase;}
  .badge.warn{color:var(--status-awaiting-input);border-color:color-mix(in srgb,var(--status-awaiting-input) 40%,transparent);}
  .badge.primary{color:var(--primary-soft);border-color:color-mix(in srgb,var(--primary) 40%,transparent);background:color-mix(in srgb,var(--primary) 12%,transparent);}
  .wschip .badge .mono{text-transform:none;}
  .wschip .dirty{color:var(--status-awaiting-input);display:inline-flex;align-items:center;gap:var(--space-tight);}
  .wschip .dirty .dot{width:var(--space-snug);height:var(--space-snug);}
  .wschip .sync{color:var(--foreground-faint);}
  .wschip .shared{color:var(--status-awaiting-input);display:inline-flex;align-items:center;gap:var(--space-tight);}
  .toggles{margin-left:auto;display:flex;gap:5px;}
  .tg{font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);color:var(--muted-foreground);border:1px solid var(--border);border-radius:var(--radius);padding:3px 9px;cursor:pointer;display:inline-flex;gap:5px;align-items:center;user-select:none;}
  .tg.on{color:var(--foreground);border-color:color-mix(in srgb,var(--primary) 55%,transparent);background:var(--accent);}

  .work{display:grid;grid-template-columns:var(--c-act,1fr) 6px 1fr;min-height:0;overflow:hidden;}
  .work.solo{grid-template-columns:1fr 0 0;}
  .region{display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden;}
  .region.detail{border-left:1px solid var(--border);}
  /* no pane title rows — the tab strip / ribbon strip IS the pane header;
     region names live in aria-label only */
  .rscroll{flex:1;overflow:auto;padding:12px 13px 16px;min-height:0;}
  .inset{background:var(--inset);border:1px solid var(--inset-hair);border-radius:calc(var(--radius) + 4px);box-shadow:0 1px 0 color-mix(in srgb,var(--foreground) 4%,transparent) inset;padding:12px 13px;margin:0 0 12px;}
  .inset.pad0{padding:0;overflow:hidden;}
  .sect-h{display:flex;align-items:center;gap:var(--space-gap);color:var(--muted-foreground);font:var(--type-eyebrow-weight) var(--type-eyebrow)/var(--type-eyebrow-leading) var(--sans);letter-spacing:var(--type-eyebrow-tracking);text-transform:uppercase;margin:2px 2px 8px;}
  .sect-h .n{color:var(--foreground-faint);letter-spacing:0;text-transform:none;}

  /* Now-line — quiet pass: a one-line strip. No gradient verb tile, no pulse
     ring; "live" is a static word + dot. */
  .inset.nowstrip{padding:8px 11px;}
  .now{display:flex;align-items:center;gap:9px;min-width:0;}
  .now .nicon{color:var(--muted-foreground);display:inline-flex;font-size:14px;flex:none;} /* icon box */
  .now .line{font:var(--type-row-strong-weight) var(--type-row-strong)/var(--type-row-strong-leading) var(--sans);letter-spacing:var(--type-row-strong-tracking);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .now .line .mono{font:var(--type-code-inline-weight) var(--type-code-inline)/var(--type-code-inline-leading) var(--mono);letter-spacing:var(--type-code-inline-tracking);color:var(--primary-soft);}
  .now .grow{flex:1;}
  .now .live{color:var(--status-working);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);display:inline-flex;align-items:center;gap:5px;flex:none;}

  /* Checks — LOCAL only (Argo ran these in this working tree, keyed to the
     SHA). Remote CI is a different fact with a different origin — it lives on
     the ribbon's CI node. The agent review's pointer is the Review tab badge. */
  .checks{display:flex;flex-direction:column;gap:1px;}
  .chkrow{display:flex;align-items:center;gap:9px;padding:5px 8px;border-radius:var(--radius);font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);cursor:pointer;}
  .chkrow:hover{background:color-mix(in srgb,var(--foreground) 4%,transparent);}
  .chkrow.sel{background:var(--accent);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--primary) 40%,transparent);}
  .chkrow .ck{width:15px;text-align:center;flex:none;font-variant-emoji:text;}
  .chkrow .cklbl{color:var(--muted-foreground);width:82px;flex:none;}
  .chkrow .ckval{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .chkrow .grow{flex:1;} .chkrow .rerun{color:var(--primary);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);flex:none;opacity:0;} .chkrow:hover .rerun,.chkrow:focus-visible .rerun{opacity:1;}
  /* check pass/warn/fail have no semantic family yet — core ramp steps (follow-up) */
  .ck.pass{color:var(--status-done);} .ck.fail{color:var(--status-failed);} .ck.warn{color:var(--status-awaiting-input);} .ck.none{color:var(--foreground-faint);}
  .ck.run{color:var(--status-working);} .ck.queued{color:var(--foreground-faint);}
  .ckval.fail{color:var(--signal-bad);} .ckval.warn{color:var(--signal-warn);}
  .branchmeta{color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);font-variant-numeric:tabular-nums;}

  .wsrow{display:flex;align-items:center;gap:9px;padding:5px 8px;border-radius:var(--radius);cursor:pointer;font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);}
  .wsrow:hover{background:color-mix(in srgb,var(--foreground) 4%,transparent);}
  .doc{font:var(--type-prose-weight) var(--type-prose)/var(--type-prose-leading) var(--sans);letter-spacing:var(--type-prose-tracking);color:var(--foreground-soft);} .doc b{color:var(--foreground);} .doc code{font:var(--type-code-inline-weight) var(--type-code-inline)/var(--type-code-inline-leading) var(--mono);letter-spacing:var(--type-code-inline-tracking);color:var(--foreground-soft);background:color-mix(in srgb,var(--foreground) 6%,transparent);padding:1px 4px;border-radius:calc(var(--radius) - 4px);}

  /* ── Outcomes — the "what got done" spine ── */
  .orow{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:var(--radius);cursor:pointer;font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);}
  .orow:hover{background:color-mix(in srgb,var(--foreground) 4%,transparent);}
  .orow.sel{background:var(--accent);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--primary) 40%,transparent);}
  .orow .otype{width:15px;text-align:center;color:var(--muted-foreground);flex:none;font-size:13px;font-variant-emoji:text;} /* icon box */
  .orow .otw{color:var(--muted-foreground);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);width:88px;flex:none;}
  .orow .otitle{color:var(--foreground);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .orow .grow{flex:1;}
  .orow .oroll{color:var(--muted-foreground);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);font-variant-numeric:tabular-nums;flex:none;} .orow .oroll .pm{color:var(--foreground-faint);}
  .orow .ostate{display:inline-flex;align-items:center;gap:var(--space-snug);justify-content:flex-end;min-width:82px;flex:none;} .orow .ostate .sword{color:var(--muted-foreground);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);}
  .sumpeer{display:flex;align-items:center;gap:var(--space-gap);padding:7px 8px;border-radius:var(--radius);cursor:pointer;color:var(--muted-foreground);font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);}
  .sumpeer:hover{background:color-mix(in srgb,var(--foreground) 4%,transparent);} .sumpeer .grow{flex:1;} .sumpeer .meta{color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);font-variant-numeric:tabular-nums;}
  .sumpeer.static{cursor:default;} .sumpeer.static:hover{background:transparent;}

  /* Narrative */
  .msg{border-left:2px solid var(--inset-hair);padding:2px 0 2px 11px;margin:0 2px 3px;}
  .msg.run{border-left-color:var(--status-working);} .msg.done{border-left-color:color-mix(in srgb,var(--muted-foreground) 40%,transparent);}
  .msg-head{display:flex;align-items:flex-start;gap:var(--space-gap);padding:5px 4px;cursor:pointer;}
  .msg-head .cv{color:var(--foreground-faint);font-size:10px;width:10px;flex:none;margin-top:3px;} /* icon box */
  /* one-line rows TRUNCATE, never wrap — the title attr carries the full text */
  .msg-head .say{font:var(--type-prose-weight) var(--type-prose)/var(--type-prose-leading) var(--sans);letter-spacing:var(--type-prose-tracking);color:var(--foreground);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .msg-head .badge{margin-top:1px;}
  .msg-head .sd{flex:none;margin-top:5px;}
  .msg-head .mtime{color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);font-variant-numeric:tabular-nums;flex:none;margin-top:2px;}
  .msg-tools{margin:2px 0 6px 18px;}
  .lrow{display:flex;align-items:center;gap:9px;padding:4px 8px;border-radius:var(--radius);cursor:pointer;}
  .lrow:hover{background:color-mix(in srgb,var(--foreground) 4%,transparent);}
  .lrow.sel{background:var(--accent);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--primary) 40%,transparent);}
  .lrow .ti{width:16px;text-align:center;color:var(--muted-foreground);font-size:12px;flex:none;font-variant-emoji:text;} /* icon box */
  .lrow.done .ti{color:var(--status-idle);} .lrow.run .ti{color:var(--status-working);}
  .lrow .lbl{font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);color:var(--muted-foreground);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;} .lrow .lbl .path{font:var(--type-code-inline-weight) var(--type-code-inline)/var(--type-code-inline-leading) var(--mono);letter-spacing:var(--type-code-inline-tracking);color:var(--foreground-soft);}
  .lrow .grow{flex:1;} .lrow .rmeta{color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);font-variant-numeric:tabular-nums;}
  .lrow .tv{flex:none;font-variant-emoji:text;} .lrow .tv.pass{color:var(--status-done);} .lrow .tv.fail{color:var(--status-failed);}
  .lrow .ok{color:var(--status-done);} .lrow .add{color:var(--foreground-faint);} .lrow .del{color:var(--foreground-faint);}
  /* AgentRow / RunRow — the story pane's Actor roster (R15): an Agent is a
     PROCESS, not a tool call — quiet primary-tinted rule + sparkle tile, name
     strong, status WORD carries the state (never colour alone). A Run (batch |
     pipeline) groups member AgentRows under a phase-progress line. Static —
     R10's budget stays on the ribbon. */
  /* Quiet rows — same anatomy as every other lrow (no tinted pill, no border):
     the sparkle tile is the agent identity; lowercase status WORD renders only
     where it adds information (running/failed always; done only on lone rows —
     a run's rollup covers its members). */
  .lrow.agent .ti{color:var(--primary-soft);}
  .lrow.agent .cv{color:var(--foreground-faint);font-size:10px;width:10px;flex:none;} /* icon box */
  /* Three text roles across the whole roster: name (foreground strong) ·
     descriptor (muted: goal, shape word, phase name) · trailing meta (faint:
     state word + duration + counts, one unit per row). At most ONE state hue
     per row, always sitting on a word (aword / pstat / active phasew frag). */
  .lrow.agent .aname{color:var(--foreground);font-weight:var(--type-row-strong-weight);}
  .lrow.agent .agoal{color:var(--muted-foreground);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lrow.agent .shapew{color:var(--muted-foreground);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);flex:none;}
  /* single right-edge unit — "state duration" reads as one faint meta column */
  .lrow.agent .ameta{display:inline-flex;align-items:baseline;gap:var(--space-tight);color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);font-variant-numeric:tabular-nums;flex:none;}
  .lrow.agent .aword.running{color:var(--status-working);} .lrow.agent .aword.failed{color:var(--status-failed);}
  /* collapsed run progress — inline after the shape word; only the ACTIVE phase
     fragment carries a hue, past/future stay in the meta role */
  .lrow.agent .phasew{color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);font-variant-numeric:tabular-nums;flex:none;font-variant-emoji:text;}
  .phasew .pn{color:var(--status-working);}
  .runkids{margin:1px 0 3px 24px;padding-left:6px;border-left:1px solid var(--inset-hair);}
  /* PhaseGroup — a Phase is a grouping, not an Actor. Its left rail IS the
     state (timeline-spine idiom): running = working tint, done = idle, queued =
     faint. Header is the eyebrow name alone; members indent under it. */
  .runkids.phased{border-left:none;padding-left:0;}
  .phgroup{border-left:2px solid transparent;padding-left:9px;margin:2px 0 4px;}
  .phgroup.st-done{border-left-color:color-mix(in srgb,var(--status-done) 55%,transparent);} /* done = pass semantics (same family as check-pass / Actions-green) — distinct from queued's faint gray */
  .phgroup.st-run{border-left-color:var(--status-working);}
  .phgroup.st-wait{border-left-color:var(--border);}
  .phgroup .phkids{margin-left:14px;}
  .lrow.phead{padding-top:2px;padding-bottom:2px;}
  .lrow.phead .pname{color:var(--muted-foreground);font:var(--type-eyebrow-weight) var(--type-eyebrow)/var(--type-eyebrow-leading) var(--sans);letter-spacing:var(--type-eyebrow-tracking);text-transform:uppercase;}
  .phgroup.st-wait .pname{color:var(--foreground-faint);}
  /* phase status — word + done/total INLINE after the name (the right edge is
     reserved for durations), tinted the SAME hue as the phase rail */
  .phead .pstat{font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);font-variant-numeric:tabular-nums;flex:none;}
  .phgroup.st-done .pstat{color:var(--status-done);}
  .phgroup.st-run .pstat{color:var(--status-working);}
  .phgroup.st-wait .pstat{color:var(--foreground-faint);}

  /* Content tab strip (work pane) — same 41px strip height as the ribbon. */
  .dtabs{display:flex;gap:var(--space-hair);padding:6px 12px 8px;border-bottom:1px solid var(--border);align-items:center;min-height:41px;}
  .dtab{font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);color:var(--muted-foreground);padding:4px 10px;border-radius:var(--radius);cursor:pointer;} .dtab.on{color:var(--foreground);background:color-mix(in srgb,var(--foreground) 6%,transparent);}
  /* All files | By commit — view toggle inside the Changes tab strip */
  .vtoggle{margin-left:auto;display:inline-flex;gap:var(--space-hair);border:1px solid var(--border);border-radius:var(--radius);padding:1px;}
  .vtoggle .vt{font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);color:var(--muted-foreground);padding:2px 8px;border-radius:calc(var(--radius) - 2px);cursor:pointer;user-select:none;}
  .vtoggle .vt.on{color:var(--foreground);background:color-mix(in srgb,var(--foreground) 6%,transparent);}
  .scopejump{margin-left:auto;font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);color:var(--primary);cursor:pointer;}
  .feed{font:var(--type-code-weight) var(--type-code)/var(--type-code-leading) var(--mono);letter-spacing:var(--type-code-tracking);color:var(--foreground-soft);white-space:pre-wrap;} .feed .p{color:var(--muted-foreground);} .feed .a{color:var(--signal-ok);} .feed .r{color:var(--signal-bad);} .feed .w{color:var(--signal-warn);}
  .fdiff{margin:0 0 10px;}
  .fdhead{display:flex;align-items:center;gap:var(--space-gap);padding:8px 11px;border-bottom:1px solid var(--inset-hair);font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);cursor:pointer;}
  .fkind{display:inline-flex;align-items:center;color:var(--muted-foreground);font-size:14px;flex:none;} /* icon box */
  .fpath{font:var(--type-code-inline-weight) var(--type-code-inline)/var(--type-code-inline-leading) var(--mono);letter-spacing:var(--type-code-inline-tracking);color:var(--foreground-soft);} .fdhead .grow{flex:1;} .fdhead .add{color:var(--foreground-faint);} .fdhead .del{color:var(--foreground-faint);}
  .viewed{display:inline-flex;align-items:center;gap:var(--space-tight);color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);cursor:pointer;margin-left:6px;} .viewed input{accent-color:var(--primary);margin:0;}
  .fdiff.viewed-on{opacity:.62;} .fdiff.viewed-on .fpath{text-decoration:line-through;}
  .hunk{font:var(--type-code-weight) var(--type-code)/var(--type-code-leading) var(--mono);letter-spacing:var(--type-code-tracking);padding:9px 11px;white-space:pre-wrap;} .hunk .a{color:var(--signal-ok);} .hunk .r{color:var(--signal-bad);} .hunk .m{color:var(--foreground-faint);}
  .empty{color:var(--muted-foreground);font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);padding:8px 2px;}
  .cgroup{margin:0 0 14px;} .cghead{display:flex;align-items:center;gap:var(--space-gap);padding:6px 4px 8px;font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);}
  .cghead .sha{font:var(--type-code-inline-weight) var(--type-code-inline)/var(--type-code-inline-leading) var(--mono);letter-spacing:var(--type-code-inline-tracking);color:var(--muted-foreground);} .cghead .cmsg{color:var(--foreground);font-weight:var(--type-row-strong-weight);} .cghead .grow{flex:1;} .cghead .cgn{color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);} .cghead.wip .cmsg{color:var(--status-awaiting-input);}

  /* ══ PrLifecycleRibbon — the work pane's header strip; node states + drawer
        per cockpit-matrix.md. ══ */
  .shipbar{display:flex;align-items:stretch;border-bottom:1px solid var(--border);min-height:41px;}
  .shipbar .nodes{display:flex;align-items:stretch;flex:1;min-width:0;overflow-x:auto;}
  .rnode{display:inline-flex;align-items:center;gap:var(--space-snug);padding:0 11px;position:relative;font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);white-space:nowrap;}
  .rnode.click{cursor:pointer;}
  .rnode.click:hover{background:color-mix(in srgb,var(--foreground) 4%,transparent);}
  .rnode+.rnode::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:1px;height:16px;background:var(--inset-hair);}
  .rnode.on{background:color-mix(in srgb,var(--foreground) 4%,transparent);box-shadow:inset 0 -2px 0 color-mix(in srgb,var(--primary) 55%,transparent);}
  .rnode .glyph{width:18px;height:18px;border-radius:var(--radius-full);display:grid;place-items:center;border:1px solid var(--border);color:var(--muted-foreground);font-size:10px;flex:none;font-variant-emoji:text;} /* icon box */
  .rnode.done .glyph{color:var(--background);background:var(--status-done);border-color:transparent;}
  .rnode.now .glyph,.rnode.gate .glyph,.rnode.sync .glyph{color:var(--primary-foreground);background:linear-gradient(135deg,var(--primary-bright),var(--primary));border-color:transparent;}
  .rnode.auto .glyph{color:var(--primary-soft);border-color:color-mix(in srgb,var(--primary) 40%,transparent);background:color-mix(in srgb,var(--primary) 12%,transparent);}
  .rnode.fail .glyph{color:var(--verdict-block);border-color:color-mix(in srgb,var(--verdict-block-tint) 55%,transparent);background:color-mix(in srgb,var(--verdict-block-tint) 12%,transparent);}
  .rnode.warn .glyph{color:var(--verdict-changes);border-color:color-mix(in srgb,var(--verdict-changes-tint) 55%,transparent);background:color-mix(in srgb,var(--verdict-changes-tint) 12%,transparent);}
  .rnode.stale .glyph{color:var(--status-exited);border-style:dashed;}
  /* ◆ gate ≠ ● in-progress: a gate glyph carries an outer ring (form, not tint) */
  .rnode.gate .glyph{box-shadow:0 0 0 3px color-mix(in srgb,var(--primary) 24%,transparent);}
  .rnode.lock .glyph{opacity:.4;}
  .rnode .rlbl{color:var(--foreground-faint);}
  .rnode .rsub{color:var(--foreground-faint);font-variant-numeric:tabular-nums;}
  .rnode.done .rlbl{color:var(--muted-foreground);}
  .rnode.now .rlbl,.rnode.gate .rlbl,.rnode.sync .rlbl{color:var(--foreground);}
  .rnode.auto .rlbl{color:var(--primary-soft);}
  .rnode.fail .rlbl{color:var(--verdict-block);}
  .rnode.warn .rlbl{color:var(--verdict-changes);}
  .rnode.stale .rlbl{color:var(--status-exited);text-decoration:line-through;text-decoration-thickness:from-font;}
  .rnode.lock .rlbl{color:var(--foreground-faint);}
  /* terminal strip — Merged/Closed replaces the five nodes (R8) */
  .shipbar.terminal .tword{display:inline-flex;align-items:center;gap:7px;padding:0 13px;font:var(--type-row-strong-weight) var(--type-row-strong)/var(--type-row-strong-leading) var(--sans);letter-spacing:var(--type-row-strong-tracking);}
  .shipbar.terminal .tword.landed{color:var(--status-landed);}
  .shipbar.terminal .tword.closedt{color:var(--muted-foreground);}
  .shipanchor{margin-left:auto;display:inline-flex;align-items:center;gap:7px;padding:0 12px;flex:none;color:var(--muted-foreground);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);border-left:1px solid var(--inset-hair);}
  .shipanchor .num{font:var(--type-code-inline-weight) var(--type-code-inline)/var(--type-code-inline-leading) var(--mono);letter-spacing:var(--type-code-inline-tracking);color:var(--foreground-soft);}
  .shipanchor .mono{font-family:var(--mono);}
  .shipanchor .gh{color:var(--primary);cursor:pointer;display:inline-flex;align-items:center;gap:var(--space-tight);}
  .rdetail{border-bottom:1px solid var(--border);background:var(--well);padding:11px 13px;display:grid;gap:var(--space-gap);}
  .rdetail .stalebanner{color:var(--status-exited);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);}
  /* uncommitted marker on an All-files diff row */
  .rdetail .dh{display:flex;align-items:center;gap:var(--space-gap);font:var(--type-row-strong-weight) var(--type-row-strong)/var(--type-row-strong-leading) var(--sans);letter-spacing:var(--type-row-strong-tracking);color:var(--foreground-soft);}
  .rdetail .dh .g{color:var(--muted-foreground);display:inline-flex;}
  .rdetail .dh .src{margin-left:auto;color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);font-variant-numeric:tabular-nums;}
  .growrow{display:flex;align-items:center;gap:10px;font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);}
  .growrow .k{color:var(--muted-foreground);width:56px;flex:none;}
  .growrow .v{display:inline-flex;align-items:center;gap:5px;}
  .v.ok{color:var(--verdict-approve);} .v.warn{color:var(--verdict-changes);} .v.bad{color:var(--verdict-block);} .v.wait{color:var(--status-working);} .v.muted{color:var(--muted-foreground);}
  /* PrChecksList — remote-origin CI rows, deliberately origin-labelled
     "GitHub Actions"; every row deep-links to its run. NOT the local Checks. */
  .ci{border:1px solid var(--inset-hair);border-radius:var(--radius);background:var(--inset);overflow:hidden;}
  .ci-h{display:flex;align-items:center;gap:var(--space-snug);padding:5px 10px;border-bottom:1px solid var(--inset-hair);color:var(--muted-foreground);font:var(--type-tag-weight) var(--type-tag)/var(--type-tag-leading) var(--sans);letter-spacing:var(--type-tag-tracking);text-transform:uppercase;}
  .ci-h .agg{margin-left:auto;text-transform:none;letter-spacing:0;font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);display:inline-flex;align-items:center;gap:5px;font-variant-numeric:tabular-nums;}
  .cirow{display:flex;align-items:center;gap:var(--space-gap);padding:5px 10px;font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);cursor:pointer;}
  .cirow:hover{background:color-mix(in srgb,var(--foreground) 4%,transparent);}
  .cirow+.cirow{border-top:1px solid color-mix(in srgb,var(--inset-hair) 60%,transparent);}
  .cirow .cg{width:15px;text-align:center;flex:none;font-variant-emoji:text;}
  .cirow .cn{color:var(--foreground-soft);font-family:var(--mono);}
  .cirow .grow{flex:1;}
  .cirow .ct{color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);font-variant-numeric:tabular-nums;}
  .cirow .ct.fail{color:var(--signal-bad);}
  .cirow .open{color:var(--primary);opacity:0;font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);display:inline-flex;align-items:center;gap:3px;flex:none;}
  .cirow:hover .open,.cirow:focus-visible .open{opacity:1;}
  /* commit stage bits inside the ribbon detail */
  .draftmsg{font:var(--type-code-weight) var(--type-code)/var(--type-code-leading) var(--mono);letter-spacing:var(--type-code-tracking);color:var(--foreground-soft);background:var(--inset);border:1px solid var(--inset-hair);border-radius:var(--radius);padding:6px 9px;display:flex;align-items:center;gap:9px;}
  .draftmsg .g{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--foreground-bright);}
  .draftmsg .redraft{color:var(--primary);cursor:pointer;flex:none;}
  .mbtn{display:inline-flex;align-items:center;gap:var(--space-snug);border-radius:var(--radius);padding:7px 13px;font:var(--type-row-strong-weight) var(--type-row-strong)/var(--type-row-strong-leading) var(--sans);letter-spacing:var(--type-row-strong-tracking);cursor:pointer;
    background:linear-gradient(135deg, var(--primary-bright), var(--primary));color:var(--primary-foreground);border:1px solid color-mix(in srgb,var(--primary) 55%,transparent);}
  .mbtn[disabled]{opacity:.4;cursor:not-allowed;background:transparent;color:var(--muted-foreground);border-color:var(--border);}
  .mbtn.ghost{background:transparent;color:var(--muted-foreground);border-color:var(--border);}
  .mbtn.ghost:hover{color:var(--foreground);border-color:var(--input);}
  .mstage-act{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .mhint{color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);}
  .mhint .redraft{color:var(--primary);cursor:pointer;}

  /* ── Inline review findings — verdict-tinted card wedged under a hunk ── */
  .finding{margin:0;border-left:3px solid var(--verdict-block);background:color-mix(in srgb,var(--verdict-block-tint) 6%,transparent);
    border-top:1px solid var(--inset-hair);padding:9px 12px 10px;}
  .finding.sev-advisory{border-left-color:var(--verdict-changes);background:color-mix(in srgb,var(--verdict-changes-tint) 6%,transparent);}
  .finding.resolved{background:var(--inset);padding:6px 12px;}
  .finding .fhead{display:flex;align-items:center;gap:var(--space-gap);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);}
  .finding .sev{font-variant-emoji:text;flex:none;} .finding.sev-blocking .sev{color:var(--verdict-block);} .finding.sev-advisory .sev{color:var(--verdict-changes);}
  .finding .sevw{font:var(--type-tag-weight) var(--type-tag)/var(--type-tag-leading) var(--sans);letter-spacing:var(--type-tag-tracking);text-transform:uppercase;color:var(--muted-foreground);}
  .finding .floc{font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--mono);letter-spacing:var(--type-meta-tracking);color:var(--muted-foreground);}
  .finding .grow{flex:1;}
  .finding .fby{color:var(--foreground-faint);}
  .finding .fbody{font:var(--type-prose-weight) var(--type-prose)/var(--type-prose-leading) var(--sans);letter-spacing:var(--type-prose-tracking);color:var(--foreground-bright);margin:6px 0 0;}
  .finding.resolved .fbody{display:none;}
  .finding .fstub{display:none;color:var(--muted-foreground);font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);} .finding.resolved .fstub{display:inline;}
  .finding.walk-focus{box-shadow:0 0 0 1px color-mix(in srgb,var(--verdict-block-tint) 40%,transparent);background:color-mix(in srgb,var(--verdict-block-tint) 12%,transparent);}
  .flag{display:inline-flex;align-items:center;gap:3px;color:var(--verdict-block);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);font-variant-emoji:text;margin-left:2px;}

  /* Artifacts — stacked collapsible cards */
  .acard{background:var(--inset);border:1px solid var(--inset-hair);border-radius:calc(var(--radius) + 4px);box-shadow:0 1px 0 color-mix(in srgb,var(--foreground) 4%,transparent) inset;margin:0 0 10px;overflow:hidden;}
  .achead{display:flex;align-items:center;gap:var(--space-gap);padding:9px 11px;cursor:pointer;font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);}
  .achead .cv{color:var(--foreground-faint);font-size:10px;width:9px;flex:none;} /* icon box */
  .achead .ai{color:var(--muted-foreground);flex:none;font-variant-emoji:text;}
  .achead .apath{font:var(--type-code-inline-weight) var(--type-code-inline)/var(--type-code-inline-leading) var(--mono);letter-spacing:var(--type-code-inline-tracking);color:var(--foreground-soft);}
  .achead .grow{flex:1;} .achead .amiss{color:var(--status-awaiting-input);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);font-variant-emoji:text;}
  .acbody{padding:11px 13px;border-top:1px solid var(--inset-hair);}
  .acard.gone .apath{color:var(--foreground-faint);text-decoration:line-through;}

  .kv{display:flex;gap:var(--space-gap);font:var(--type-row-weight) var(--type-row)/var(--type-row-leading) var(--sans);letter-spacing:var(--type-row-tracking);color:var(--muted-foreground);margin:2px 0;} .kv .k{color:var(--foreground-faint);width:64px;flex:none;} .kv .mono{color:var(--foreground-soft);}

  .term{display:grid;grid-template-rows:auto 1fr;min-height:0;border-top:1px solid var(--input);}
  .term-h{display:flex;align-items:center;gap:var(--space-gap);padding:7px 13px;background:color-mix(in srgb,var(--background) 55%,transparent);color:var(--muted-foreground);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);} .term-h .grow{flex:1;} .term-h .x{cursor:pointer;color:var(--foreground-faint);}
  .term-body{background:var(--background);color:var(--foreground-soft);font:var(--type-code-weight) var(--type-code)/var(--type-code-leading) var(--mono);letter-spacing:var(--type-code-tracking);padding:10px 13px;overflow:auto;white-space:pre-wrap;outline:none;} .term-body .p{color:var(--status-working);} .term-body .dim{color:var(--foreground-faint);}
  .caret{display:inline-block;width:7px;height:14px;background:var(--foreground-soft);vertical-align:-2px;} /* static — the animation budget belongs to the ribbon/rail */
  .hint{position:fixed;left:16px;bottom:12px;z-index:5;color:var(--muted-foreground);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);}
  [tabindex]:focus-visible{outline:2px solid var(--ring);outline-offset:1px;border-radius:calc(var(--radius) - 2px);}
  .term-body:focus-visible{outline:none;box-shadow:inset 0 0 0 1px var(--ring);}

  /* Review tab (pane 2, R14) — the agent review's ONE pointer: count + a
     static dot while findings are outstanding; verdict word lives in the hero. */
  .dtab.review{color:var(--verdict-changes);font-variant-numeric:tabular-nums;}
  .dtab.review.on{background:color-mix(in srgb,var(--verdict-changes-tint) 12%,transparent);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--verdict-changes-tint) 40%,transparent);color:var(--verdict-changes);}
  .tglow{width:var(--space-snug);height:var(--space-snug);border-radius:50%;color:var(--verdict-block);background:currentColor;display:inline-block;margin-left:var(--space-snug);vertical-align:middle;}
  /* Console — channel tabs in the terminal strip header (R13): `session · live`
     keeps the caret/tail; captures are timestamped, caretless, closable. */
  .term-h .chtab{display:inline-flex;align-items:center;gap:var(--space-snug);padding:2px 9px;border-radius:var(--radius);cursor:pointer;color:var(--muted-foreground);border:1px solid transparent;user-select:none;}
  .term-h .chtab:hover{color:var(--foreground);}
  .term-h .chtab.on{color:var(--foreground);background:color-mix(in srgb,var(--foreground) 6%,transparent);}
  .term-h .chtab.cap{font-variant-numeric:tabular-nums;}
  .term-h .chtab .chx{color:var(--foreground-faint);display:inline-flex;cursor:pointer;} .term-h .chtab .chx:hover{color:var(--foreground);}
  .term-note{color:var(--foreground-faint);}
  .rvrow.rv-focus{box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--verdict-changes-tint) 55%,transparent);background:color-mix(in srgb,var(--verdict-changes-tint) 12%,transparent);}

  /* Verdict HERO — the SOLE home of the agent verdict prose. */
  .rv-hero{position:relative;border-radius:calc(var(--radius) + 4px);padding:13px 14px;margin:2px 0 12px;
    border:1px solid color-mix(in srgb,var(--verdict-changes-tint) 40%,transparent);
    background:linear-gradient(135deg,color-mix(in srgb,var(--verdict-changes-tint) 12%,transparent),color-mix(in srgb,var(--verdict-changes-tint) 6%,transparent) 62%,transparent);
    box-shadow:0 1px 0 color-mix(in srgb,var(--foreground) 4%,transparent) inset,0 14px 34px var(--shadow-2);}
  .rv-hero.approve{border-color:color-mix(in srgb,var(--verdict-approve-tint) 40%,transparent);background:linear-gradient(135deg,color-mix(in srgb,var(--verdict-approve-tint) 12%,transparent),color-mix(in srgb,var(--verdict-approve-tint) 6%,transparent) 62%,transparent);}
  .rv-hero .verdict{display:flex;align-items:center;gap:11px;}
  .rv-hero .vglyph{width:36px;height:36px;border-radius:calc(var(--radius) + 4px);flex:none;display:grid;place-items:center;font-size:18px;font-variant-emoji:text; /* icon box */
    color:var(--verdict-changes);border:1px solid color-mix(in srgb,var(--verdict-changes-tint) 55%,transparent);background:radial-gradient(circle at 50% 35%,color-mix(in srgb,var(--verdict-changes-tint) 24%,transparent),transparent 70%);}
  .rv-hero .vglyph.ap{color:var(--verdict-approve);border-color:color-mix(in srgb,var(--verdict-approve-tint) 55%,transparent);background:radial-gradient(circle at 50% 35%,color-mix(in srgb,var(--verdict-approve-tint) 24%,transparent),transparent 70%);}
  .rv-hero .vhead{font:var(--type-title-weight) var(--type-title)/var(--type-title-leading) var(--sans);letter-spacing:var(--type-title-tracking);color:var(--foreground);}
  .rv-hero .vhead .vblock{color:var(--verdict-block);}
  .rv-hero .vsum{color:var(--foreground-bright);font:var(--type-prose-weight) var(--type-prose)/var(--type-prose-leading) var(--sans);letter-spacing:var(--type-prose-tracking);margin:9px 0 0;}
  .rv-hero .vsum b{color:var(--foreground);}
  .rv-hero .vattr{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-top:10px;color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);}
  .rv-hero .vattr .sha{font-family:var(--mono);color:var(--muted-foreground);}
  .rv-hero .vnote{color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);margin-top:8px;font-style:italic;}

  .rv-cta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 0 13px;}
  .rv-btn{display:inline-flex;align-items:center;gap:7px;border-radius:var(--radius);padding:8px 13px;font:var(--type-row-strong-weight) var(--type-row-strong)/var(--type-row-strong-leading) var(--sans);letter-spacing:var(--type-row-strong-tracking);cursor:pointer;border:1px solid transparent;transition:filter var(--time-fast),border-color var(--time-fast),background var(--time-fast);}
  /* all Review-tab controls are SECONDARY — the screen's one primary lives in
     the ribbon head's drawer (R2) */
  .rv-btn.ghost{color:var(--foreground-bright);border-color:var(--input);background:color-mix(in srgb,var(--foreground) 4%,transparent);}
  .rv-btn.ghost:hover{border-color:var(--primary);}
  .rv-btn[disabled]{opacity:.4;cursor:not-allowed;filter:none;box-shadow:none;}

  /* Addressable findings LIST */
  .rv-list{display:flex;flex-direction:column;gap:9px;}
  .rvrow{display:flex;align-items:flex-start;gap:var(--space-inset);padding:12px 14px;border-radius:calc(var(--radius) + 4px);
    border:1px solid var(--inset-hair);background:var(--inset);box-shadow:0 1px 0 color-mix(in srgb,var(--foreground) 4%,transparent) inset;border-left:3px solid var(--verdict-block);flex-wrap:wrap;}
  .rvrow.sev-advisory{border-left-color:var(--verdict-changes);}
  .rvrow.fixed{border-left-color:var(--verdict-approve);opacity:.74;}
  .rvrow .rsev{font-size:14px;flex:none;margin-top:1px;font-variant-emoji:text;color:var(--verdict-block);} /* icon box */
  .rvrow.sev-advisory .rsev{color:var(--verdict-changes);}
  .rvrow.fixed .rsev{color:var(--verdict-approve);}
  .rvrow .rmid{flex:1 1 62%;min-width:0;}
  .rvrow .rloc{font:var(--type-code-inline-weight) var(--type-code-inline)/var(--type-code-inline-leading) var(--mono);letter-spacing:var(--type-code-inline-tracking);color:var(--muted-foreground);}
  .rvrow .diffjump{color:var(--primary);cursor:pointer;margin-left:9px;font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);}
  .rvrow .diffjump:hover{text-decoration:underline;}
  .rvrow .rbody{color:var(--foreground-bright);font:var(--type-prose-weight) var(--type-prose)/var(--type-prose-leading) var(--sans);letter-spacing:var(--type-prose-tracking);margin:5px 0 0;}
  .rvrow.fixed .rbody{color:var(--muted-foreground);}
  .rvrow .rby{color:var(--foreground-faint);font:var(--type-meta-weight) var(--type-meta)/var(--type-meta-leading) var(--sans);letter-spacing:var(--type-meta-tracking);margin-top:6px;}
  .rvrow .ractions{display:flex;flex-direction:row;align-items:center;gap:var(--space-gap);flex:none;margin-left:auto;flex-wrap:wrap;justify-content:flex-end;}

  /* State chip — Open · Addressing · Fixed */
  .schip{display:inline-flex;align-items:center;gap:5px;font:var(--type-tag-weight) var(--type-tag)/var(--type-tag-leading) var(--sans);letter-spacing:var(--type-tag-tracking);text-transform:uppercase;padding:2px 9px;border-radius:var(--radius-full);border:1px solid transparent;white-space:nowrap;font-variant-emoji:text;} /* pill — outside the 4/6/8/12 radius family (follow-up) */
  .schip.open{color:var(--verdict-block);border-color:color-mix(in srgb,var(--verdict-block-tint) 40%,transparent);background:color-mix(in srgb,var(--verdict-block-tint) 12%,transparent);}
  .schip.addressing{color:var(--verdict-changes);border-color:color-mix(in srgb,var(--verdict-changes-tint) 40%,transparent);background:color-mix(in srgb,var(--verdict-changes-tint) 12%,transparent);}
  .schip.fixed{color:var(--verdict-approve);border-color:color-mix(in srgb,var(--verdict-approve-tint) 40%,transparent);background:color-mix(in srgb,var(--verdict-approve-tint) 12%,transparent);}

  /* Address button (the real control) */
  .abtn{display:inline-flex;align-items:center;gap:var(--space-snug);font:var(--type-row-strong-weight) var(--type-row-strong)/var(--type-row-strong-leading) var(--sans);letter-spacing:var(--type-row-strong-tracking);cursor:pointer;border-radius:var(--radius);padding:6px 12px;
    color:var(--foreground);border:1px solid color-mix(in srgb,var(--verdict-changes-tint) 55%,transparent);background:color-mix(in srgb,var(--verdict-changes-tint) 12%,transparent);transition:background var(--time-fast),border-color var(--time-fast);}
  .abtn:hover{background:color-mix(in srgb,var(--verdict-changes-tint) 24%,transparent);border-color:var(--verdict-changes-tint);}
  .abtn.confirm{color:var(--foreground);border-color:color-mix(in srgb,var(--verdict-approve-tint) 55%,transparent);background:color-mix(in srgb,var(--verdict-approve-tint) 12%,transparent);}
  .abtn.confirm:hover{background:color-mix(in srgb,var(--verdict-approve-tint) 24%,transparent);border-color:var(--verdict-approve-tint);}
  .abtn.reopen{color:var(--muted-foreground);border-color:var(--border);background:transparent;}
  .abtn.reopen:hover{color:var(--foreground);border-color:var(--input);background:color-mix(in srgb,var(--foreground) 4%,transparent);}
  .abtn.sm{padding:4px 10px;}
  .abtn:focus-visible,.rv-btn:focus-visible,.mbtn:focus-visible{outline:2px solid var(--ring);outline-offset:1px;}
</style>
</head>

/* Ribbon-derived rail outcome (a POINTER into the head node, never a value).
   CI-failing / changes-requested / gates fold into the existing amber
   needs-you; Merged gets the promoted --status-landed; Closed = exited gray. */
function railStatus(s){
  const sh=s.ship||{};
  if(sh.terminal==='merged') return {word:'Landed',cls:'landed',icon:'git-merge'};
  if(sh.terminal==='closed') return {word:'Closed',cls:'stale',icon:'prohibit'};
  const m=ribbonModel(s);
  if(m){
    if(m.st.ci==='fail') return {word:'CI failing',cls:'amber',icon:'warning'};
    if(m.st.review==='warn') return {word:'Changes requested',cls:'amber',icon:'user'};
    if(m.st.merge==='gate') return {word:'Ready to merge',cls:'amber',icon:'git-pull-request'};
    if(m.st.merge==='auto') return {word:'Auto-merge armed',cls:'run',icon:'gear'};
    if(m.st.commits==='sync') return {word:`↑${sh.unpushed} unpushed`,cls:'run',icon:'arrow-line-up'};
    if(m.st.commits==='gate') return {word:'Commit ready',cls:'amber',icon:'git-commit'};
    if(m.st.pr==='gate') return {word:'Create PR ready',cls:'amber',icon:'git-pull-request'};
    if(m.st.pr==='auto') return {word:'Opening PR · auto',cls:'run',icon:'gear'};
    if(m.st.review==='now') return {word:'In review',cls:'run',icon:'user'};
    if(sh.pr) return {word:`PR #${sh.pr.num} · CI`,cls:'run',icon:'git-pull-request'};

/* WorkspaceIdentity — branch typed exactly ONCE on screen, here. The branch

   "worktree" (one
   name, never two); the dir is spelled out only for an adopted worktree whose
   dir differs. Full path lives in the title/popover. */
function wschipHtml(s){
  const w=s.ws, shared=treeCount(s)>1;
  const dirMatches=w.dir&&w.dir.split('/').pop()===w.branch.split('/').pop();
  const tag=w.tree==='main'
    ?`<span class="badge">main tree</span>`
    :dirMatches?`<span class="badge" title="worktree ${w.dir} — named by the branch">worktree</span>`
    :`<span class="badge" title="adopted worktree — dir does not match the branch">worktree <span class="mono">${w.dir}</span></span>`;
  const dirty=w.dirty?`<span class="dirty" title="${w.dirty} uncommitted file${w.dirty>1?'s':''}">${w.dirty} dirty<span class="dot glow amber"></span></span>`:'';
  const parts=[];

  const sync=`<span class="sync" title="commits ahead/behind main">${parts.length?parts.join(' '):'='} vs main</span>`;
  const sharedBit=shared?`<span class="shared" title="another session is working in this tree">${ic('warning')} shared tree · ${treeCount(s)} sessions</span>`:'';
  return `<span class="wschip" data-component="WorkspaceIdentity">${ic('git-branch')} <span class="branch">${w.branch}</span>${tag}${dirty}${sync}${sharedBit}</span>`;

/* Tool rows stay one-line PROSE (R12); a click opens the row's captured feed

/* ── Agents — the story pane's Actor roster (R15). AgentRow + RunRow own agent

function agentRow(a,parentSt){

  const word=(st==='running'||st==='failed'||st!==parentSt)?`<span class="aword ${st}">${st}</span>`:'';

function runRow(r){

/* PhaseGroup — a pipeline's members grouped under their Phase. The left rail is

function phaseGroups(r){
  return r.phases.map(p=>{
    const members=r.members.filter(m=>m.phase===p.lbl);

/* ══ PrLifecycleRibbon — the ONE stateful home of ship-flow state.
   Artifact nodes Commits · PR · CI · Review · Merge; every node state is a
   fact about a sha, so done can go STALE (R3). Head = leftmost non-fresh (R1). ══ */
const NODE_ICON={commits:'git-commit',pr:'git-pull-request',ci:'gear',review:'user',merge:'arrows-merge'};
const NODE_LBL={commits:'Commits',pr:'PR',ci:'CI',review:'Review',merge:'Merge'};
const RIBBON_KEYS=['commits','pr','ci','review','merge'];
function latestRound(sh){const r=(sh.review&&sh.review.rounds)||[];return r.length?r[r.length-1]:null;}
function ribbonModel(s){
  const sh=s.ship;
  if(!sh) return null;                                   /* R7 — no ship object */
  if(sh.terminal) return {terminal:sh.terminal,st:{},head:null};   /* R8 */
  const dirty=s.ws.dirty||0, unp=sh.unpushed||0, st={};
  if(!sh.headSha&&!dirty) return null;                   /* R7 — tree == base */
  /* Commits — ● agent committing · ◆ dirty repair · sync ↑n post-PR (R5) · ✓ */
  st.commits = sh.committing?'now' : dirty>0?'gate' : (unp>0&&sh.pr)?'sync' : 'done';
  /* PR — exists → done (fresh by definition); else gate once commits are clean (R4) */
  st.pr = sh.pr?'done' : st.commits==='done'?(sh.prGate==='auto'?'auto':'gate') : 'wait';
  /* CI — keyed to a sha; stale when the branch moved past it (R3) */
  st.ci = (!sh.pr||!sh.ci)?'wait'
    : sh.ci.sha!==sh.headSha?'stale'
    : sh.ci.cls==='fail'?'fail' : sh.ci.cls==='run'?'now' : 'done';
  /* Review — the GitHub human review, round-stacked; approval goes stale too */
  const r=latestRound(sh);

    : !r?(st.ci==='done'?'now':'wait')
    : r.verdict==='changes'?'warn'
    : r.verdict==='running'?'now'
    : r.sha!==sh.headSha?'stale' : 'done';

     it; a delegated gate (R6) narrates its standing order even while waiting */
  st.merge = (st.ci==='stale'||st.review==='stale')?'lock'
    : sh.mergeGate==='auto'?'auto'
    : (st.ci==='done'&&st.review==='done')?'gate' : 'wait';
  const head=RIBBON_KEYS.find(k=>st[k]!=='done')||'merge';
  return {st,head,terminal:null};
}
function nodeGlyph(k,stv){
  if(stv==='done')return ic('check');
  if(stv==='fail')return ic('x');
  if(stv==='warn')return ic('x'); /* changes-requested renders ✗ (spec vocabulary) */
  if(stv==='stale')return ic('circle-half');
  if(stv==='sync')return ic('arrow-line-up');
  if(stv==='auto')return ic('gear');
  return ic(NODE_ICON[k]);
}
/* per-node sub-label — a count/sha echo, never a re-typed value */
function nodeSub(k,stv,s){
  const sh=s.ship;

  if(k==='commits'){

/* CI drawer — remote-origin GitHub Actions runs, each row deep-links (origin-labelled). */
function ciDrawerHtml(s,stv,isHead){

  const rows=sh.ci.runs.map(r=>`<div class="cirow" tabindex="0" role="button" title="opens this run on GitHub">
      <span class="cg">${G[r.st]||'·'}</span><span class="cn">${r.n}</span>${r.note?`<span class="ct fail">${r.note}</span>`:''}<span class="grow"></span><span class="ct">${r.t}</span><span class="open">open ${ic('arrow-square-out')}</span></div>`).join('');
  const stale=stv==='stale'?`<div class="stalebanner">true of <span class="mono">${sh.ci.sha}</span> — superseded by ↑${sh.unpushed} unpushed commit${sh.unpushed>1?'s':''}</div>`:'';

/* Review drawer — the GitHub HUMAN review, round-stacked (not the agent review,
   whose home is the Activity Review tab). */
function reviewDrawerHtml(s,stv,isHead){
  const sh=s.ship, rounds=(sh.review&&sh.review.rounds)||[];
  const rows=rounds.map(r=>{
    if(r.archived) return `<div class="growrow"><span class="v muted">${ic('check')} round ${r.n} · ${r.findings} findings · all fixed <span class="mono" style="margin-left:4px">${r.sha}</span></span></div>`;
    if(r.verdict==='changes') return `<div class="growrow"><span class="v warn">${ic('user')} round ${r.n} · changes requested by ${r.by} · ${r.open} open</span></div>`;
    if(r.verdict==='running') return `<div class="growrow"><span class="v wait">${ic('circle-notch')} round ${r.n} · running</span></div>`;
    const stale=r.sha!==sh.headSha;
    return `<div class="growrow"><span class="v ${stale?'muted':'ok'}">${ic('check')} round ${r.n} · approved by ${r.by} <span class="mono" style="margin:0 4px">${r.sha}</span>${stale?' · stale — re-requested on push':''}</span></div>`;
  }).join('');
  const none=!rounds.length?`<div class="growrow"><span class="v muted">no review yet</span></div>`:'';
  const addr=(stv==='warn'&&isHead)?`<div class="mstage-act"><button class="mbtn" tabindex="0">${ic('arrow-bend-down-right')} Address ${latestRound(sh).open}</button><span class="mhint">dispatches the agent on the open findings</span></div>`:'';
  return `<div class="dh"><span class="g">${ic('user')}</span>Review · GitHub<span class="src">humans on the PR ${ic('arrow-square-out')}</span></div>${rows}${none}${addr}`;
}
/* Merge drawer — GATE 2, the single Merge control. Prerequisites are referenced

function mergeDrawerHtml(s,stv,isHead){

  if(stv==='auto') return `<div class="dh"><span class="g">${ic('gear')}</span>Merge · delegated</div>
    <div class="growrow"><span class="v muted">${ic('gear')} auto-merge when CI and review are green — set at dispatch · <span class="redraft" onclick="event.stopPropagation();revokeGate('merge')" tabindex="0" role="button" title="revoke the standing order — the gate returns to ask">revoke</span></span></div>`;

      ?`<button class="mbtn" onclick="event.stopPropagation();armLand()" tabindex="0">${ic('arrows-merge')} Merge #${sh.pr.num}</button><span class="mhint">squash into <span class="mono">main</span></span>`
      :`<button class="mbtn" onclick="event.stopPropagation();armLand()" tabindex="0">${ic('arrows-merge')} Confirm — merge</button><span class="mhint"><span class="redraft" onclick="event.stopPropagation();cancelLand()">cancel</span></span>`;

/* Local-check output — sha-keyed, so its home is the Commits node drawer (R11). */

/* The strip + drawer — the Session-changes pane header. Returns '' under R7. */
function shipbarHtml(s){

  const anchor=sh&&sh.pr?`<span class="shipanchor" data-component="PrAnchor"><span class="num">PR #${sh.pr.num}</span><span>→ <span class="mono">main</span></span><span class="gh" tabindex="0" role="button">GitHub ${ic('arrow-square-out')}</span></span>`:'';

    const merged=m.terminal==='merged';
    return `<div class="shipbar terminal" data-component="PrLifecycleRibbon">
      <span class="tword ${merged?'landed':'closedt'}">${ic(merged?'git-merge':'prohibit')} ${merged?'Merged':'Closed'}</span>${anchor}</div>

  const nodes=RIBBON_KEYS.map(k=>{
    const stv=m.st[k];

    const hot=(k===m.head)&&(stv==='fail'||stv==='warn'||stv==='gate'); /* R10 */
    const sub=nodeSub(k,stv,s);
    return `<div class="rnode ${stv} ${clickable?'click':''} ${k===openKey?'on':''}" data-component="RibbonNode" ${clickable?`onclick="setRibbonNode('${k}')" tabindex="0" role="button"`:''} title="${NODE_LBL[k]} — ${stv==='stale'?'stale: true of an older commit':stv}">

const S_WORD={open:'Open',addressing:'Addressing',fixed:'Fixed'};

function reviewFindingRow(f){

/* ── WORK pane — ribbon strip header + Changes/Review/Artifacts tabs. The ONLY
   scoping a story click may cause is sha-keyed product: an outcome (R11).
   Tool feeds → console; check output → Commits drawer. ── */
function detailModel(){
  if(sel.startsWith('outcome:')){const o=OUTCOMES.find(x=>x.id===sel.slice(8))||{};
    const arts=(o.artifacts||[]).map(id=>ARTIFACTS.find(a=>a.id===id)).filter(Boolean);

    return {kind:'empty',title:o.title};}
  return {kind:'tabs'};
}
/* Changes · All files — ONE flat cumulative diff vs merge-base, uncommitted
   included (net effect, not per-commit concatenation); dirty files marked. */
function allFilesHtml(){
  return `<div data-component="AllFilesDiff">${FILES.map(f=>fileDiff('all',f,true)).join('')}</div>`;
}
/* Artifacts — every artifact of the session, tagged with its producing outcome. */
function artifactCard(a){
  const open=artOpen[a.id]!==false&&!a.missing;
  const o=OUTCOMES.find(x=>(x.artifacts||[]).includes(a.id));
  const from=o?`<span class="branchmeta" title="the outcome that produced this artifact">${(OTYPE[o.type]||OTYPE.untyped).w} · ${o.title}</span>`:'';

function artifactsTabHtml(){
  return `<div data-component="ArtifactsList">${ARTIFACTS.map(artifactCard).join('')}</div>`;
}
function findingCard(f){
  const st=findingStatus[f.id], fixed=st==='fixed';
  const sev=f.severity==='blocking'?'blocking':'advisory';
  const focus=FINDINGS[walkIdx]&&FINDINGS[walkIdx].id===f.id;
  const glyph=f.severity==='blocking'?'▲':'◆';
  return `<div id="fc-${f.id}" class="finding sev-${sev} ${fixed?'resolved':''} ${focus?'walk-focus':''}">
    <div class="fhead">
      <span class="sev">${glyph}</span><span class="sevw">${f.severity}</span>

      <span class="fby">${f.by}</span>

    <div class="fbody">${esc(f.body)}</div></div>`;

function fileDiff(gkey,f,markWip){
  const key=f.p, isViewed=!!viewed[key];
  const fnd=findingsFor(key);
  const openN=fnd.filter(x=>findingStatus[x.id]!=='fixed').length;
  const wip=(markWip&&!f.commit)?`<span class="badge warn" title="uncommitted — in the tree, not yet in a commit">uncommitted</span>`:'';
  const flag=fnd.length?`<span class="flag" title="${fnd.length} review finding${fnd.length>1?'s':''} on this file">${ic('flag')} ${openN||fnd.length}</span>`:'';
  /* R14 — finding BODIES render inline under the hunk; the Review tab jumps here */
  const cards=(fnd.length&&!isViewed)?fnd.map(findingCard).join(''):'';
  return `<div class="inset fdiff pad0 ${isViewed?'viewed-on':''}" data-component="FileDiff">
    <div class="fdhead" onclick="toggleView('${key}')">
      <span class="fkind" title="${({M:'modified',A:'added',D:'deleted',R:'renamed'})[f.k]||f.k}">${ic(({M:'file-text',A:'file-plus',D:'file-minus',R:'file-text'})[f.k]||'file-text')}</span><span class="fpath">${f.p}</span><span class="grow"></span>
      ${wip}${flag}
      <span title="line counts from a file snapshot"><span class="add">+${f.a}</span> <span class="del">−${f.d}</span></span>
      <label class="viewed" onclick="event.stopPropagation()"><input type="checkbox" ${isViewed?'checked':''} onchange="toggleView('${key}')"/> Viewed</label></div>
    ${isViewed?'':`<div class="hunk">${f.hunk.map(([c,t])=>`<span class="${c}">${esc(t)}</span>`).join('\n')}</div>`}
    ${cards}</div>`;
}
const commitOf=f=>COMMITS.find(c=>c.files.includes(f.p));
function groupedFiles(files){
  const groups=[];
  files.forEach(f=>{const c=commitOf(f),key=c?c.sha:'wip';let g=groups.find(x=>x.key===key);if(!g){g={key,commit:c,files:[]};groups.push(g);}g.files.push(f);});
  return groups.map(g=>`<div class="cgroup"><div class="cghead ${g.commit?'':'wip'}">${g.commit?`<span class="sha">${g.commit.sha}</span><span class="cmsg">${g.commit.msg}</span>`:`<span class="cmsg">Uncommitted changes</span>`}<span class="grow"></span><span class="cgn">${g.files.length} file${g.files.length>1?'s':''}</span></div>${g.files.map(f=>fileDiff(g.key,f)).join('')}</div>`).join('');
}
function detailHtml(){
  const s=cur();
  const bar=shipbarHtml(s);           /* '' under R7 — investigation sessions */
  if(!isFull()){
    return `<div class="region detail" aria-label="Work">
      ${bar}
      <div class="dtabs" data-component="WorkTabs"><span class="dtab on">Changes</span><span class="dtab">Artifacts</span></div>
      <div class="rscroll"><div class="empty">Diff and Activity mocks live on “Auth refactor” — this session demonstrates the lifecycle state above.</div></div></div>`;
  }
  const m=detailModel();
  const scoped=m.kind!=='tabs';
  let body='', strip='';
  if(!scoped){
    /* unscoped — three content tabs, Changes default. The Review tab badge is
       the agent review's one pointer: count + static dot (R14). */
    const churn=`+${FILES.reduce((x,f)=>x+f.a,0)} −${FILES.reduce((x,f)=>x+f.d,0)}`;

      :changesView==='commits'?groupedFiles(FILES)
      :`<div class="sect-h" style="margin:0 2px 8px">vs merge-base <span class="n">· ${churn} · uncommitted included</span></div>${allFilesHtml()}`;
  }else{
    /* scoped — an outcome's sha-keyed product (R11); the strip is the return path */
    strip=`<div class="dtabs" data-component="WorkTabs">

      body=artBlock+fileBlock||`<div class="empty">Nothing captured for this outcome yet.</div>`;
    } else {
      body=`<div class="empty">Nothing captured for this outcome yet.</div>`;
    }
  }
  return `<div class="region detail" aria-label="Work">
    ${bar}
    ${strip}
    <div class="rscroll">${body}</div></div>`;
}

/* ── Console (R13) — the ONE monospace surface. Channel tabs: `session · live`
   (caret + tail) plus captures opened from timeline tool rows (timestamped,
   caretless, closable). Esc or the live tab returns. ── */
function consoleHtml(){
  const capTabs=channels.map(c=>`<span class="chtab cap ${activeChannel===c.id?'on':''}" onclick="setChannel('${c.id}')" data-component="ConsoleChannelTab">${c.agent?`${ic('sparkle')} `:''}${c.lbl}<span class="chx" onclick="event.stopPropagation();closeChannel('${c.id}')" title="close this capture" role="button" tabindex="0">${ic('x')}</span></span>`).join('');
  const capt=activeChannel!=='live'?channels.find(c=>c.id===activeChannel):null;
  const body=capt
    ?`<div class="term-body" data-component="ConsoleChannel">${esc(capt.feed).replace(/▸/g,'<span class="p">▸</span>')}
<span class="term-note">captured feed — <b>esc</b> returns to session · live</span></div>`
    :`<div class="term-body" data-component="ConsoleChannel" contenteditable="true" spellcheck="false"><span class="p">▸</span> Edit src/auth/legacy.ts · verify() delegates to rotation core
<span class="p">${cur().title.toLowerCase()} $</span> <span class="caret"></span></div>`;
  return `<div class="term" data-component="Console">
    <div class="term-h" data-component="ConsoleChannelTabs"><span class="chtab ${activeChannel==='live'?'on':''}" onclick="setChannel('live')">session · live</span>${capTabs}<span class="grow"></span><span class="x" onclick="expandTerm()">${termTall.v?`${ic('caret-down')} collapse`:`${ic('caret-up')} expand`}</span></div>
    ${body}</div>`;
}

function render(){app.innerHTML=railHtml()+`<div class="vsplit" data-split="rail"></div>`+sessionHtml();wireSplitters();wireA11y();drawOrb();}
function wireA11y(){document.querySelectorAll('[onclick]:not([tabindex]):not([contenteditable])').forEach(el=>{
  if(el.classList.contains('viewed'))return;
  if(el.parentElement&&el.parentElement.closest('[role=button]'))return;
  el.setAttribute('tabindex','0');el.setAttribute('role','button');});}
addEventListener('keydown',e=>{
  if(e.key==='Escape'&&activeChannel!=='live'){activeChannel='live';render();return;}
  const el=document.activeElement;if((e.key==='Enter'||e.key===' ')&&el&&el.hasAttribute('onclick')&&el.getAttribute('contenteditable')!=='true'){e.preventDefault();el.click();}});
/* console channels — seeded per session (autoCh = an already-running dispatch) */
const chanOf=t=>({id:t.id,lbl:t.ch||clean(t.lbl),feed:t.feed||'',agent:!!t.agent});
/* ONE capture slot: the console is `session · live` + at most one secondary
   feed; opening another feed REPLACES the slot (no tab accumulation). */
function seedChannels(){const s=cur();const t=[...msgsFor(s).flatMap(m=>m.tools),...actorsOf(s)].find(t=>t.autoCh);channels=t?[chanOf(t)]:[];activeChannel='live';}
function openConsole(id){const t=findTool(id);if(!t)return;sel=id;
  channels=[chanOf(t)];
  activeChannel=id;render();}
function setChannel(id){activeChannel=id;render();}
function closeChannel(id){channels=channels.filter(c=>c.id!==id);if(activeChannel===id)activeChannel='live';render();}
function openCheck(k){checkSel=(checkSel===k)?null:k;if(checkSel)ribbonSel='commits';render();}
function selectSession(i){selIdx=i;sel='session';ribbonSel=null;landStep=0;focusFinding=null;detailTab='changes';changesView='all';checkSel=null;seedChannels();render();}
/* clicking the open node again collapses the drawer */
function setRibbonNode(k){
  const m=ribbonModel(cur());
  const openKey=ribbonSel==='none'?null:(ribbonSel&&m.st[ribbonSel]!=='wait')?ribbonSel:m.head;
  ribbonSel=(k===openKey)?'none':k;if(ribbonSel!=='commits')checkSel=null;landStep=0;render();}
function setDetailTab(t){detailTab=t;render();}
function setChangesView(v){changesView=v;render();}
function pick(id){sel=id;if(id!=='session')showDetail=true;render();}
function toggleArt(id){artOpen[id]=artOpen[id]===false?true:false;render();}
function openArtifact(aid){const o=OUTCOMES.find(x=>(x.artifacts||[]).includes(aid));if(o){sel='outcome:'+o.id;artOpen[aid]=true;showDetail=true;render();}}
function toggleMsg(id){expanded[id]=!expanded[id];render();}
function toggleView(key){viewed[key]=!viewed[key];render();}
function toggleDetail(){showDetail=!showDetail;render();}
function toggleProj(){projOpen=!projOpen;render();}
function openReview(){detailTab='review';sel='session';showDetail=true;walkIdx=0;render();}
function advanceFinding(id){const s=findingStatus[id];
  findingStatus[id]= s==='open'?'addressing' : s==='addressing'?'fixed' : 'open';
  render();}
function addressAll(){FINDINGS.forEach(f=>{if(findingStatus[f.id]==='open')findingStatus[f.id]='addressing';});render();}
function reReview(){render();} /* would re-run /code-review — no fabricated verdict */
function gotoDiff(id){const f=FINDINGS.find(x=>x.id===id);if(!f)return;
  sel='session';showDetail=true;detailTab='changes';const i=FINDINGS.findIndex(x=>x.id===id);if(i>=0)walkIdx=i;
  render();requestAnimationFrame(()=>{const el=document.getElementById('fc-'+id);if(el)el.scrollIntoView({block:'center',behavior:'smooth'});});}
function revokeGate(which){const sh=cur().ship;if(!sh)return;if(which==='pr')sh.prGate='ask';else sh.mergeGate='ask';render();}
function toggleRun(id){runOpen[id]=runOpen[id]===false?true:false;render();}
function togglePhase(key,cur){phaseOpen[key]=!cur;render();}
function armLand(){if(landStep===0){landStep=1;}else{landStep=0;/* prototype: the merge/PR chain would run here */}render();}
function cancelLand(){landStep=0;render();}
function expandTerm(){termTall.v=!termTall.v;document.documentElement.style.setProperty('--r-term',termTall.v?'44vh':'170px');render();}
Object.assign(window,{pick,toggleArt,openArtifact,toggleMsg,toggleView,toggleDetail,toggleProj,expandTerm,
  selectSession,setRibbonNode,setDetailTab,setChangesView,openReview,advanceFinding,addressAll,reReview,gotoDiff,
  openConsole,setChannel,closeChannel,openCheck,armLand,cancelLand,revokeGate,toggleRun,togglePhase});

function wireSplitters(){
  document.querySelectorAll('[data-split]').forEach(el=>{
    el.addEventListener('pointerdown',e=>{
      e.preventDefault();el.setPointerCapture(e.pointerId);el.classList.add('dragging');
      const kind=el.dataset.split,sx=e.clientX,sy=e.clientY,root=document.documentElement.style,cs=getComputedStyle(document.documentElement);
      const sRail=parseInt(cs.getPropertyValue('--c-rail'))||248,sTerm=parseInt(cs.getPropertyValue('--r-term'))||170;
      const actEl=document.querySelector('.region.activity'),workEl=document.querySelector('.work');
      const sAct=actEl?actEl.getBoundingClientRect().width:640;
      const move=ev=>{
        if(kind==='rail')root.setProperty('--c-rail',Math.max(190,Math.min(360,sRail+(ev.clientX-sx)))+'px');
        if(kind==='detail'){const workW=workEl?workEl.getBoundingClientRect().width:innerWidth;
          root.setProperty('--c-act',Math.max(360,Math.min(workW-306,sAct+(ev.clientX-sx)))+'px');}
        if(kind==='term')root.setProperty('--r-term',Math.max(92,Math.min(innerHeight*0.6,sTerm-(ev.clientY-sy)))+'px');
      };
      const up=()=>{el.classList.remove('dragging');removeEventListener('pointermove',move);removeEventListener('pointerup',up);};
      addEventListener('pointermove',move);addEventListener('pointerup',up);
    });
  });
}
const starC=document.getElementById('stars');
function drawStars(){const dpr=Math.min(2,devicePixelRatio||1);starC.width=innerWidth*dpr;starC.height=innerHeight*dpr;
  const c=starC.getContext('2d');c.scale(dpr,dpr);c.clearRect(0,0,innerWidth,innerHeight);
  for(let i=0;i<90;i++){const x=Math.random()*innerWidth,y=Math.random()*innerHeight*0.7,r=Math.random()*1.1;
    c.globalAlpha=0.15+Math.random()*0.5;c.fillStyle='#cbc5bb'/* component-local: canvas star ink (decorative; canvas can't read CSS vars) */;c.beginPath();c.arc(x,y,r,0,7);c.fill();}c.globalAlpha=1;}
const ORB=['idle','listening','thinking','speaking'];let orbState=0;
function cycleOrb(){orbState=(orbState+1)%ORB.length;document.getElementById('orbstate').textContent=ORB[orbState];
  document.getElementById('halo').classList.toggle('warm',orbState>0);drawOrb();}
window.cycleOrb=cycleOrb;
function drawOrb(){const cv=document.getElementById('orb');if(!cv)return;const c=cv.getContext('2d'),cx=26,cy=26,R=13,warm=orbState>0;
  /* component-local: concierge-orb canvas palette (decorative singleton, not tokenized) */
  const rim=warm?'rgba(242,180,120,0.95)':'rgba(210,224,255,0.95)',glow=warm?'rgba(242,140,77,':'rgba(84,104,234,';
  c.clearRect(0,0,52,52);const g=c.createRadialGradient(cx,cy,R*0.7,cx,cy,R*2);g.addColorStop(0,glow+'0.5)');g.addColorStop(1,glow+'0)');
  c.fillStyle=g;c.beginPath();c.arc(cx,cy,R*2,0,7);c.fill();c.beginPath();c.arc(cx,cy,R,0,7);c.fillStyle='#0a0806';c.fill();
  c.lineWidth=1.4;c.strokeStyle=rim;c.beginPath();c.arc(cx,cy,R,0,7);c.stroke();}
addEventListener('resize',()=>{drawStars();drawOrb();});
document.getElementById('hint').textContent='cockpit · story|work split · Background Tasks roster (R15, phase-grouped Runs) · ribbon = work-pane header · console channels for raw I/O · matrix S0–S11 + R1–R15 in the rail (spec: cockpit-matrix.md). One primary control, in the head node’s drawer.';
/* demo deep-links: #s=N preselects a rail session; &ch=<tool-id> opens its
   console channel; &tab=review|artifacts picks the work-pane tab */
const hp=location.hash.match(/s=(\d+)/); if(hp) selIdx=Math.min(SESSIONS.length-1,+hp[1]);
const ht=location.hash.match(/tab=(\w+)/); if(ht&&['changes','review','artifacts'].includes(ht[1])) detailTab=ht[1];
seedChannels();
const hc=location.hash.match(/ch=([\w-]+)/); if(hc&&findTool(hc[1])){const t=findTool(hc[1]);sel=t.id;channels=[chanOf(t)];activeChannel=t.id;}
render();drawStars();
</script>
