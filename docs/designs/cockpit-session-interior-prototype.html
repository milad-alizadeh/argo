<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440, initial-scale=1" />
<title>Argo — Session interior (prototype)</title>
<!--
  THROWAWAY PROTOTYPE for wayfinder #161 "Session interior".
  Settled-surface prototype (map #157 rule): ONE shell, the floating bar toggles
  STATES/SURFACES, never rival looks. CSS lifted from cockpit-sessions-room-prototype.html
  (#159) — locked Penumbra language; content = the #161 grill decisions.
  Structurally real / visually approximate. Do NOT settle tokens here (Phase 2).
  Scenes (?state= + ←/→): activity · delivery · preview · dock · idle · external · archived
-->
<style>
  :root{
    --base:#0A0B0D; --ink:#E7E3DA; --ink-dim:#9A968C; --ink-faint:#615E58; --ink-ghost:#3C3A36;
    --accent:#C8A968; --accent-deep:#8A7038; --run:#6FA890; --need:#C8A968; --block:#B5675E; --done:#5B6673;
    --warm:200,169,104;
    --mono:"SF Mono",ui-monospace,"JetBrains Mono",Menlo,monospace;
    --sans:"Inter","Helvetica Neue",-apple-system,system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#050506;color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  body{display:flex;justify-content:center;align-items:flex-start}
  .label{font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);font-weight:500}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}

  #room{position:relative;width:1440px;height:900px;overflow:hidden;
    background:
      radial-gradient(1150px 1000px at 1120px 440px, rgba(var(--warm),0.13), rgba(var(--warm),0.04) 32%, transparent 60%),
      radial-gradient(1400px 1000px at 860px 460px, rgba(var(--warm),0.045), transparent 55%),
      radial-gradient(900px 900px at 300px 780px, rgba(30,34,44,0.4), transparent 60%),
      radial-gradient(1600px 1200px at 720px 40px, #101218, transparent 70%),
      linear-gradient(160deg,#0B0C0F,#08090B 60%,#070709);}
  #room::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:1;
    background:
      radial-gradient(1150px 950px at 1120px 440px, transparent 46%, rgba(0,0,0,0.32) 100%),
      linear-gradient(to bottom, rgba(0,0,0,0.22), transparent 12%, transparent 82%, rgba(0,0,0,0.4));
    mix-blend-mode:multiply;}

  /* ===== BROW ===== */
  #brow{position:absolute;top:26px;left:34px;right:34px;display:flex;align-items:center;justify-content:space-between;z-index:6}
  #mark{display:flex;align-items:baseline;gap:12px}
  #mark .glyph{font-weight:200;font-size:20px;letter-spacing:.34em;color:var(--ink);text-shadow:0 0 22px rgba(var(--warm),0.26)}
  #mark .proj{font-size:9.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-dim)}
  #rooms{display:flex;gap:2px;padding:3px;border-radius:11px;background:rgba(10,11,14,0.5);box-shadow:inset 0 1px 0 rgba(255,246,228,0.04)}
  #rooms .rm{display:flex;align-items:center;gap:9px;padding:7px 15px;border-radius:8px;font-size:11.5px;color:var(--ink-dim);cursor:pointer}
  #rooms .rm .k{font-family:var(--mono);font-size:9px;color:var(--ink-faint)}
  #rooms .rm.on{color:#F1ECE1;background:linear-gradient(180deg, rgba(46,44,40,0.65), rgba(24,22,20,0.65));box-shadow:inset 0 1px 0 rgba(255,246,228,0.1)}
  #rooms .rm.on .k{color:var(--accent)}

  /* ===== ROSTER RAIL ===== */
  #rail{position:absolute;top:82px;left:34px;width:264px;bottom:70px;z-index:5;display:flex;flex-direction:column;gap:12px}
  #rail>.label{margin:6px 0 1px 4px}
  .plane{position:relative;border-radius:14px;padding:13px 15px;overflow:hidden;cursor:pointer;
    backdrop-filter:blur(9px) saturate(1.05);
    background:linear-gradient(180deg, rgba(30,32,38,0.42), rgba(16,17,21,0.5));
    box-shadow:inset 0 1px 0 rgba(255,246,228,0.05), inset 0 22px 40px -30px rgba(var(--warm),0.14), 0 20px 34px -22px rgba(0,0,0,0.7);}
  .plane::before{content:"";position:absolute;left:-16%;right:-16%;top:-40%;height:120%;z-index:-1;background:radial-gradient(60% 70% at 50% 34%, rgba(var(--warm),0.10), transparent 70%);filter:blur(20px);opacity:.5}
  .plane .top{display:flex;align-items:center;gap:9px}
  .plane .name{flex:1;font-size:13.5px;font-weight:400;color:var(--ink);letter-spacing:.005em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .plane .word{font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);white-space:nowrap;flex:none}
  .plane .word.attn{color:var(--accent);text-shadow:0 0 10px rgba(var(--warm),0.4)}
  .plane .meta{padding-left:15px}
  .plane .meta{margin-top:8px;font-size:10px;color:var(--ink-dim);font-family:var(--mono)}
  .plane .branch{color:var(--ink-faint)}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);white-space:nowrap;flex:none}
  .chip.attn{color:var(--accent);text-shadow:0 0 10px rgba(var(--warm),0.4)}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--done);flex:none}
  .dot.run{background:var(--run);box-shadow:0 0 10px 1px rgba(111,168,144,0.6)}
  .dot.need{background:var(--need);box-shadow:0 0 12px 2px rgba(200,169,104,0.7)}
  .dot.block{background:var(--block);box-shadow:0 0 10px 1px rgba(181,103,94,0.55)}
  .dot.idle{background:var(--ink-faint)} .dot.ext{background:transparent;border:1px solid var(--ink-ghost)}
  .plane.active{background:linear-gradient(180deg, rgba(46,44,40,0.6), rgba(24,22,20,0.6));
    box-shadow:inset 0 1px 0 rgba(255,246,228,0.12), inset 0 26px 46px -30px rgba(var(--warm),0.30), 0 30px 50px -20px rgba(0,0,0,0.78), 0 0 46px -6px rgba(var(--warm),0.14)}
  .plane.active::before{opacity:.95;background:radial-gradient(60% 70% at 40% 30%, rgba(var(--warm),0.20), transparent 72%)}
  .plane.active .name{color:#F1ECE1;text-shadow:0 0 20px rgba(var(--warm),0.25)}
  .plane.recede{opacity:.7} .plane.ext .name{color:var(--ink-dim)}
  .ctxline{margin-top:11px;display:flex;align-items:center;gap:9px}
  .ctxline .num{font-family:var(--mono);font-size:9.5px;color:var(--accent)}
  #arch{margin-top:auto;display:flex;align-items:center;gap:9px;padding:12px 15px;border-radius:12px;cursor:pointer;color:var(--ink-dim);font-size:12px}
  #arch:hover{background:rgba(255,255,255,0.03)}
  #arch.on{background:linear-gradient(180deg, rgba(46,44,40,0.55), rgba(24,22,20,0.5));box-shadow:inset 0 1px 0 rgba(255,246,228,0.09);color:var(--ink)}
  #arch .cnt{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--ink-faint)}

  /* ===== SESSION CARD (one continuous glass) ===== */
  #card{position:absolute;top:82px;left:322px;right:34px;bottom:70px;z-index:4;display:flex;flex-direction:column;
    border-radius:20px;overflow:hidden;backdrop-filter:blur(14px) saturate(1.04);
    background:linear-gradient(180deg, rgba(28,29,35,0.5), rgba(15,16,20,0.56));
    box-shadow:inset 0 1px 0 rgba(255,246,228,0.08), inset 0 30px 60px -44px rgba(var(--warm),0.22), 0 34px 60px -30px rgba(0,0,0,0.72);}
  #card::before{content:"";position:absolute;left:20%;right:-14%;top:-24%;height:90%;z-index:0;pointer-events:none;background:radial-gradient(52% 58% at 74% 26%, rgba(var(--warm),0.12), transparent 70%);filter:blur(30px);opacity:.7}
  #card>*{position:relative;z-index:1}

  /* head — TITLE above, META below (reference idiom) */
  #chead{padding:20px 24px 15px;display:flex;align-items:flex-start;justify-content:space-between;gap:18px}
  #chead .title{font-weight:200;font-size:26px;letter-spacing:.01em;color:#F2EDE2;text-shadow:0 0 26px rgba(var(--warm),0.22);line-height:1.15}
  #chead .title .caret{display:inline-block;width:9px;height:22px;background:var(--run);vertical-align:-3px;margin-left:6px;box-shadow:0 0 10px rgba(111,168,144,0.6);animation:blink 1.1s step-end infinite}
  #chead .subrow{margin-top:11px;display:flex;gap:12px;align-items:center;font-family:var(--mono);font-size:10.5px;color:var(--ink-dim);flex-wrap:wrap}
  #chead .subrow .b{color:var(--ink-ghost)}
  #chead .subrow .stat{font-size:10px;letter-spacing:.16em;text-transform:uppercase;display:inline-flex;align-items:center;gap:7px}
  #chead .subrow .stat.run{color:var(--run)} #chead .subrow .stat.idle{color:var(--ink-faint)} #chead .subrow .stat.ext{color:var(--ink-faint)}
  #chead .subrow .mode{color:var(--ink)} #chead .subrow .mode.code{color:var(--run)} #chead .subrow .mode.plan{color:var(--accent)}
  #chead .subrow .intent{color:var(--ink);cursor:pointer} #chead .subrow .intent .n{color:var(--accent)} #chead .subrow .intent:hover{text-decoration:underline}
  #chead .subrow .link{color:var(--accent);cursor:pointer;opacity:.85}
  #chead .subrow .dirty{color:var(--accent)}
  #chead .right{display:flex;align-items:flex-start;gap:16px;flex:none}
  #chead .ctxarc{display:flex;flex-direction:column;align-items:center}
  #chead .acts{display:flex;gap:7px;padding-top:6px}
  #chead .acts .act{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;color:var(--ink-dim);padding:7px 11px;border-radius:9px;background:rgba(255,255,255,0.03);cursor:pointer;white-space:nowrap}
  #chead .acts .act:hover{color:var(--ink);background:rgba(255,255,255,0.06)}
  #chead .acts .act.stop:hover{color:var(--block)}

  /* tabs */
  #tabs{display:flex;gap:4px;padding:0 22px;margin-bottom:4px}
  .tab{display:flex;align-items:center;gap:8px;padding:9px 16px 11px;border-radius:10px 10px 0 0;font-size:12px;color:var(--ink-dim);cursor:pointer;position:relative}
  .tab.on{color:#F1ECE1}
  .tab.on::after{content:"";position:absolute;left:14px;right:14px;bottom:0;height:2px;border-radius:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);box-shadow:0 0 8px rgba(var(--warm),0.5)}
  .tab .cnt{font-family:var(--mono);font-size:9px;color:var(--accent)}
  #divider{height:1px;margin:0 20px;background:linear-gradient(90deg,transparent,rgba(255,246,228,0.09),transparent)}

  /* panel body */
  #panelwrap{flex:1;min-height:0;overflow:auto;padding:16px 0 4px}
  #panelwrap::-webkit-scrollbar{width:8px} #panelwrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:4px}
  .planline{display:flex;align-items:center;gap:12px;padding:9px 14px;border-radius:11px;margin:0 22px 16px;
    background:linear-gradient(180deg, rgba(30,32,38,0.4), rgba(16,17,21,0.44));box-shadow:inset 0 1px 0 rgba(255,246,228,0.05)}
  .planline .cur{flex:1;font-size:12.5px;color:var(--ink)}
  .planline .prog{font-family:var(--mono);font-size:10px;color:var(--accent)}

  /* two-column split — Agents | Checks */
  .actgrid{display:grid;grid-template-columns:1fr 1fr;gap:0}
  .cell{padding:2px 22px 14px}
  .cell + .cell{position:relative}
  .cell h4{margin-bottom:12px}
  .divmark{position:absolute;left:0;top:2px;bottom:10px;width:1px;background:linear-gradient(to bottom,transparent,rgba(255,246,228,0.09),transparent)}
  /* runtime tree */
  .agent{display:flex;align-items:center;gap:11px;padding:7px 0}
  .agent .body{flex:1} .agent .an{font-size:12.5px;color:var(--ink)} .agent .as{font-family:var(--mono);font-size:9.5px;color:var(--ink-faint);margin-top:2px}
  .group{font-family:var(--mono);font-size:9px;color:var(--ink-faint);letter-spacing:.1em;text-transform:uppercase;margin:4px 0 3px 21px}
  .subrows{margin:0 0 4px 21px;border-left:1px solid rgba(255,255,255,0.07);padding-left:14px;display:flex;flex-direction:column;gap:6px}
  .subrows .r{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:10.5px;color:var(--ink-dim)}
  .tick{width:5px;height:5px;border-radius:50%;background:var(--run);box-shadow:0 0 7px rgba(111,168,144,0.55);flex:none} .tick.pend{background:var(--ink-faint);box-shadow:none}
  .check{display:flex;align-items:center;gap:12px;padding:6px 0}
  .check .cn{flex:1;font-size:12px;color:var(--ink)} .check .cv{font-family:var(--mono);font-size:10px;color:var(--ink-dim)} .check .cv.warn{color:var(--accent)}

  /* Activity hybrid — now-head + folded Turn timeline */
  .planline2{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding:10px 14px;border-radius:11px;background:linear-gradient(180deg,rgba(30,32,38,0.4),rgba(16,17,21,0.44));box-shadow:inset 0 1px 0 rgba(255,246,228,0.05)}
  .planline2 .cur{flex:1;font-size:12.5px;color:var(--ink)}
  .planline2 .prog{font-family:var(--mono);font-size:10px;color:var(--accent);cursor:pointer} .planline2 .prog .cx{color:var(--ink-faint)}
  .blueprint{display:flex;align-items:center;gap:10px;margin-top:9px;padding-left:4px;font-family:var(--mono);font-size:10px;color:var(--ink-dim)}
  .blueprint .bp{display:inline-flex;align-items:center;gap:6px}
  .tl{padding:2px 22px 0} .tl-lab{margin-bottom:9px;display:flex;align-items:center;gap:10px} .tl-lab .rev{font-family:var(--mono);font-size:9px;color:var(--ink-ghost)}
  .turn{border-radius:11px;margin-bottom:7px;overflow:hidden}
  .turn.past{background:rgba(255,255,255,0.02);cursor:pointer;display:flex;align-items:center;gap:11px;padding:11px 14px}
  .turn.past:hover{background:rgba(255,255,255,0.04)}
  .turn.past .fold{color:var(--ink-ghost);font-size:10px} .turn.past .tp{color:var(--ink-dim);font-size:12px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis} .turn.past .st{font-family:var(--mono);font-size:10px;color:var(--ink-ghost)}
  .turn.open{background:linear-gradient(180deg,rgba(30,32,38,0.34),rgba(16,17,21,0.4));box-shadow:inset 0 1px 0 rgba(255,246,228,0.05)}
  .turn.open .th{display:flex;align-items:center;gap:10px;padding:11px 14px 8px;font-size:12px;color:var(--ink)} .turn.open .th .fold{color:var(--accent);font-size:10px} .turn.open .th .run{font-family:var(--mono);font-size:9px;color:var(--run);letter-spacing:.14em;text-transform:uppercase;margin-left:auto}
  .step{padding:5px 14px 5px 32px;position:relative} .step .sx{position:absolute;left:15px;top:7px;width:12px;text-align:center;font-family:var(--mono);font-size:10px} .step .sh{display:flex;align-items:center;gap:9px;font-size:12px}
  .step.done .sx{color:var(--done)} .step.done .sh{color:var(--ink-dim)} .step.cur .sx{color:var(--run)} .step.cur .sh{color:var(--ink)} .step.pending .sx{color:var(--ink-ghost)} .step.pending .sh{color:var(--ink-faint)}
  .step .coal{font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin-left:auto}
  .events{margin:6px 0 6px 4px;border-left:1px solid rgba(255,255,255,0.07);padding-left:14px;display:flex;flex-direction:column;gap:6px}
  .ev{display:flex;align-items:baseline;gap:10px;font-family:var(--mono);font-size:10.5px} .ev .k{width:36px;flex:none;font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-ghost)}
  .ev.mut{color:var(--ink)} .ev.mut .k{color:var(--run)} .ev.read{color:var(--ink-faint)} .ev.grp{color:var(--ink-dim);cursor:pointer} .ev.grp .k{color:var(--accent)}
  .compaction{display:flex;align-items:center;gap:12px;margin:12px 4px;font-family:var(--mono);font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-ghost)} .compaction::before,.compaction::after{content:"";flex:1;height:1px;background:rgba(255,255,255,0.05)}
  /* Activity two-column: Timeline | pinned rail (Subagents · Outcomes) */
  .acol{display:grid;grid-template-columns:1.55fr 1fr;gap:0}
  .tlmain{padding:2px 6px 0 22px;min-width:0}
  .arail{border-left:1px solid rgba(255,246,228,0.06);padding:2px 20px 0;position:sticky;top:0;align-self:start}
  .railsec{margin-bottom:22px} .railsec h4{margin-bottom:11px;display:flex;align-items:center;gap:8px} .railsec h4 .cnt{margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--run);letter-spacing:.05em;text-transform:none}
  .sagroup{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin:2px 0 7px}
  .sa{display:flex;align-items:center;gap:9px;padding:5px 0;font-size:12px;color:var(--ink-dim)} .sa .sast{margin-left:auto;font-family:var(--mono);font-size:9.5px;color:var(--ink-faint)}
  .arail .oc{padding:8px 0;gap:10px;align-items:flex-start} .arail .oc .kind{display:none} .arail .oc:hover{background:transparent} .arail .oc .ot{font-size:12px} .arail .oc .go{align-self:center}

  /* Outcomes — unified, typed rows (kept from the new prototype) */
  .outcomes{padding:14px 22px 4px;margin-top:6px;border-top:1px solid rgba(255,246,228,0.05)}
  .outcomes h4{margin-bottom:11px}
  .oc{display:flex;align-items:center;gap:13px;padding:9px 11px;border-radius:11px;margin-bottom:5px;cursor:pointer}
  .oc:hover{background:rgba(255,255,255,0.03)}
  .oc .ico{width:24px;height:24px;border-radius:7px;flex:none;display:flex;align-items:center;justify-content:center;font-size:12px}
  .oc .ico.code{background:rgba(111,168,144,0.14);color:var(--run)}
  .oc .ico.ticket{background:rgba(200,169,104,0.14);color:var(--accent)}
  .oc .ico.artifact{background:rgba(120,130,150,0.16);color:#AEB4C0}
  .oc .kind{font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);width:56px;flex:none}
  .oc .ob{flex:1} .oc .ot{font-size:12.5px;color:var(--ink)} .oc .os{font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin-top:2px}
  .oc .go{font-family:var(--mono);font-size:10px;color:var(--ink-dim)}

  /* delivery arc foot glance */
  #lifecycle{padding:8px 24px 14px;margin-top:6px;border-top:1px solid rgba(255,246,228,0.05)}
  #lcarc{position:relative;height:64px;margin-top:10px}
  .snode{position:absolute;top:0;display:flex;flex-direction:column;align-items:center;gap:8px;transform:translateX(-50%)}
  .snode .nlab{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint)}
  .snode.done .nlab,.snode.cur .nlab{color:var(--ink-dim)}
  .snode .nd{width:9px;height:9px;border-radius:50%;background:#26282e;box-shadow:inset 0 1px 0 rgba(255,255,255,0.06)}
  .snode.done .nd{background:var(--accent);box-shadow:0 0 12px 2px rgba(var(--warm),0.55)}
  .snode.cur .nd{background:var(--run);box-shadow:0 0 14px 3px rgba(111,168,144,0.6)}
  .snode .nsub{font-family:var(--mono);font-size:9px;color:var(--ink-faint)}
  .seam{margin:14px 24px 4px;padding:12px 14px;border-radius:10px;border:1px dashed rgba(255,255,255,0.08);color:var(--ink-faint);font-size:11px;font-family:var(--mono);line-height:1.5}
  .seam b{color:var(--ink-dim);font-weight:400}

  /* preview */
  .pv{padding:16px 24px;height:100%;display:flex;flex-direction:column}
  .pvchip{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;color:var(--ink-dim);margin-bottom:14px}
  .pvchip .d{width:6px;height:6px;border-radius:50%;background:var(--run);box-shadow:0 0 8px rgba(111,168,144,0.6)}
  .pvframe{flex:1;border-radius:14px;background:repeating-linear-gradient(135deg,rgba(255,255,255,0.015) 0 12px,transparent 12px 24px),rgba(0,0,0,0.25);box-shadow:inset 0 1px 0 rgba(255,246,228,0.06);display:flex;align-items:center;justify-content:center;color:var(--ink-faint);font-size:12px}

  /* transcript (external) */
  .banner{display:flex;align-items:center;gap:10px;margin:0 22px 16px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.03);font-size:11.5px;color:var(--ink-dim)}
  .banner .d{width:7px;height:7px;border-radius:50%;border:1.5px solid var(--ink-ghost);flex:none}
  .tr{padding:0 24px;font-family:var(--mono);font-size:11px;line-height:1.75;color:#9C978B}
  .tr .u{color:var(--accent)} .tr .a{color:var(--ink)} .tr .dm{color:var(--ink-faint)}

  /* ===== TERMINAL DOCK ===== */
  #dock{margin:8px 4px 4px;border-radius:14px;overflow:hidden;flex:none;position:relative;
    backdrop-filter:blur(10px) saturate(0.95);
    background:linear-gradient(180deg, rgba(10,11,14,0.74), rgba(6,7,9,0.84));
    box-shadow:inset 0 1px 0 rgba(255,246,228,0.055), inset 0 20px 50px -40px rgba(var(--warm),0.16);

function paint(){
  const s=SCENES[cur];
  document.getElementById('rows').innerHTML=railHTML(s.sel);
  document.getElementById('arch').className=cur==='archived'?'on':'';
  document.getElementById('card').innerHTML=s.render();
  const i=ORDER.indexOf(cur);
  document.getElementById('swk').textContent=`${i+1}/${ORDER.length}`;
  document.getElementById('swn').textContent=NAMES[cur];
  document.getElementById('swd').textContent=s.d;
  document.getElementById('capk').textContent=NAMES[cur];
  document.getElementById('capd').textContent=s.d;
  const u=new URL(location);u.searchParams.set('state',cur);history.replaceState({},'',u);
}
function cycle(d){const i=ORDER.indexOf(cur);cur=ORDER[(i+d+ORDER.length)%ORDER.length];paint();}
function selectRow(i){cur=i===3?'external':i===1?'idle':'activity';paint();}
function setTab(t){cur=t==='delivery'?'delivery':t==='preview'?'preview':'activity';paint();}
function toggleDock(){cur=cur==='dock'?'activity':'dock';paint();}
document.getElementById('arch').addEventListener('click',()=>{cur='archived';paint();});
addEventListener('keydown',e=>{if(['INPUT','TEXTAREA'].includes(document.activeElement.tagName))return;if(e.key==='ArrowLeft')cycle(-1);if(e.key==='ArrowRight')cycle(1);});
const init=new URL(location).searchParams.get('state');if(init&&SCENES[init])cur=init;
paint();
</script>
</body>
</html>
