<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440, initial-scale=1" />
<title>Argo — Session interior (prototype)</title>
<!--
  THROWAWAY PROTOTYPE for wayfinder #157 / #186 — the session interior (Sessions room).
  Reconciled to the settled model (2 tabs, Hybrid Delivery) then decluttered to the
  master–detail direction chosen by the user. Decisions: docs/designs/cockpit-session-interior-decisions.md
  (C2.2, C3a.1, C3b.2, C3b.5–C3b.7). Absorbs the delivery-review + fresh-session studies.

  Delivery uses the SAME master–detail two-pane layout as Activity: LIST ON THE LEFT
  (pure navigation) · DETAIL ON THE RIGHT (GitHub-style review). The sub-tab selects
  WHAT THE LEFT LIST CONTAINS; the right pane shows the selected item's detail.

  Model:
    · Every master/detail surface uses GitHub "Files changed" continuous-scroll: the left list
      is a pure navigation TOC; the right pane is ONE scrollable feed with all items concatenated
      (each with its own title header + diff). Scroll-spy (IntersectionObserver over section
      headers) moves the .sel highlight; a TOC click smooth-scroll-jumps to its section.
    · Overview     → left = the walkthrough (narrated change rows) · feed = each change's what/why + diff.
    · Code Review  → left = findings (severity-ranked) + collapsed "✓ N fixed" reconcile
                     group at the foot · feed = each finding's anchored evidence + Apply/Dismiss.
    · Files        → left = file list · feed = each file's gutter diff, inline findings anchored,
                     Viewed per file, artifact diff|rendered lens.
    · Activity     → left = subagents + this turn's steps · feed = each item's detail concatenated.
    · ONE control line (Change A/B): [Overview · Code Review · Files tabs] + [CI pipeline rail
      commits·pr·ci·review·merge, current node live] + [single primary CTA]. No trailing status
      string — "CI running"/"review pending" are implied by the live/wait rail nodes; "1 blocking"
      → red badge on the Code Review tab; "11 files" → the Files tab count. #418 + diffstat drop
      off this line. Collapse = header · control-line · two-pane · dock.
    · The "Also in this session · N more" glance banner is REMOVED. A finding's full text lives
      only in Code Review / its feed section; Overview & Files rows carry only the small ● marker.
    · pre-PR ↔ PR-open kept via rail + primary-CTA reshape.

  Locked Penumbra language (#158) — no recolor. Structurally real / visually approximate.
  States (?state= + ←/→):
    zero · fresh · activity · idle · delivery · delivery-review · delivery-files ·
    delivery-prepr · dock · external · archived
-->
<style>
  :root{
    --base:#0A0B0D; --ink:#E7E3DA; --ink-dim:#9A968C; --ink-faint:#615E58; --ink-ghost:#3C3A36;
    --accent:#C8A968; --accent-deep:#8A7038; --run:#6FA890; --need:#C8A968; --block:#B5675E; --done:#5B6673;
    --warm:200,169,104;
    /* delivery-review (E Hybrid) tokens, folded in from the lifted surface */
    --panel:#101216; --panel-2:#14171C; --inset:#0C0E11; --line:#20242B; --line-2:#292E36;
    --accent-soft:rgba(200,169,104,.14); --add:#5C8A6B; --del:#B5675E;
    --mono:"SF Mono",ui-monospace,"JetBrains Mono",Menlo,monospace;
    --sans:"Inter","Helvetica Neue",-apple-system,system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#050506;color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  body{display:flex;justify-content:center;align-items:flex-start}
  .label{font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);font-weight:500}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}

  #room{position:relative;width:1440px;height:900px;overflow:hidden;
    background:
      radial-gradient(1150px 1000px at 1120px 440px, rgba(var(--warm),0.13), rgba(var(--warm),0.04) 32%, transparent 60%),
      radial-gradient(1400px 1000px at 860px 460px, rgba(var(--warm),0.045), transparent 55%),
      radial-gradient(900px 900px at 300px 780px, rgba(30,34,44,0.4), transparent 60%),
      radial-gradient(1600px 1200px at 720px 40px, #101218, transparent 70%),
      linear-gradient(160deg,#0B0C0F,#08090B 60%,#070709);}
  #room::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:1;
    background:
      radial-gradient(1150px 950px at 1120px 440px, transparent 46%, rgba(0,0,0,0.32) 100%),
      linear-gradient(to bottom, rgba(0,0,0,0.22), transparent 12%, transparent 82%, rgba(0,0,0,0.4));
    mix-blend-mode:multiply;}

  /* ===== BROW ===== */
  #brow{position:absolute;top:26px;left:34px;right:34px;display:flex;align-items:center;justify-content:space-between;z-index:6}
  #mark{display:flex;align-items:baseline;gap:12px}
  #mark .glyph{font-weight:200;font-size:20px;letter-spacing:.34em;color:var(--ink);text-shadow:0 0 22px rgba(var(--warm),0.26)}
  #mark .proj{font-size:9.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-dim)}
  #rooms{display:flex;gap:2px;padding:3px;border-radius:11px;background:rgba(10,11,14,0.5);box-shadow:inset 0 1px 0 rgba(255,246,228,0.04)}
  #rooms .rm{display:flex;align-items:center;gap:9px;padding:7px 15px;border-radius:8px;font-size:11.5px;color:var(--ink-dim);cursor:pointer}
  #rooms .rm .k{font-family:var(--mono);font-size:9px;color:var(--ink-faint)}
  #rooms .rm.on{color:#F1ECE1;background:linear-gradient(180deg, rgba(46,44,40,0.65), rgba(24,22,20,0.65));box-shadow:inset 0 1px 0 rgba(255,246,228,0.1)}
  #rooms .rm.on .k{color:var(--accent)}

  /* ===== ROSTER RAIL ===== */
  #rail{position:absolute;top:82px;left:34px;width:264px;bottom:70px;z-index:5;display:flex;flex-direction:column;gap:12px}
  #rail>.label{margin:6px 0 1px 4px}
  .plane{position:relative;border-radius:14px;padding:13px 15px;overflow:hidden;cursor:pointer;
    backdrop-filter:blur(9px) saturate(1.05);
    background:linear-gradient(180deg, rgba(30,32,38,0.42), rgba(16,17,21,0.5));
    box-shadow:inset 0 1px 0 rgba(255,246,228,0.05), inset 0 22px 40px -30px rgba(var(--warm),0.14), 0 20px 34px -22px rgba(0,0,0,0.7);}
  .plane::before{content:"";position:absolute;left:-16%;right:-16%;top:-40%;height:120%;z-index:-1;background:radial-gradient(60% 70% at 50% 34%, rgba(var(--warm),0.10), transparent 70%);filter:blur(20px);opacity:.5}
  .plane .top{display:flex;align-items:center;gap:9px}
  .plane .name{flex:1;font-size:13.5px;font-weight:400;color:var(--ink);letter-spacing:.005em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .plane .word{font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);white-space:nowrap;flex:none}
  .plane .word.attn{color:var(--accent);text-shadow:0 0 10px rgba(var(--warm),0.4)}
  .plane .meta{padding-left:15px}
  .plane .meta{margin-top:8px;font-size:10px;color:var(--ink-dim);font-family:var(--mono)}
  .plane .branch{color:var(--ink-faint)}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);white-space:nowrap;flex:none}
  .chip.attn{color:var(--accent);text-shadow:0 0 10px rgba(var(--warm),0.4)}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--done);flex:none}
  .dot.run{background:var(--run);box-shadow:0 0 10px 1px rgba(111,168,144,0.6)}
  .dot.need{background:var(--need);box-shadow:0 0 12px 2px rgba(200,169,104,0.7)}
  .dot.block{background:var(--block);box-shadow:0 0 10px 1px rgba(181,103,94,0.55)}
  .dot.idle{background:var(--ink-faint)} .dot.ext{background:transparent;border:1px solid var(--ink-ghost)}
  .plane.active{background:linear-gradient(180deg, rgba(46,44,40,0.6), rgba(24,22,20,0.6));
    box-shadow:inset 0 1px 0 rgba(255,246,228,0.12), inset 0 26px 46px -30px rgba(var(--warm),0.30), 0 30px 50px -20px rgba(0,0,0,0.78), 0 0 46px -6px rgba(var(--warm),0.14)}
  .plane.active::before{opacity:.95;background:radial-gradient(60% 70% at 40% 30%, rgba(var(--warm),0.20), transparent 72%)}
  .plane.active .name{color:#F1ECE1;text-shadow:0 0 20px rgba(var(--warm),0.25)}
  .plane.recede{opacity:.7} .plane.ext .name{color:var(--ink-dim)}
  .ctxline{margin-top:11px;display:flex;align-items:center;gap:9px}
  .ctxline .num{font-family:var(--mono);font-size:9.5px;color:var(--accent)}
  #newses{display:flex;align-items:center;gap:9px;padding:12px 15px;border-radius:12px;cursor:pointer;color:var(--ink-dim);font-size:12px}
  #newses:hover{background:rgba(255,255,255,0.03);color:var(--ink)}
  #newses .plus{font-size:15px;font-weight:200;color:var(--ink-faint);line-height:0}
  #newses .k{margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--ink-ghost)}
  #arch{margin-top:auto;display:flex;align-items:center;gap:9px;padding:12px 15px;border-radius:12px;cursor:pointer;color:var(--ink-dim);font-size:12px}
  #arch:hover{background:rgba(255,255,255,0.03)}
  #arch.on{background:linear-gradient(180deg, rgba(46,44,40,0.55), rgba(24,22,20,0.5));box-shadow:inset 0 1px 0 rgba(255,246,228,0.09);color:var(--ink)}
  #arch .cnt{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--ink-faint)}

  /* ===== SESSION CARD (one continuous glass) ===== */
  #card{position:absolute;top:82px;left:322px;right:34px;bottom:70px;z-index:4;display:flex;flex-direction:column;
    border-radius:20px;overflow:hidden;backdrop-filter:blur(14px) saturate(1.04);
    background:linear-gradient(180deg, rgba(28,29,35,0.5), rgba(15,16,20,0.56));
    box-shadow:inset 0 1px 0 rgba(255,246,228,0.08), inset 0 30px 60px -44px rgba(var(--warm),0.22), 0 34px 60px -30px rgba(0,0,0,0.72);}
  #card::before{content:"";position:absolute;left:20%;right:-14%;top:-24%;height:90%;z-index:0;pointer-events:none;background:radial-gradient(52% 58% at 74% 26%, rgba(var(--warm),0.12), transparent 70%);filter:blur(30px);opacity:.7}
  #card>*{position:relative;z-index:1}

  /* ===== header — 3 takes on ONE band (?header=1..3), all driven by H_RUN/H_IDLE/H_EXT =====
     ONE skeleton: [large ctx ring] · [title / meta] ......... [Activity·Delivery·Outcomes tabs].
     The band ABSORBS the tab row — there is no separate #tabs strip below it.
     Every take sheds rail-carried facts (status word · model · branch NAME), keeps git ∆/↑,
     and degrades honestly: live dot only when running · idle drops ↑push · external drops the
     intent + renders the ring EMPTY / "unknown". NO action buttons / ⋯ menu. Takes vary only
     (a) ring-centre + stroke, (b) tab style (text vs pills), (c) meta one line vs two. */

  #chead{display:flex;align-items:center;gap:16px;box-shadow:inset 0 -1px 0 rgba(255,246,228,0.06)}
  #chead .hleft{flex:1;min-width:0;display:flex;align-items:center;gap:15px}
  #chead .htblk{min-width:0;display:flex;flex-direction:column;gap:4px}
  #chead .h-title{font-weight:200;color:#F2EDE2;text-shadow:0 0 26px rgba(var(--warm),0.22);letter-spacing:.01em;line-height:1.12;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #chead .h-live{width:6px;height:6px;border-radius:50%;background:var(--run);box-shadow:0 0 9px 1px rgba(111,168,144,0.6);flex:none}
  #chead .m-code{color:var(--run)} #chead .m-plan{color:var(--accent)} #chead .m-ask{color:var(--ink)} #chead .m-unk{color:var(--ink-faint)}
  #chead .mut{color:var(--accent)}
  #chead .h-b{color:var(--ink-ghost)}
  #chead .h-intent{color:var(--ink);cursor:pointer} #chead .h-intent .n{color:var(--accent)} #chead .h-intent:hover{text-decoration:underline}

  /* title-block meta line(s) */
  #chead .hmeta{font-family:var(--mono);font-size:10.5px;color:var(--ink-dim);font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  #chead .hmeta.two{flex-direction:column;align-items:flex-start;gap:3px}
  #chead .hmeta.two .mrow{display:flex;align-items:center;gap:7px}

  /* large ctx ring — arc = derived ctx, centre + stroke vary per take */
  #chead .hring{position:relative;flex:none}
  #chead .hring svg{display:block}
  #chead .hrc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;pointer-events:none}
  #chead .hrcm{font-family:var(--mono);font-variant-numeric:tabular-nums;color:#E7E3DA;font-weight:300;line-height:1;font-size:13px}
  #chead .hrcs{font-family:var(--mono);font-size:7px;letter-spacing:.03em;color:var(--ink-faint);line-height:1}
  #chead .hring.unk .hrcm{color:var(--ink-faint);font-size:15px}
  #chead .hglyph{color:var(--ink-faint);font-size:15px;line-height:1}

  /* tabs absorbed into the band, right-aligned + vertically centred */
  #chead .htabs{margin-left:auto;flex:none;display:flex;align-items:center;gap:2px;align-self:flex-end;margin-bottom:-4px}
  #chead .htab{display:flex;align-items:center;gap:7px;padding:8px 14px 9px;font-size:12px;color:var(--ink-dim);cursor:pointer;position:relative;border-radius:8px;white-space:nowrap}
  #chead .htab:hover{color:var(--ink)}
  #chead .htab .cnt{font-family:var(--mono);font-size:9px;color:var(--accent)}
  /* plain text tabs → underline indicator */
  #chead .htabs.plain .htab.on{color:#F1ECE1}
  #chead .htabs.plain .htab.on::after{content:"";position:absolute;left:12px;right:12px;bottom:1px;height:2px;border-radius:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);box-shadow:0 0 8px rgba(var(--warm),0.5)}
  /* segmented pill tabs */
  #chead .htabs.pills{gap:3px;padding:3px;border-radius:10px;background:rgba(10,11,14,0.5);box-shadow:inset 0 1px 0 rgba(255,246,228,0.04)}
  #chead .htabs.pills .htab{padding:6px 13px;border-radius:7px}
  #chead .htabs.pills .htab.on{color:#F1ECE1;background:linear-gradient(180deg,rgba(46,44,40,0.7),rgba(24,22,20,0.7));box-shadow:inset 0 1px 0 rgba(255,246,228,0.1)}

  /* per-take dials */
  #chead.t1{padding:8px 22px 8px 22px} #chead.t1 .h-title{font-size:19px}
  #chead.t2{padding:7px 22px} #chead.t2 .h-title{font-size:18px}
  #chead.t3{padding:6px 22px} #chead.t3 .h-title{font-size:20px}

  /* header-variant mini-switcher (distinct from the design, like #sw) */
  #hsw{position:fixed;bottom:66px;left:50%;transform:translateX(-50%);z-index:101;display:flex;align-items:center;gap:4px;
    background:rgba(18,18,22,0.94);border:1px solid rgba(255,255,255,0.1);border-radius:11px;padding:5px 8px;box-shadow:0 18px 50px -12px rgba(0,0,0,0.85);backdrop-filter:blur(12px)}
  #hsw .hlbl{font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);margin-right:4px}
  #hsw .hp{font-family:var(--mono);font-size:11px;color:var(--ink-dim);padding:5px 11px;border-radius:7px;cursor:pointer}
  #hsw .hp:hover{color:#fff;background:rgba(255,255,255,0.06)}
  #hsw .hp.on{color:#0A0B0D;background:var(--accent);font-weight:600}

  /* tabs */
  #tabs{display:flex;gap:4px;padding:0 22px;margin-bottom:4px}
  .tab{display:flex;align-items:center;gap:8px;padding:9px 16px 11px;border-radius:10px 10px 0 0;font-size:12px;color:var(--ink-dim);cursor:pointer;position:relative}
  .tab.on{color:#F1ECE1}
  .tab.on::after{content:"";position:absolute;left:14px;right:14px;bottom:0;height:2px;border-radius:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);box-shadow:0 0 8px rgba(var(--warm),0.5)}
  .tab .cnt{font-family:var(--mono);font-size:9px;color:var(--accent)}
  #divider{height:1px;margin:0 20px;background:linear-gradient(90deg,transparent,rgba(255,246,228,0.09),transparent)}

  /* panel body */
  #panelwrap{flex:1;min-height:0;overflow:auto;padding:16px 0 4px}
  #panelwrap::-webkit-scrollbar{width:8px} #panelwrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:4px}
  .planline{display:flex;align-items:center;gap:12px;padding:9px 14px;border-radius:11px;margin:0 22px 16px;
    background:linear-gradient(180deg, rgba(30,32,38,0.4), rgba(16,17,21,0.44));box-shadow:inset 0 1px 0 rgba(255,246,228,0.05)}
  .planline .cur{flex:1;font-size:12.5px;color:var(--ink)}
  .planline .prog{font-family:var(--mono);font-size:10px;color:var(--accent)}

  /* two-column split — Agents | Checks */
  .actgrid{display:grid;grid-template-columns:1fr 1fr;gap:0}
  .cell{padding:2px 22px 14px}
  .cell + .cell{position:relative}
  .cell h4{margin-bottom:12px}
  .divmark{position:absolute;left:0;top:2px;bottom:10px;width:1px;background:linear-gradient(to bottom,transparent,rgba(255,246,228,0.09),transparent)}
  /* runtime tree */
  .agent{display:flex;align-items:center;gap:11px;padding:7px 0}
  .agent .body{flex:1} .agent .an{font-size:12.5px;color:var(--ink)} .agent .as{font-family:var(--mono);font-size:9.5px;color:var(--ink-faint);margin-top:2px}
  .group{font-family:var(--mono);font-size:9px;color:var(--ink-faint);letter-spacing:.1em;text-transform:uppercase;margin:4px 0 3px 21px}
  .subrows{margin:0 0 4px 21px;border-left:1px solid rgba(255,255,255,0.07);padding-left:14px;display:flex;flex-direction:column;gap:6px}
  .subrows .r{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:10.5px;color:var(--ink-dim)}
  .tick{width:5px;height:5px;border-radius:50%;background:var(--run);box-shadow:0 0 7px rgba(111,168,144,0.55);flex:none} .tick.pend{background:var(--ink-faint);box-shadow:none}
  .check{display:flex;align-items:center;gap:12px;padding:6px 0}
  .check .cn{flex:1;font-size:12px;color:var(--ink)} .check .cv{font-family:var(--mono);font-size:10px;color:var(--ink-dim)} .check .cv.warn{color:var(--accent)}

  /* Activity hybrid — now-head + folded Turn timeline */
  .planline2{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding:10px 14px;border-radius:11px;background:linear-gradient(180deg,rgba(30,32,38,0.4),rgba(16,17,21,0.44));box-shadow:inset 0 1px 0 rgba(255,246,228,0.05)}
  .planline2 .cur{flex:1;font-size:12.5px;color:var(--ink)}
  .planline2 .prog{font-family:var(--mono);font-size:10px;color:var(--accent);cursor:pointer} .planline2 .prog .cx{color:var(--ink-faint)}
  .blueprint{display:flex;align-items:center;gap:10px;margin-top:9px;padding-left:4px;font-family:var(--mono);font-size:10px;color:var(--ink-dim)}
  .blueprint .bp{display:inline-flex;align-items:center;gap:6px}
  .tl{padding:2px 22px 0} .tl-lab{margin-bottom:9px;display:flex;align-items:center;gap:10px} .tl-lab .rev{font-family:var(--mono);font-size:9px;color:var(--ink-ghost)}
  .turn{border-radius:11px;margin-bottom:7px;overflow:hidden}
  .turn.past{background:rgba(255,255,255,0.02);cursor:pointer;display:flex;align-items:center;gap:11px;padding:11px 14px}
  .turn.past:hover{background:rgba(255,255,255,0.04)}
  .turn.past .fold{color:var(--ink-ghost);font-size:10px} .turn.past .tp{color:var(--ink-dim);font-size:12px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis} .turn.past .st{font-family:var(--mono);font-size:10px;color:var(--ink-ghost)}
  .turn.open{background:linear-gradient(180deg,rgba(30,32,38,0.34),rgba(16,17,21,0.4));box-shadow:inset 0 1px 0 rgba(255,246,228,0.05)}
  .turn.open .th{display:flex;align-items:center;gap:10px;padding:11px 14px 8px;font-size:12px;color:var(--ink)} .turn.open .th .fold{color:var(--accent);font-size:10px} .turn.open .th .run{font-family:var(--mono);font-size:9px;color:var(--run);letter-spacing:.14em;text-transform:uppercase;margin-left:auto}
  .step{padding:5px 14px 5px 32px;position:relative} .step .sx{position:absolute;left:15px;top:7px;width:12px;text-align:center;font-family:var(--mono);font-size:10px} .step .sh{display:flex;align-items:center;gap:9px;font-size:12px}
  .step.done .sx{color:var(--done)} .step.done .sh{color:var(--ink-dim)} .step.cur .sx{color:var(--run)} .step.cur .sh{color:var(--ink)} .step.pending .sx{color:var(--ink-ghost)} .step.pending .sh{color:var(--ink-faint)}
  .step .coal{font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin-left:auto}
  .events{margin:6px 0 6px 4px;border-left:1px solid rgba(255,255,255,0.07);padding-left:14px;display:flex;flex-direction:column;gap:6px}
  .ev{display:flex;align-items:baseline;gap:10px;font-family:var(--mono);font-size:10.5px} .ev .k{width:36px;flex:none;font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-ghost)}
  .ev.mut{color:var(--ink)} .ev.mut .k{color:var(--run)} .ev.read{color:var(--ink-faint)} .ev.grp{color:var(--ink-dim);cursor:pointer} .ev.grp .k{color:var(--accent)}
  .compaction{display:flex;align-items:center;gap:12px;margin:12px 4px;font-family:var(--mono);font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-ghost)} .compaction::before,.compaction::after{content:"";flex:1;height:1px;background:rgba(255,255,255,0.05)}
  /* Activity master–detail: left = timeline TOC · right = ONE continuous concatenated feed */
  .acol{display:grid;grid-template-columns:1fr 1fr;flex:1;min-height:0}
  .turn.open .plab{font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);padding:2px 14px 6px}
  .tllist{border-right:1px solid rgba(255,246,228,0.06);padding:8px 12px 12px 18px;min-width:0;overflow:auto}
  .tllist::-webkit-scrollbar{width:8px} .tllist::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:4px}
  .tllist .tl-lab{padding:0 2px}
  .tldetail{padding:10px 22px 4px;min-width:0;overflow:auto}
  .tldetail::-webkit-scrollbar{width:8px} .tldetail::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:4px}
  /* list rows are compact; the selected row drives the detail pane */
  .tllist .step{cursor:pointer;border-radius:8px}
  .tllist .step:hover{background:rgba(255,255,255,0.03)}
  .tllist .step.sel{background:linear-gradient(180deg,rgba(200,169,104,0.12),rgba(200,169,104,0.05));box-shadow:inset 0 0 0 1px rgba(200,169,104,0.18)}
  .tllist .step .events{display:none}
  /* Subagents = its own section; header styled IDENTICALLY to Timeline (.tl-lab). Rows selectable → right pane shows that agent's live feed. Dense rows scale to ~30. */
  .salist{margin:4px 0 0;max-height:190px;overflow:auto}
  .sarow{display:flex;align-items:center;gap:9px;padding:5px 8px;border-radius:8px;font-size:12px;color:var(--ink-dim);cursor:pointer}
  .sarow:hover{color:var(--ink);background:rgba(255,255,255,0.03)}
  .sarow.sel{background:linear-gradient(180deg,rgba(200,169,104,0.12),rgba(200,169,104,0.05));box-shadow:inset 0 0 0 1px rgba(200,169,104,0.18);color:var(--ink)}
  .sarow .sat{margin-left:auto;font-family:var(--mono);font-size:9.5px;color:var(--ink-faint)}
  .sarow .adot{width:6px;height:6px;border-radius:50%;flex:none}
  .sarow .adot.run{background:var(--run);box-shadow:0 0 6px rgba(111,168,144,0.55)} .sarow .adot.pend{background:var(--ink-ghost)} .sarow .adot.done{background:var(--done)}
  /* detail pane */
  .tldetail .dhd{display:flex;align-items:center;gap:10px;margin-bottom:6px;font-size:13px;color:var(--ink)}
  .tldetail .dhd .run{margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--run);letter-spacing:.14em;text-transform:uppercase}
  .tldetail .dsub{font-family:var(--mono);font-size:9.5px;color:var(--ink-faint);margin-bottom:12px}
  .tldetail .events{margin:0;border-left:none;padding-left:0}
  .tldetail .diffpeek{margin-top:14px;border-radius:10px;background:rgba(0,0,0,0.24);box-shadow:inset 0 1px 0 rgba(255,246,228,0.04);padding:10px 13px;font-family:var(--mono);font-size:10.5px;line-height:1.6}
  .tldetail .diffpeek .add{color:var(--run)} .tldetail .diffpeek .ctx{color:var(--ink-faint)} .tldetail .diffpeek .fn{color:var(--ink-dim);margin-bottom:5px}

  /* ============================================================================
     DELIVERY = the Hybrid review surface (C3b.2), lifted from
     cockpit-delivery-review-prototype.html variant E. Overview · Code Review · Files,
     a thin lifecycle RIBBON as state-readout, pre-PR↔PR-open phase, findings that
     reconcile, inline diff comments → Address-with-agent, artifact diff|rendered lens.
     ============================================================================ */
  /* delivery body layout inside the glass card */
  .dlvwrap{flex:1;min-height:0;display:flex;flex-direction:column}
  .hbodywrap{flex:1;min-height:0;position:relative}
  #hbody{position:absolute;inset:0;overflow:auto}
  #hbody::-webkit-scrollbar{width:8px} #hbody::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:4px}

  /* CI pipeline rail nodes — dots + connectors, current node live (used inside .dctl) */
  .rnode{display:flex;align-items:center;gap:7px;color:var(--ink-faint);font-size:11.5px;font-family:var(--mono);letter-spacing:.02em;white-space:nowrap}
  .rnode .dot{width:8px;height:8px;border-radius:50%;background:var(--line-2);flex:none}
  .rnode.done{color:var(--ink-dim)} .rnode.done .dot{background:var(--done)}
  .rnode.live{color:var(--ink)} .rnode.live .dot{background:var(--run);box-shadow:0 0 0 3px rgba(111,168,144,.16);animation:pulse 2.4s ease-in-out infinite}
  .rnode.wait .dot{background:var(--line-2)}
  .rbar{width:16px;flex:none;height:1px;background:var(--line-2);margin:0 7px}
  .rbar.done{background:var(--done)}

  /* multi-Delivery glance (C3b.4): active shows full; extras collapse to one line */
  .mdglance{padding:10px 22px;border-bottom:1px solid var(--line);background:rgba(0,0,0,.10);flex:none}
  .mdglance .mdl{font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:6px}
  .mdrow{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:11px;color:var(--ink-dim);cursor:pointer;padding:3px 0}
  .mdrow:hover{color:var(--ink)} .mdrow .chev{color:var(--ink-faint);width:10px}
  .mdrow .arrow{color:var(--ink-faint)}
  .mdrow .mdst{margin-left:14px;display:flex;align-items:center;gap:9px;color:var(--ink-faint)}
  .mdrow .mddot{width:6px;height:6px;border-radius:50%;background:var(--run);box-shadow:0 0 7px rgba(111,168,144,.5);flex:none}
  .mdswap{display:none;padding:7px 0 1px 19px;font-size:11px;color:var(--accent);font-family:var(--mono)}
  .mdrow.open + .mdswap{display:block}

  /* ===== ONE control line: [tabs (+badges)] · [CI pipeline rail] · [primary CTA] =====
     Collapses the old pipeline ribbon + sub-tab strip + CTA into a single horizontal band.
     The rail is the state readout (no free-text status string); status facts are re-homed
     onto the tabs (red blocking badge on Code Review, count on Files). */
  .dctl{display:flex;align-items:center;gap:16px;padding:8px 22px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:rgba(0,0,0,.18);flex:none}
  .dtabs{display:flex;align-items:center;gap:2px;flex:none}
  .dtab{position:relative;font-size:12px;color:var(--ink-faint);padding:8px 13px 9px;border-radius:7px;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:7px}
  .dtab:hover{color:var(--ink-dim)}
  .dtab.on{color:#F1ECE1}
  .dtab.on::after{content:"";position:absolute;left:12px;right:12px;bottom:1px;height:2px;border-radius:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);box-shadow:0 0 8px rgba(var(--warm),0.5)}
  .dtab .dn{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint)}
  .blkbadge{font-family:var(--mono);font-size:9px;line-height:1;min-width:15px;height:15px;padding:0 4px;border-radius:8px;background:var(--block);color:#160b0a;font-weight:700;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 0 8px rgba(181,103,94,.55)}
  .drail{margin-left:auto;display:flex;align-items:center;gap:0}
  .dctl .btn{margin-left:0;flex:none}

  /* continuous-scroll feed sections — one per list item, concatenated in list order.
     A real build would virtualize/windowise this stream; the prototype renders all
     sections (counts are small) so scroll-spy + click-jump can be exercised end to end. */
  .fsec{scroll-margin-top:10px}
  .tldetail .fsec + .fsec{margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
  .ddetail .fsec + .fsec{border-top:1px solid var(--line)}
  .ftrow.sel{background:var(--accent-soft);color:var(--ink)}

  /* ===== DELIVERY master–detail two-pane (mirrors Activity's .acol) ===== */
  .dlv2{flex:1;min-height:0;display:grid;grid-template-columns:minmax(300px,360px) 1fr;background:var(--panel-2)}
  .dlist{border-right:1px solid var(--line);overflow:auto;min-width:0;padding:10px 0 14px}
  .dlist::-webkit-scrollbar{width:8px} .dlist::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:4px}
  .ddetail{overflow:auto;min-width:0}
  .ddetail::-webkit-scrollbar{width:8px} .ddetail::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:4px}
  .dlab{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);padding:2px 18px 9px}

  /* generic selectable list row (walkthrough + findings share this) */
  .lrow{cursor:pointer;padding:9px 18px;border-left:2px solid transparent}
  .lrow:hover{background:rgba(255,255,255,0.03)}
  .lrow.sel{background:linear-gradient(90deg,rgba(200,169,104,0.12),rgba(200,169,104,0.03));border-left-color:var(--accent)}
  .lrow .l1{display:flex;align-items:center;gap:9px}
  .lrow .l2{display:flex;align-items:center;gap:8px;margin-top:4px;font-family:var(--mono);font-size:10px;color:var(--ink-faint)}
  .lrow .l2 .a{color:var(--add)} .lrow .l2 .d{color:var(--del)}
  /* walkthrough row bits */
  .lrow .num{width:19px;height:19px;flex:none;border-radius:50%;border:1px solid var(--line-2);color:var(--ink-dim);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9.5px}
  .lrow .what{flex:1;font-size:12.5px;color:var(--ink);line-height:1.35}
  .mk{width:7px;height:7px;border-radius:50%;flex:none}
  .mk.blocking{background:var(--block);box-shadow:0 0 7px rgba(181,103,94,.5)} .mk.advisory{background:var(--accent);box-shadow:0 0 7px rgba(200,169,104,.5)}
  /* findings row bits */
  .lrow .sd{width:8px;height:8px;border-radius:50%;flex:none}
  .lrow .sd.blocking{background:var(--block)} .lrow .sd.advisory{background:var(--accent)} .lrow .sd.check{background:var(--done)}
  .lrow .claim{flex:1;font-size:12.5px;color:var(--ink);line-height:1.35}
  .lrow .conf{font-family:var(--mono);font-size:10px;color:var(--ink-faint);flex:none}
  .reconcile{margin:12px 18px 0;border-top:1px solid var(--line);padding-top:10px}
  .reconcile .rh{font-family:var(--mono);font-size:11px;color:var(--done);display:flex;align-items:center;gap:8px;cursor:pointer}
  .reconcile .rl{display:none;margin-top:8px} .reconcile.open .rl{display:block}
  .reconcile .rf{display:flex;align-items:center;gap:9px;padding:6px 0;font-size:12px;color:var(--ink-faint)}
  .reconcile .rf .sd{width:7px;height:7px;border-radius:50%;background:var(--done);flex:none}
  .reconcile .rf .cl{text-decoration:line-through;text-decoration-color:var(--ink-ghost)}
  .reconcile .rf .fp{font-family:var(--mono);font-size:9.5px;color:var(--ink-ghost);margin-left:auto}

  /* file list rows in the left pane (reuse .ftrow look) */
  .dlist .ftg{padding:9px 18px 3px}
  .dlist .ftrow{padding:5px 18px 5px 26px}

  /* right detail pane — shared header + GitHub gutter diff */
  .dd{padding:16px 22px 22px;max-width:840px}
  .ddhd{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--ink);line-height:1.3}
  .ddhd .num{width:20px;height:20px;flex:none;border-radius:50%;border:1px solid var(--line-2);color:var(--ink-dim);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px}
  .ddhd .sd{width:9px;height:9px;border-radius:50%;flex:none}
  .ddhd .sd.blocking{background:var(--block)} .ddhd .sd.advisory{background:var(--accent)} .ddhd .sd.check{background:var(--done)}
  .ddsub{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);margin:6px 0 14px}
  .ddwhy{font-size:13px;line-height:1.55;margin-bottom:9px;color:var(--ink)}
  .ddwhy.dim{color:var(--ink-dim)}
  .ddwhy .k{display:inline-block;width:46px;font-family:var(--mono);font-size:10px;color:var(--accent);vertical-align:top}
  .ddmark{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--ink-dim);margin:10px 0 2px;font-family:var(--mono)}
  .ddacts{display:flex;gap:8px;margin:14px 0 2px}
  /* self-contained GitHub gutter diff for the detail pane */
  .ghdiff{margin-top:14px;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--inset);font-family:var(--mono);font-size:11.5px;line-height:1.62}
  .ghdiff .gh{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--line);background:rgba(0,0,0,.25);color:var(--ink);font-size:11px}
  .ghdiff .gh .fp{color:var(--ink)} .ghdiff .gh .cnt{margin-left:auto} .ghdiff .gh .cnt .a{color:var(--add)} .ghdiff .gh .cnt .d{color:var(--del)}
  .dfind.advisory{border-left-color:var(--accent-deep);background:rgba(200,169,104,.07)}
  .dfind.advisory .dm{color:var(--accent)}

  /* frontier action row (static here — the dock sits below it in the card) */
  .frontier{display:flex;align-items:center;gap:12px;padding:12px 22px;border-top:1px solid var(--line);flex:none}
  .frontier .lead{font-size:12px;color:var(--ink-dim);font-family:var(--mono)} .frontier .lead b{color:var(--ink)}
  .gatechip{font-size:10px;font-family:var(--mono);color:var(--ink-dim);border:1px solid var(--line-2);border-radius:5px;padding:2px 7px;letter-spacing:.04em}
  .btn{margin-left:auto;font-size:12.5px;font-weight:600;color:var(--base);background:var(--accent);border:none;border-radius:8px;padding:8px 16px;cursor:pointer;letter-spacing:-.01em;display:flex;align-items:center;gap:6px}
  .btn.ghost{background:transparent;color:var(--ink-dim);border:1px solid var(--line-2);margin-left:0}
  .btn.disabled{background:var(--line-2);color:var(--ink-faint);cursor:not-allowed}

  /* shared diff snippets (used by Overview rows + findings evidence) */
  .diff{font-family:var(--mono);font-size:11.5px;line-height:1.65;background:var(--inset);border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .dhead{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid var(--line);background:rgba(0,0,0,.25);color:var(--ink-dim);font-size:11px}
  .dhead .fp{color:var(--ink)} .dhead .cnt{margin-left:auto;font-size:10.5px}
  .dhead .cnt .a{color:var(--add)} .dhead .cnt .d{color:var(--del)}
  .drow{display:flex;padding:0 12px;white-space:pre}
  .drow .g{width:34px;color:var(--ink-faint);text-align:right;padding-right:14px;user-select:none;flex:none}
  .drow.add{background:rgba(92,138,107,.10)} .drow.add .g{color:rgba(92,138,107,.7)}
  .drow.del{background:rgba(181,103,94,.10)} .drow.del .g{color:rgba(181,103,94,.7)}
  .drow .sgn{width:12px;flex:none} .drow.add .sgn{color:var(--add)} .drow.del .sgn{color:var(--del)}
  .drow.ctx{color:var(--ink-dim)}
  .hunkhead{padding:3px 12px;color:var(--accent-deep);background:rgba(200,169,104,.05);font-size:10.5px}
  .badge{font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:4px;letter-spacing:.03em}
  .risk{display:inline-flex;gap:2px;vertical-align:middle}
  .risk i{width:5px;height:9px;border-radius:1px;background:var(--line-2)}
  .risk i.on{background:var(--accent)}
  .mini{font-size:11px;font-family:var(--mono);padding:4px 9px;border-radius:6px;border:1px solid var(--line-2);background:transparent;color:var(--ink-dim);cursor:pointer}
  .mini.ok{color:var(--add);border-color:rgba(92,138,107,.4)}
  .mini.no{color:var(--block);border-color:rgba(181,103,94,.35)}
  .mini.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent-deep)}
  .dlvpill{font-family:var(--mono);font-size:10px;color:var(--block);border:1px solid var(--block);border-radius:20px;padding:2px 9px;cursor:pointer;margin-left:6px}

  /* Overview — PR body + narrated changes table */
  .desc{display:flex;flex-direction:column;gap:11px;margin-bottom:8px}
  .desc .row{font-size:13px;line-height:1.5}
  .desc .row .k{display:inline-block;width:52px;font-family:var(--mono);font-size:10px;color:var(--accent);vertical-align:top;padding-top:2px}
  .desc .row.dim{color:var(--ink-dim)}
  .ntab-h{font-size:11px;color:var(--ink-dim);font-family:var(--mono);letter-spacing:.04em;margin:20px 0 8px}
  .ntab{border:1px solid var(--line);border-radius:11px;overflow:hidden}
  .nr{display:grid;grid-template-columns:26px 1fr 210px 78px 92px;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line);cursor:pointer}
  .nr:last-of-type{border-bottom:none}
  .nr:hover{background:var(--panel-2)}
  .nr .num{width:20px;height:20px;border-radius:50%;border:1px solid var(--line-2);color:var(--ink-dim);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px}
  .nr .what{font-size:12.5px;color:var(--ink)}
  .nr .where{font-family:var(--mono);font-size:10.5px;color:var(--ink-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .nr .delta{font-family:var(--mono);font-size:10.5px}
  .nr .delta .a{color:var(--add)} .nr .delta .d{color:var(--del)}
  .nr .flag{font-family:var(--mono);font-size:10px;text-align:right}
  .nr .flag .blk{color:var(--block)} .nr .flag .adv{color:var(--accent)}
  .nx{display:none;padding:0 14px 14px;grid-column:1/-1}
  .nrow.open .nx{display:block}
  .nrow{display:contents}

  /* Code Review — findings inbox */
  .inbox{padding:16px 22px 20px;max-width:820px}
  .find{border:1px solid var(--line);border-radius:11px;background:var(--panel-2);margin-top:12px;overflow:hidden}
  .find.blocking{border-left:2px solid var(--block)}
  .find.advisory{border-left:2px solid var(--accent-deep)}
  .find.done{opacity:.5}
  .find .fh{display:flex;align-items:center;gap:11px;padding:12px 15px;cursor:pointer}
  .find .sd{width:8px;height:8px;border-radius:50%;flex:none}
  .find.blocking .sd{background:var(--block)} .find.advisory .sd{background:var(--accent)}
  .find.done .sd{background:var(--done)}
  .find .fc{flex:1} .find .fc .cl{font-size:13px;color:var(--ink)}
  .find .fc .fp{font-family:var(--mono);font-size:10.5px;color:var(--ink-dim);margin-top:2px}
  .find .conf{font-family:var(--mono);font-size:10.5px;color:var(--ink-dim);flex:none}
  .find .fa{display:flex;gap:6px;flex:none}
  .find .ev{display:none;padding:0 15px 14px} .find.open .ev{display:block}
  .cleanband{margin-top:14px;display:flex;align-items:center;gap:12px;padding:13px 16px;border:1px dashed var(--line-2);border-radius:11px;color:var(--ink-dim);font-size:12px}
  .cleanband .pct{font-family:var(--mono);color:var(--ink-faint);margin-left:auto}
  .honest{margin-top:10px;font-size:10.5px;color:var(--ink-faint);font-family:var(--mono);text-align:center}
  .revbar{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);padding-bottom:12px;border-bottom:1px solid var(--line)}
  .revbar .rr{margin-left:auto;font-size:11px;color:var(--ink-dim);border:1px solid var(--line-2);border-radius:7px;padding:5px 11px;cursor:pointer;display:flex;align-items:center;gap:6px}
  .revbar .rr:hover{color:var(--ink);border-color:var(--ink-faint)}
  .resolved{margin-top:18px;border-top:1px solid var(--line);padding-top:12px}
  .rhead{font-family:var(--mono);font-size:11px;color:var(--done);display:flex;align-items:center;gap:8px;cursor:pointer}
  .find.done .cl{text-decoration:line-through;text-decoration-color:var(--ink-faint)}
  .newtag{font-family:var(--mono);font-size:9px;color:var(--base);background:var(--accent);border-radius:3px;padding:1px 5px;margin-left:8px}
  .sev{font-family:var(--mono);font-size:12px;display:flex;gap:14px}
  .sev .blk{color:var(--block)} .sev .adv{color:var(--accent)} .sev .cln{color:var(--ink-dim)}

  /* Files — GitHub-style tree + gutter diff, inline findings, comment threads, artifact lens */
  .dfiles{display:grid;grid-template-columns:minmax(200px,250px) 1fr;height:100%}
  .ftree{border-right:1px solid var(--line);overflow:auto;padding:10px 0}
  .ffilter{padding:0 12px 10px}

<body>
<div id="band"></div>
<div id="room">
  <div id="cap"><b id="capk">Activity</b> &nbsp; <span id="capd"></span></div>

  <div id="brow">
    <div id="mark"><span class="glyph">ARGO</span><span class="proj">Argo · main</span></div>
    <div id="rooms"><div class="rm"><span class="k">⌘1</span> Work</div><div class="rm on"><span class="k">⌘2</span> Sessions</div></div>
  </div>

  <div id="rail">
    <div id="newses"><span class="plus">+</span> New session <span class="k">⌘N</span></div>
    <div class="label" id="rlabel">Roster · active</div>
    <div id="rows"></div>
    <div id="arch">⚙ Archived <span class="cnt">37</span></div>
  </div>

  <div id="card"></div>

  <div id="cx">
    <div class="ringorb"><div class="ring"></div><div class="core"></div></div>
    <div class="caption"><span class="q">“</span>the auth refactor is on CI — one lint warning<span class="q">”</span></div>
    <div class="cmode"><span class="ml">Conversation</span><div class="ctoggle"><span class="knob"></span></div></div>
  </div>
</div>

<div id="hsw">
  <span class="hlbl">Header</span>
  <div class="hp" data-h="1" onclick="setHeader(1)">Elapsed</div>
  <div class="hp" data-h="2" onclick="setHeader(2)">Percent</div>
  <div class="hp" data-h="3" onclick="setHeader(3)">Glyph</div>
</div>

<div id="sw">
  <div class="ar" onclick="cycle(-1)">‹</div>
  <div class="lb"><span><span class="k" id="swk">1/7</span><span id="swn">Activity</span></span><span class="d" id="swd"></span></div>
  <div class="ar" onclick="cycle(1)">›</div>
</div>

<script>
/* ---------- roster ---------- */
const RAIL=[
  {dot:'run', name:'Auth refactor', meta:'Opus 4.8 · <span class="branch">feat/auth-rotation</span>', word:'CI RUNNING', ctx:42},
  {dot:'idle',name:'Rate-limit endpoint', meta:'GPT-5 · <span class="branch">#58 · feat/ratelimit</span>', word:'PR OPEN'},
  {dot:'need',name:'Why is CI flaky', meta:'Sonnet 5 · <span class="branch">"explore staleness…"</span>', word:'NEEDS YOU', attn:true},
  {dot:'block',name:'Migrate config loader', meta:'Opus 4.8 · <span class="branch">feat/config-loader</span>', word:'CI FAILED', fail:true},
  {dot:'ext', name:'~/argo', meta:'Sonnet 5 · <span class="branch">external · read-only</span>', word:'READ-ONLY', ext:true},
];
function railHTML(sel){return RAIL.map((r,i)=>`
  <div class="plane ${i===sel?'active':'recede'} ${r.ext?'ext':''}" onclick="selectRow(${i})">
    <div class="top"><span class="dot ${r.dot}"></span><div class="name">${r.name}</div><span class="word">${r.word}</span></div>
    <div class="meta">${r.meta}</div>
  </div>`).join('');}

/* ---------- header — 3 takes on ONE band (?header=1..3) ----------
   ONE skeleton per take: [large ctx ring] · [title / meta] ...... [tabs, right-aligned].
   header(o,active,changes,outc) dispatches on curH and renders the tabs INSIDE the band —
   there is no separate #tabs strip. Shared locked decisions live in the helpers below, so every
   take degrades identically: title = fallback chain (o.title, never the task) · live dot only
   when running · idle drops ↑push · external drops the intent + renders the ring EMPTY/"unknown"
   · intent de-dups when titleSrc==='ticket' · NO action buttons. */
function modeCls(m){return {code:'m-code',plan:'m-plan',ask:'m-ask',unknown:'m-unk'}[m]||'m-unk';}
function modeTxt(m){return {code:'Code',plan:'Plan',ask:'Ask',unknown:'unknown'}[m]||'unknown';}
function gitTxt(o){if(!o.ws)return null;const g=[];if(o.ws.dirty)g.push(`${o.ws.dirty}∆`);if(o.ws.push)g.push(`↑${o.ws.push}`);return g.length?g.join(' '):null;} /* branch NAME shed; only ∆/↑ */
function hasIntent(o){return o.live!=='ext'&&!!o.intent;}                 /* external is read-only → no intent */
function intentBody(o){return o.titleSrc==='ticket'                       /* title already = ticket name → link only, no repeat */
  ? `intent <span class="n">#${o.intent.n}</span> ↗`
  : `intent <span class="n">#${o.intent.n}</span> ${o.intent.t} ↗`;}
function compactElapsed(e){if(!e)return null;const m=e.match(/\d+\s*[hm]/);return m?m[0].replace(/\s+/g,''):e;} /* '3m 12s'→'3m' · 'idle 8m'→'8m' */

/* large ctx ring — arc = DERIVED ctx (honest tilde); centre + stroke passed per take.
   ctx==null → NO arc drawn, ring reads empty/"unknown". Never encodes state/liveness. */
function hringSVG(px,stroke,ctx){const r=(px-stroke-4)/2,c=2*Math.PI*r,m=px/2;
  const track=`<circle cx="${m}" cy="${m}" r="${r}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="${stroke}"/>`;
  const arc=ctx==null?'':`<circle cx="${m}" cy="${m}" r="${r}" fill="none" stroke="#C8A968" stroke-width="${stroke}" stroke-linecap="round"
      stroke-dasharray="${(ctx/100*c).toFixed(1)} ${c.toFixed(1)}" transform="rotate(-90 ${m} ${m})" opacity="0.9" style="filter:drop-shadow(0 0 5px rgba(200,169,104,0.55))"/>`;
  return `<svg width="${px}" height="${px}" viewBox="0 0 ${px} ${px}">${track}${arc}</svg>`;}
function ring(px,stroke,ctx,centre,sub){
  return `<div class="hring ${ctx==null?'unk':''}" style="width:${px}px;height:${px}px">${hringSVG(px,stroke,ctx)}
    <div class="hrc"><span class="hrcm">${centre}</span>${sub?`<span class="hrcs">${sub}</span>`:''}</div></div>`;}

/* meta line(s): Mode · elapsed · git ∆/↑ · intent ↗ */
function metaParts(o){
  const mode=`<span class="${modeCls(o.mode)}">${modeTxt(o.mode)}</span>`;
  const el=o.elapsed?`<span>${o.elapsed}</span>`:null;
  const g=gitTxt(o);const git=g?`<span class="mut">${g}</span>`:null;
  const intent=hasIntent(o)?`<span class="h-intent">${intentBody(o)}</span>`:null;
  return {mode,el,git,intent};
}
function metaOne(o){const p=metaParts(o);const out=[p.mode];
  [p.el,p.git,p.intent].forEach(x=>{if(x)out.push('<span class="h-b">·</span>',x);});
  return `<div class="hmeta">${out.join('')}</div>`;}
function metaTwo(o){const p=metaParts(o);
  const l1=[p.mode];if(p.el)l1.push('<span class="h-b">·</span>',p.el);
  const l2=[];[p.git,p.intent].forEach(x=>{if(x){if(l2.length)l2.push('<span class="h-b">·</span>');l2.push(x);}});
  return `<div class="hmeta two"><div class="mrow">${l1.join('')}</div>${l2.length?`<div class="mrow">${l2.join('')}</div>`:''}</div>`;}

/* tabs absorbed into the band's right edge — TWO tabs only (C2.2: Outcomes cut). */

/* ---------- continuous-scroll master/detail plumbing (shared by all 4 surfaces) ----------
   wireSpy: IntersectionObserver over the feed's [data-spy] sections → moves .sel onto the
   matching [data-nav] row in the left TOC (whichever section sits in the top band is "current").
   feedJump: a TOC row click smooth-scrolls its section to the top of the feed. Click still
   works — it just isn't the only way to reach an item. */
function feedJump(feedSel,key){
  const feed=document.querySelector(feedSel); if(!feed)return;
  const sec=[...feed.querySelectorAll('[data-spy]')].find(s=>s.dataset.spy===key);
  if(sec)sec.scrollIntoView({behavior:'smooth',block:'start'});
}
function wireSpy(feedSel,listSel){
  const feed=document.querySelector(feedSel); if(!feed)return;
  const rows=[...document.querySelectorAll(listSel+' [data-nav]')];
  const secs=[...feed.querySelectorAll('[data-spy]')];
  if(!rows.length||!secs.length)return;
  const visible=new Set();
  const io=new IntersectionObserver(ents=>{
    ents.forEach(e=>{ if(e.isIntersecting) visible.add(e.target); else visible.delete(e.target); });
    if(!visible.size)return;
    const top=[...visible].sort((a,b)=>a.offsetTop-b.offsetTop)[0].dataset.spy;
    rows.forEach(r=>r.classList.toggle('sel',r.dataset.nav===top));
    /* Files rows use .on for their highlight; keep it in sync with .sel */
    rows.forEach(r=>{ if(r.classList.contains('ftrow')) r.classList.toggle('on',r.dataset.nav===top); });
  },{root:feed,rootMargin:'0px 0px -55% 0px',threshold:[0,1]});
  secs.forEach(s=>io.observe(s));
}

/* right feed = each file's diff (Viewed per file · artifact diff|rendered lens · inline finding) */
function filesFeed(){

function fileSection(path,f){return `<section class="fsec" data-spy="${path}">${fileSectionInner(path,f)}</section>`;}
function fileSectionInner(path,f){
  return `<div class="fdiff">${fdHeadFeed(path,f)}<div class="fbody">${(FVIEW[path]==='rendered'?f.rendered:f.body)}</div></div>`;
}

/* the two-pane per sub-tab — list-left | continuous feed-right, exactly like Activity's .acol */
const DLV2={

/* per-file diff|rendered lens — each section carries its own view state (default diff, so the
   concatenated stream reads as continuous gutter diffs; the artifact can be flipped to rendered) */
const FVIEW={};
function fdHeadFeed(path,f){
  const view=FVIEW[path]||'diff';
  const tg=f.artifact?`<span class="fview"><span class="fv ${view==='diff'?'on':''}" onclick="setFV('${path}','diff')">diff</span><span class="fv ${view==='rendered'?'on':''}" onclick="setFV('${path}','rendered')">rendered</span></span>`:'';
  return `<div class="fdhead"><span>${path}</span><span class="cnt">${f.d}</span>${tg}
    <span class="viewedbox" onclick="event.stopPropagation();this.classList.toggle('on')" style="margin-left:16px"><span class="bx"></span>Viewed</span></div>`;
}
function setFV(path,m){FVIEW[path]=m;
  const sec=[...document.querySelectorAll('.fsec')].find(s=>s.dataset.spy===path);
  if(sec)sec.innerHTML=fileSectionInner(path,FILES[path]);}
function ftrow(path,label,d,flag,art){
  return `<div class="ftrow ${path==='core/verify.ts'?'sel on':''}" data-nav="${path}" onclick="feedJump('.ddetail','${path}')">
    ${flag?'<span class="fdot"></span>':''}<span class="fn">${label}</span>${art?'<span class="fd" style="color:var(--accent)">◆</span>':''}<span class="fd">${d}</span></div>`;
}
function addComment(el){
  const row=el.closest('.fdrow');
  if(row.nextElementSibling&&row.nextElementSibling.classList.contains('newthread'))return;
  const box=document.createElement('div');box.className='cthread newthread';
  box.innerHTML='<div class="creply" style="border:none"><input placeholder="leave a comment on this line… (Address with agent picks it up)" autofocus></div>';
  row.after(box);box.querySelector('input').focus();
}
/* fresh session "dock is home" invitation body */
function freshBody(){return `<div id="panelwrap" style="padding:0;display:flex;flex-direction:column">
  <div class="invite">

function externalBody(){return `<div id="panelwrap">

function dock(o){
  const h=o.expanded?340:120;
  const body=o.kind==='transcript'
    ? `<div class="lines" style="max-height:${o.expanded?250:56}px"><div class="dm">— replaying transcript (read-only) —</div><div><span class="p">▸</span> Read <span style="color:var(--ink)">src/hub/join.ts</span></div>${o.expanded?`<div class="dm">  window.assemble() → derived projection</div><div class="ok">  ✓ turn ended · end_turn</div>`:''}</div><div class="roprompt">⌾ read-only — external session, no PTY to steer</div>`
    : `${o.expanded?`<div class="lines" style="max-height:250px"><div class="dm">  + const ok = rotation.verify(token,{window:2})</div><div class="ok">  ✓ 12 tests passed</div><div><span class="p">▸</span> Bash <span style="color:var(--ink)">bun run typecheck</span></div></div>`:''}<div class="prompt"><span class="car">›</span><input placeholder="type to steer · ask a question · ⌘↩ send" /></div>`;
  const n=o.now;
  const head = o.kind!=='pty'
    ? `<span class="ticon">&gt;_</span><span class="tlabel">Transcript</span><span class="tsep">·</span><span class="now">replay</span>`
    : n&&n.fresh
      ? `<span class="ticon">&gt;_</span><span class="tlabel">Terminal</span><span class="tsep">·</span><span class="now"><span class="dm">ready — type to begin</span></span>`
    : n&&n.idle
      ? `<span class="ticon">&gt;_</span><span class="tlabel">Terminal</span><span class="tsep">·</span><span class="now">idle · <span class="dm">last: ${n.last}</span></span>`
      : `<span class="ticon">&gt;_</span><span class="tlabel">Terminal</span><span class="tsep">·</span><span class="now">${n?n.task:'live'}</span>${n&&n.plan?`<span class="prog">plan <span>${n.plan[0]}</span><span class="cx"> / ${n.plan[1]} ▾</span></span>`:''}`;
  return `<div id="dock" style="height:${h}px"><div class="dhead" onclick="toggleDock()">${head}<span class="exp">${o.expanded?'⌄':'⌃'}</span></div>${body}</div>`;
}
function archivedBody(){return `<div id="archview">
  <div class="aback" onclick="selectRow(0)">‹ Back to active</div>
  <div class="afilters"><span class="pill">Status · Archived ▾</span><span class="pill">Sort · Recency ▾</span><span class="pill">Group · None ▾</span></div>
  ${[['Spawn UX grill — session model','ENDED','2d'],['Debug worktree tracking and naming','MERGED','3d'],['Research VRT best practices','ENDED','5d'],['Update and push argo-plugin readme','MERGED','6d'],['Investigate community naming issues','ENDED','1w'],['milads-mac-mini-local-magical-sun','ORPHANED','1w'],['Debug dark-mode components','MERGED','2w'],['Review existing Figma components','ENDED','3w']]
   .map(a=>`<div class="arow" onclick="selectRow(0)"><span class="an">${a[0]}</span><span class="aw">${a[1]}</span><span class="at">${a[2]}</span></div>`).join('')}
</div>`;}

/* ---------- headers per scene ---------- */
const H_RUN={live:'run',model:'Opus 4.8',mode:'code',title:'Auth refactor',ctx:38,elapsed:'3m 12s',intent:{n:42,t:'Auth flow'},ws:{branch:'⎇ feat/auth-rotation',dirty:3,push:2}};
const H_IDLE={live:'idle',model:'Opus 4.8',mode:'plan',title:'Auth refactor',ctx:38,elapsed:'idle 8m',intent:{n:42,t:'Auth flow'},ws:{branch:'⎇ feat/auth-rotation',dirty:3}};
const H_EXT={live:'ext',model:'Sonnet 5',mode:'unknown',title:'~/argo · explore join drift',ctx:null,intent:null,ws:null};
const NOW_RUN={task:'Wiring <span class="mono" style="color:var(--ink-dim)">verify()</span> onto the rotation core',plan:[4,7]};
const NOW_IDLE={idle:true,last:'extract the rotation core'};
const NOW_FRESH={fresh:true};

const SCENES={
  zero:{rail:'zero',sel:-1,d:'cold-start / empty cockpit (B6) — empty roster, only + New session',render:()=>''},
  fresh:{rail:'fresh',sel:0,d:'freshly spawned — "dock is home", input in the dock from t=0',render:()=>freshHead()+freshBody()+dock({expanded:false,kind:'pty',now:NOW_FRESH})},

  idle:{sel:1,d:'managed · idle — title falls back to identity, quiet',render:()=>header(H_IDLE,'activity')+activityBody()+dock({expanded:false,kind:'pty',now:NOW_IDLE})},
  delivery:{sel:0,d:'Delivery · Overview — walkthrough list (left) · change what/why + diff (right)',render:()=>header(H_RUN,'delivery')+deliveryBody('overview','open')+dock({expanded:false,kind:'pty',now:NOW_RUN})},
  'delivery-review':{sel:0,d:'Delivery · Code Review — findings list + reconcile (left) · anchored evidence (right)',render:()=>header(H_RUN,'delivery')+deliveryBody('review','open')+dock({expanded:false,kind:'pty',now:NOW_RUN})},
  'delivery-files':{sel:0,d:'Delivery · Files — file list (left) · gutter diff, inline finding, thread, artifact lens (right)',render:()=>header(H_RUN,'delivery')+deliveryBody('files','open')+dock({expanded:false,kind:'pty',now:NOW_RUN})},
  'delivery-prepr':{sel:0,d:'Delivery · pre-PR — rail at "commits" (not pushed), CTA = Push & open PR',render:()=>header(H_RUN,'delivery')+deliveryBody('overview','local')+dock({expanded:false,kind:'pty',now:NOW_RUN})},
  dock:{sel:0,d:'terminal dock EXPANDED — steer without leaving the tab',render:()=>header(H_RUN,'activity')+activityBody()+dock({expanded:true,kind:'pty',now:NOW_RUN})},
  external:{sel:4,d:'external · read-only — dock tails transcript, NO input; no Outcomes (honest gap)',render:()=>header(H_EXT,'activity')+externalBody()+dock({expanded:false,kind:'transcript'})},
  archived:{sel:-1,d:'Archived opens as a dense list IN the panel + back-nav',render:()=>archivedBody()},
};
const ORDER=['zero','fresh','activity','idle','delivery','delivery-review','delivery-files','delivery-prepr','dock','external','archived'];
const NAMES={zero:'Zero-state (cold start)',fresh:'Fresh session',activity:'Activity',idle:'Idle session',delivery:'Delivery · Overview','delivery-review':'Delivery · Code Review','delivery-files':'Delivery · Files','delivery-prepr':'Delivery · pre-PR',dock:'Dock expanded',external:'External (read-only)',archived:'Archived list'};
let cur='activity';
function freshRailHTML(){
  return `<div class="plane active"><div class="top"><span class="dot idle"></span><div class="name">New session</div><span class="word">READY</span></div><div class="meta">Claude · <span class="branch">root</span></div></div>`
    + RAIL.slice(0,3).map(r=>`<div class="plane recede ${r.ext?'ext':''}"><div class="top"><span class="dot ${r.dot}"></span><div class="name">${r.name}</div><span class="word">${r.word}</span></div><div class="meta">${r.meta}</div></div>`).join('');
}
function paint(){
  const s=SCENES[cur];
  const rlabel=document.getElementById('rlabel'),arch=document.getElementById('arch');
  if(s.rail==='zero'){rlabel.style.display='none';arch.style.display='none';document.getElementById('rows').innerHTML='';}
  else if(s.rail==='fresh'){rlabel.style.display='';arch.style.display='';document.getElementById('rows').innerHTML=freshRailHTML();}
  else{rlabel.style.display='';arch.style.display='';document.getElementById('rows').innerHTML=railHTML(s.sel);}
  arch.className=cur==='archived'?'on':'';
  document.getElementById('card').innerHTML=s.render();
  /* wire continuous-scroll spy for whichever master/detail surface just rendered */
  if(cur.startsWith('delivery')) wireSpy('.ddetail','.dlist');
  if(cur==='activity'||cur==='idle'||cur==='dock') wireSpy('.tldetail','.tllist');
  const i=ORDER.indexOf(cur);
  document.getElementById('swk').textContent=`${i+1}/${ORDER.length}`;
  document.getElementById('swn').textContent=NAMES[cur];
  document.getElementById('swd').textContent=s.d;
  document.getElementById('capk').textContent=NAMES[cur];
  document.getElementById('capd').textContent=s.d;
  document.querySelectorAll('#hsw .hp').forEach(p=>p.classList.toggle('on',+p.dataset.h===curH));
  const u=new URL(location);u.searchParams.set('state',cur);u.searchParams.set('header',curH);history.replaceState({},'',u);
}
function setHeader(n){curH=n;paint();}
function cycle(d){const i=ORDER.indexOf(cur);cur=ORDER[(i+d+ORDER.length)%ORDER.length];paint();}
function selectRow(i){cur=i===4?'external':i===1?'idle':'activity';paint();}
function setTab(t){cur=t==='delivery'?'delivery':'activity';paint();}
function toggleDock(){cur=cur==='dock'?'activity':'dock';paint();}
document.getElementById('arch').addEventListener('click',()=>{cur='archived';paint();});
addEventListener('keydown',e=>{if(['INPUT','TEXTAREA'].includes(document.activeElement.tagName))return;if(e.key==='ArrowLeft')cycle(-1);if(e.key==='ArrowRight')cycle(1);});
const init=new URL(location).searchParams.get('state');if(init&&SCENES[init])cur=init;
const ih=parseInt(new URL(location).searchParams.get('header'),10);if(ih>=1&&ih<=3)curH=ih;
paint();
</script>
