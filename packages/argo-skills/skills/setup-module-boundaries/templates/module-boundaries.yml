# Mechanical module-boundary check. Fails the PR when any module is imported through
# a non-public file (see scripts/module-boundaries.json). Installed by the setup-module-boundaries skill.
#
# No separate Node runtime: bun's node-compat (>=24) satisfies dependency-cruiser, and the
# `boundaries` script runs it through the bun runtime (`bun --bun x`) so the node shebang
# never shells out to a stray system Node.
name: module-boundaries

on:
  pull_request:
  push:
    branches: [main]

jobs:
  boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2 # {{SWAP_FOR_YOUR_PM}} — installs deps + the hoisted depcruise bin
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile # {{SWAP_FOR_YOUR_PM}}
      - name: Check module boundaries
        working-directory: "{{WORKSPACE_DIR}}" # e.g. apps/desktop; "." for a single-package repo
        run: bun run boundaries
