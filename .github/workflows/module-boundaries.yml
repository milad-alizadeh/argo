# Mechanical module-boundary check for @argo/desktop. Fails the PR when a module is
# imported through a non-public file, or when the Electron main/preload/renderer
# processes import each other (see apps/desktop/module-boundaries.json).
#
# dependency-cruiser needs a Node runtime (22 || 24 || >=26) even though the repo uses
# bun, so Node is set up explicitly and depcruise is invoked directly.
name: module-boundaries

on:
  pull_request:
    paths:
      - "apps/desktop/**"
      - ".github/workflows/module-boundaries.yml"
  push:
    branches: [main]
    paths:
      - "apps/desktop/**"

jobs:
  boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"
      - run: bun install --frozen-lockfile
      - name: Check module boundaries
        working-directory: apps/desktop
        run: npx --no-install depcruise --config .dependency-cruiser.cjs src
