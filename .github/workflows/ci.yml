# The default gate for every PR: biome, typecheck, unit, story and Electron e2e (#34).
# Unfiltered on purpose — a workflow skipped by path filtering stays Pending forever when
# required, so the two expensive jobs opt out per-job instead (a skipped job reports Success).
name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  # Runs on main are left alone: their caches are the only ones a PR can restore
  # from (a PR's own cache is scoped to its merge ref).
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  changes:
    name: detect non-markdown changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      non_docs: ${{ steps.filter.outputs.non_docs }}
    steps:
      - uses: actions/checkout@v5
        # fetch-depth: 0 is what makes origin/$BASE_REF resolvable below.
        with:
          fetch-depth: 0

      - id: filter
        env:
          BASE_REF: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" != 'pull_request' ]; then
            echo 'non_docs=true' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # A git pathspec glob spans '/', so ':(exclude)*.md' drops nested markdown too.
          if [ -n "$(git diff --name-only "origin/$BASE_REF...HEAD" -- . ':(exclude)*.md')" ]; then
            echo 'non_docs=true' >> "$GITHUB_OUTPUT"
          else
            echo 'non_docs=false' >> "$GITHUB_OUTPUT"
          fi

  check:
    name: lint · typecheck · unit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      # The one unconditional job, so it owns the bun cache write for the whole workflow.
      - uses: ./.github/actions/setup
        with:
          save-cache: "true"

      # Each gate runs even after an earlier one fails, so a PR gets all three
      # verdicts in one push instead of three round trips.
      - name: Lint and format
        run: bun run format-and-lint

      - name: Typecheck
        if: ${{ !cancelled() }}
        run: bun run typecheck

      - name: Unit tests
        if: ${{ !cancelled() }}
        run: bun run test

      # Story tests render stories, never the generated Docs pages, so a broken .mdx or a
      # component react-docgen cannot parse fails only here. It sits in this job rather than
      # `stories` because a red `stories` wakes the `baselines` job — an MDX typo would
      # otherwise cost a full Playwright baseline regeneration to learn nothing.
      - name: Build Storybook
        if: ${{ !cancelled() }}
        env:
          STORYBOOK_DISABLE_TELEMETRY: "1"
        run: bun run build-storybook

  stories:
    name: story tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.non_docs == 'true'
    timeout-minutes: 15
    env:
      STORYBOOK_DISABLE_TELEMETRY: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      # Chromium only: vitest.config.ts declares a single `{ browser: 'chromium' }` instance.
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Story tests
        run: bun run test:stories

      # Fallback record of what differed, for a run whose `baselines` job never got to comment.
      - name: Upload visual diffs
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: visual-diffs
          path: apps/desktop/.vitest-attachments/
          retention-days: 7
          if-no-files-found: ignore

  e2e:
    name: electron e2e
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.non_docs == 'true'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - name: Resolve the pinned Electron version
        id: electron
        run: echo "version=$(node -p "require('./apps/desktop/package.json').devDependencies.electron")" >> "$GITHUB_OUTPUT"

      # No restore-keys: a partial hit restores a different version's zip, so the
      # download still happens and the transfer is pure waste.
      - name: Cache the Electron binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/electron
          key: electron-${{ runner.os }}-${{ steps.electron.outputs.version }}

      # No postinstall since electron@42: the binary is fetched lazily on first
      # `require()`, which inside a Playwright worker reads as a test timeout.
      - name: Download the Electron binary
        # By path, not `bunx install-electron` — that bin name is also an unrelated
        # package on npm, which bunx would fetch if local bin linking ever missed.
        run: node node_modules/electron/install.js

      # Electron bundles Chromium but not its shared libraries, and the runner image
      # is only incidentally stocked with them.
      - name: Install Chromium system libraries
        run: bunx playwright install-deps chromium

      # Electron is Chromium: it needs an X display even headless. `-a` picks a free
      # server number instead of colliding with a concurrent job on :99.
      - name: Electron app-launch smokes
        run: xvfb-run -a bun run test:e2e

      - name: Upload Playwright traces
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-traces
          path: apps/desktop/test-results/
          retention-days: 7

  # Resolves a red `stories`: a new story has no baseline yet, or an existing one drifted. Both
  # end with the PNGs pushed to the PR, where GitHub renders a changed image with swipe and
  # onion-skin. Drift also gets a comment, since merging it is the only thing that accepts it.
  baselines:
    name: update visual baselines
    needs: stories
    if: ${{ !cancelled() && github.event_name == 'pull_request' && needs.stories.result == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          # A PAT, not GITHUB_TOKEN: a GITHUB_TOKEN push starts no new workflow run, so the
          # `stories` gate would never re-run to clear its red X.
          token: ${{ secrets.VISUAL_APPROVE_TOKEN }}
          ref: ${{ github.head_ref }}
          # Full history: the merge below needs the base branch's commits, not a shallow tip.
          fetch-depth: 0

      # `stories` gates the *merge* of head into base, but we check out the bare head so there is
      # a branch to push to. Regenerating on that tip reads a different tree than the one that
      # failed: a branch forked before the gate landed has no screenshot assertion at all, so
      # `--update` writes nothing and the commit step then finds no baselines to add.
      - name: Merge the base branch
        id: merge
        env:
          BASE: ${{ github.base_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --no-tags origin "$BASE"
          if ! git merge --no-edit "origin/$BASE"; then
            git merge --abort
            echo "conflict=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Report a conflicting branch
        if: steps.merge.outputs.conflict == '1'
        env:
          GH_TOKEN: ${{ github.token }}
          BASE: ${{ github.base_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" --body "\`$BASE\` does not merge cleanly into this branch, so the visual baselines can't be regenerated against the tree the gate tests. Resolve the conflict and push — the gate will retry."
          exit 1

      - uses: ./.github/actions/setup

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      # --update writes every baseline: creates the missing ones, overwrites the drifted ones.
      # `|| true` because a story failing for a non-visual reason must not lose the new baselines.
      - name: Regenerate baselines
        run: cd apps/desktop && bun run test:stories -- --update || true

      # Commit, and publish the objects under a ref that triggers nothing (`on.push` is main-only,
      # `pull_request` only fires for the head branch) so the comment's raw image URLs resolve
      # before the branch push exists. Pushing the branch is deliberately the LAST step: it
      # re-runs `pull_request`, and the workflow's cancel-in-progress then kills this job — which
      # already silently ate the drift comment once.
      - name: Commit baselines
        id: commit
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Tracked-and-modified is drift (a story that already had a baseline now renders
          # differently); untracked is a new story's first render, with nothing to compare to.
          drift=$(git diff --name-only -- '*__screenshots__*')
          fresh=$(git ls-files --others --exclude-standard -- '*__screenshots__*')
          # Guarded, not just run: `git add` treats a pathspec matching nothing as fatal, which
          # reads as a broken workflow rather than the ordinary "`stories` went red for a
          # non-visual reason, so there is no baseline to fix" that it actually is.
          if [ -z "$drift" ] && [ -z "$fresh" ]; then
            echo "No baseline changed — see the stories job for the real failure."
            exit 0
          fi
          git add -A -- '*__screenshots__*'
          if [ -n "$drift" ] && [ -n "$fresh" ]; then
            subject="test(visual): baseline new stories, update drifted ones"
          elif [ -n "$drift" ]; then
            subject="test(visual): update drifted screenshot baselines"
          else
            subject="test(visual): baseline new stories"
          fi
          git commit -m "$subject"
          git push --force origin "HEAD:refs/visual-baselines/pr-$PR_NUMBER"
          {
            echo "before=$(git rev-parse HEAD~1)"
            echo "after=$(git rev-parse HEAD)"
            echo "drift<<GH_EOF"
            echo "$drift"
            echo "GH_EOF"
          } >> "$GITHUB_OUTPUT"

      # Both versions are in git — old at the parent, new at the commit just published — so raw
      # URLs pinned to those SHAs render before/after inline. Requires a public repo.
      - name: Flag drift on the PR
        if: steps.commit.outputs.drift != ''
        env:
          GH_TOKEN: ${{ github.token }}
          DRIFT: ${{ steps.commit.outputs.drift }}
          BEFORE: ${{ steps.commit.outputs.before }}
          AFTER: ${{ steps.commit.outputs.after }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          raw="https://raw.githubusercontent.com/$REPO"
          {
            echo "### Visual drift"
            echo
            echo "These stories render differently than their committed baseline. I pushed the"
            echo "regenerated baselines, so the gate goes green — check the change is intended."
            echo "**If it isn't, fix the component, not the baseline.**"
            echo
            echo "| story | before | after |"
            echo "| --- | --- | --- |"
            while IFS= read -r file; do
              if [ -n "$file" ]; then
                story=$(basename "$file" .png | sed 's/-chromium-linux$//')
                echo "| \`$story\` | <img src=\"$raw/$BEFORE/$file\" width=\"360\"> | <img src=\"$raw/$AFTER/$file\" width=\"360\"> |"
              fi
            done <<< "$DRIFT"
            echo
            echo "Files changed also gives you swipe and onion-skin on each image."
          } > comment.md
          gh pr comment "$PR_NUMBER" --body-file comment.md

      - name: Push baselines to the PR branch
        if: steps.commit.outputs.after != ''
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: git push origin "HEAD:$HEAD_REF"
